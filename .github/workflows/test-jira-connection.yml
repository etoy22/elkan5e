name: Test Jira Connection

on:
  workflow_dispatch:

jobs:
  test-jira-connection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets are present
        run: |
          missing=""
          [ -z "${{ secrets.JIRA_BASE_URL }}" ]    && missing="$missing JIRA_BASE_URL"
          [ -z "${{ secrets.JIRA_USER_EMAIL }}" ]  && missing="$missing JIRA_USER_EMAIL"
          [ -z "${{ secrets.JIRA_API_TOKEN }}" ]   && missing="$missing JIRA_API_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "::notice::All required secrets are present."

      - name: Test Jira connection
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node .github/workflows/scripts/check-jira-connection.mjs
