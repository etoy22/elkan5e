    value: "<p>Orcs look like more muscular humans, a few inches taller than humans on average, with skin colour ranging from grey to green. Orcs have tusks of varied size growing from their slightly elongated lower jaws.\_</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed</strong>: 30 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.BZoyF4UQth6Zr5CQ]{Large Frame}</strong></p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.iM3hmD5dtPEsv6UA]{Relentless Endurance}</strong></p><p></p><p><em>In the world of Elkan, orcs are a persecuted and waning people. After freeing themselves from demonic control, they were one of the greatest world cultures. When elves arrived from Ishiki, they forced the orcs out of most of their lands. Now the orcs below to two main groups: the Stardust orc clans, who are constantly at war with humans and elves, and the isolationist orcs of Chalchuitzil, who worship their vampire rulers in the jungle.</em></p><p>​</p>"
