  description:
    value: "<p>Goblins\_are about the size of gnomes, though they tend to be stockier. They have long claw-like fingernails, sharp teeth, outwards-pointed ears, and slightly upturned noses. They range from green to brown to orange in color.</p><p><strong>Size</strong>:\_Small</p><p><strong>Walking Speed</strong>: 25 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>Climbing Speed</strong>: equal to walking speed.\_</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.kKSUJQlnkJFz3ejT]{Keen Smell}</strong></p><p></p><p><em>In the world of Elkan, goblins live primarily as the worker caste below their mighty hobgoblin cousins. They are stereotyped as subservient, cowardly, and silly creatures, but they cultivate this reputation so as to avoid notice from non-goblinoids. \_Among goblinoids, they are known as highly organized and brilliant engineers, well able to compensate for their smaller stature, but in the wider world they can succeed at just about any job if given the chance.</em></p>"
