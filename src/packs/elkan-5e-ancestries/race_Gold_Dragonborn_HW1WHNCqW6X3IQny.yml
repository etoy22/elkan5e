name: Gold Dragonborn
type: race
img: icons/creatures/eyes/humanoid-single-red-brown.webp
system:
  description:
    value: "<p>Dragonborn are humanoid lizards with the blood of dragons running through their veins. In some settings, they are directly descendants of dragons in some way, and in some settings they are created magically by draconic gods. Dragonborn can also refer to half-dragons, the humanoid lizard-like offspring created when a dragon, shapeshifted into a mortal, produces offspring with a mortal. Dragonborn often have heads resembling the dragon corresponding to their color.</p><p><strong>Size</strong>: Medium</p><p><strong>Walking Speed</strong>:\_30 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Language}</strong>:\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.XKDt41tEzeqkLzvu#draconic]{Draconic}</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>Damage Resistance: </strong>&amp;Reference[Poison]</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.OdzRyonbydSzgpcF]{Breath Weapon}</strong></p><p></p><p><em>In the world of Elkan, young dragonborn are injected with the blood of dragons when they are born, transforming them into magical creatures. Those without draconic ancestry almost never survive. After this process, dragonborn belong to a 'Bloodline', corresponding to the color of the dragon whose blood awakened them. The chromatic dragons- the red, blue, green, white, and black dragons- forcibly control their dragonborn servants. Belonging to one of the chromatic bloodlines means that you likely had to escape. The metallic dragons- the gold, silver, bronze, brass, and copper dragons- are more benevolent and allow dissatisfied dragonborn to venture into the world.</em></p><p><em>Regardless, joining a Bloodline means you are unable to join another (trying would kill you), and you will forever have impulses to act similarly to the personalities of your Bloodlines. While you can control these impulses, it is a lifelong struggle.</em></p><p><em>The gold dragons of Elkan live on the Untouchable Shores, the magical mists preventing travelers from getting close. They often intervene to prevent tyrants from rising to power nearby.\_Members of the Gold Bloodline often feel they know what's best for others, even those they barely know.</em></p>"
