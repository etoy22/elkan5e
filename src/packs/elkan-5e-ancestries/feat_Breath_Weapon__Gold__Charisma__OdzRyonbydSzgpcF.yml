    value: "<p><em>You breathe a twisting white gas which cripples enemies.</em></p><p><strong>Action</strong> - 20 ft. cone - 1/Long Rest - Magical</p><p><strong>Constitution</strong> Saving Throw</p><ul><li><p><strong>Failure:</strong>\_[[/damage 2d6 poison]] damage*, and the target is &amp;reference[poisoned] for 1 minute. Target rolls again at end of their turns, ending effect on success.</p><p>If a creature is reduced to 0 hit points with this breath weapon, the creature falls &amp;reference[Unconscious], does not roll death saving throws or die as a result of this damage.</p></li><li><p><strong>Success:</strong> half damage</p></li></ul><p>​</p><p><strong>*At Higher Levels:</strong> This ability's damage increases by 2d6 when you reach a total character or creature level of 5th level ([[/damage 4d6 poison]]), 11th level ([[/damage 6d6 poison]]), and 17th level ([[/damage 8d6 poison]]).</p>"
