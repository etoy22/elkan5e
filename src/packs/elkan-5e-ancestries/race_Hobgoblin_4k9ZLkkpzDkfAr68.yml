    value: "<p>Hobgoblins\_are about the size of humans, though they tend to be a bit stockier. Like their goblin cousins, they have long claw-like fingernails, sharp teeth, outwards-pointed ears, and slightly upturned noses. They tend to be brown to orange in color, even coming close to a red.</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed</strong>: 30 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.​</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.kKSUJQlnkJFz3ejT]{Keen Smell}</strong></p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.JcUjiuXIJMGbyHtL]{Repressed Memory}</strong></p><p></p><p><em>In the world of Elkan, hobgoblins come from a society ruled by the eternal spirits of the Ancestors, powerful hobgoblins who founded the Legions- highly regimented military organizations that control goblinoid life. The Ancestors can possess the bodies of chosen descendants, and walk among them. All hobgoblins have a buried connection to the memories of the Ancestors, allowing them to show surprising skill at things they've never done before.</em></p>"
