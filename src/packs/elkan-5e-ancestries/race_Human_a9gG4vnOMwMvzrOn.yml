    value: "<p>Humans are the most common mortals. While humans are not inherently magical creatures, they tend to be quick to adapt and learn from other peoples. They are a diverse people, both physically and culturally.</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed</strong>:\_30 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}</strong>:\_one skill of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.aKsDW2Zc9Vcwipv4]{Human Inspiration}</strong></p><p></p><p><em>In the world of Elkan, humans are a sizeable minority in most places. The largest population of humans live under the rule of angels in lands controlled by the Solar Hegemony. Humanity is often overlooked by the more magically gifted races, but exceptional humans have made up many of history's greatest heroes and villains.</em></p>"
