  description:
    value: "<p>Minotaurs are bipedal human-animal hybrids. Most minotaurs look like they have the heads of bulls, but some look closer to female cows, or even goats. All minotaurs have horns and hooves, and they stand bipedal at heights usually between 6 and 7 ft.</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed:</strong> 30 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.6MFtiFDlQAXblRi1]{Labyrinthine Recall}</strong></p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.6Ez448fxOtWzyggu]{Gore}</strong></p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.BZoyF4UQth6Zr5CQ]{Large Frame}</strong></p><p></p><p><em>In the world of Elkan, minotaurs are born from eggs laid by Baphomet, the mad minotaur god of wild magic. The product of strange asexual reproduction, most minotaurs are born into male bodies, though exceptions tend to be the rule with minotaurs. Minotaurs often have eccentric interests or powerful innate magical abilities. The largest minotaur population is in Mothside City, Baphomet's favourite mortal city, though many live within The Maze, the paradoxical demiplane that is Baphomet's own mind. Baphomet can be seen on our home page.</em></p><p>​</p>"
