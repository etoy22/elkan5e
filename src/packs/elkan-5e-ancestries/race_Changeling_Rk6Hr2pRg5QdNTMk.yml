system:
  description:
    value: "<p>Changelings vary in origin by setting, but are typically creatures of partial fey ancestry or born of a curse. Changelings have an inhuman humanoid form, and can change their appearance at will. They often adopt identities and a static appearance for most of their lives, but some have multiple identities they morph between on a regular basis. Concepts of gender or race don't always hold the same meaning for changelings.</p><p><span style=\"font-weight:bold\"><strong>Type:</strong></span>\_&amp;Reference[Fey]</p><p><strong>Size</strong>: Medium or Small</p><p><strong>Walking Speed</strong>:\_30 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.y8QjepmrP64AFPBg]{Shapeshifting}</strong></p><p></p><p><em>In the world of Elkan, changelings are most often found in Morventry (where they are praised as performers) or the wilds of Maronne (where they are protected by druids and fey creatures). Changelings are usually born to changeling or shapeshifting parents. If either parent was shapeshifting during conception or pregnancy, the child may be changed and become a changeling prior to birth. As a result, spellcasters or parents who have been cursed may give birth to a changeling and find themselves horrified or unprepared for the shapeshifting blob. Young changelings often face much ridicule, as their impulsive shapeshifting may cause social difficulties growing up.</em></p>"
