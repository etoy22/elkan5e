    value: "<p><em>You breathe a colorful cloud of stars.</em></p><p><strong>Action</strong> - 20 ft. cone -\_1/Long Rest - Magical</p><p>A creature that is already asleep or &amp;reference[Unconscious] has disadvantage on this save</p><p><strong>Wisdom</strong> Saving Throw</p><ul><li><p><strong>Failure:</strong>\_[[/damage 2d6 psychic]] damage*.</p><p>If a creature is reduced to 0 hit points with this breath weapon, the creature falls &amp;reference[Unconscious], does not roll death saving throws or die as a result of this damage, and cannot wake for 1 hour.</p></li><li><p><strong>Success:</strong> half damage</p></li></ul><p>​</p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*At Higher Levels:</strong> This ability's damage increases by 2d6 when you reach a total character or creature level of 5th level (</span>[[/damage 4d6 psychic]] <span style=\"font-family:Signika, sans-serif\">), 11th level (</span>[[/damage 6d6 psychic]] <span style=\"font-family:Signika, sans-serif\">), and 17th level (</span>[[/damage 8d6 psychic]]<span style=\"font-family:Signika, sans-serif\">).</span></p>"
