name: Mixed [Human, Orc]
type: race
img: icons/commodities/bones/skull-tusked-grey.webp
system:
  description:
    value: "<p>While most fantastical peoples, like gnomes, dwarves, and dragonborn, are incapable of having children together, there are exceptions. Your character could have mixed elf, human, and/or orc heritage. These people might have elven ears or orcish tusks, but look otherwise like humans. Alternatively, they may look more like their non-human parent, or not have human ancestry at all.</p><p>Click @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.xu7KkQUPMqoEsg19.JournalEntryPage.mfk7fxqfNwqfx3cq]{here} for further information (2).</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed</strong>: 30 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 30 ft.</p><p><strong>Human Feature</strong>: one\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{skill}\_of your choice</p><p><strong>Orcish Feature: @UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.BZoyF4UQth6Zr5CQ]{Large Frame}</strong></p><p></p><p><em>In the world of Elkan, mixed heritage people are accepted in most communities. However, in the Borderlands and in Mahavala, those with orcish blood are viewed with disdain, and in some of the Stardust orc clans, those with human or elven blood are considered suspicious at best. Otherwise, mixed heritage people face the same discrimination in some communities as other outsiders. People with mixed heritage might call themselves half-elves or half-orcs, as applicable.</em></p>"
