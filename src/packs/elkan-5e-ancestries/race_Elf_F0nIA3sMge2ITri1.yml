  description:
    value: "<p>Elves look like thinner humans with pointed ears. They tend to be classically attractive, with clear skin and symmetrical faces, though shorter than humans by a few inches on average. Elves are relatively hairless and few can grow facial hair.</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed</strong>: 30 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.uS8jFHnYNWmcERX3]{Fey Ancestry}</strong></p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.xGVb4lhczLf7edvg]{Keen Sight and Hearing}</strong></p><p></p><p><span style=\"font-style:italic\" class=\"wixui-rich-text__text\"><em>In the world of Elkan, elves are the most common race worldwide other than humans. The pale High Elves of Ishiki live an isolationist life on their hidden island, but exiles from their lands have colonized much of the main continent. The tanned Wood Elves of Ananua, so named for the boats they built after cutting sacred forests, live in shrouded settlements in the south of Elkan. By far the most numerous are the brown-skinned Dark Elves, who have founded several prominent merchant houses in the north of Elkan. Unlike many other settings, the different ethnic groups of elves in Elkan are nearly identical biologically.</em></span></p>"
