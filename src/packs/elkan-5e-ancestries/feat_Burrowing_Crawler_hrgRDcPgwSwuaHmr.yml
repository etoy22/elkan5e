system:
  description:
    value: >-
      <p><strong>Crawling Speed</strong>: equal to walking speed. You use this
      speed when prone.</p><p><strong>Burrowing Speed (5 ft.)</strong>: When you
      burrow, you can only burrow through dirt or other loose material, not hard
      materials like stone or wood. You leave a tunnel behind you, which you can
      crawl through with ease while crawling but a medium creature has to
      squeeze into.</p>
