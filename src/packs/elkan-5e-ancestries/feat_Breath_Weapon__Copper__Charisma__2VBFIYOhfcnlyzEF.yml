    value: "<p><em>You spew heavy caustic globs which stick to enemies and hinder them.</em></p><p><strong>Action</strong> - 20 ft. cone -\_1/Long Rest - Magical</p><p><strong>Dexterity</strong> Saving Throw</p><ul><li><p><strong>Failure:</strong>\_[[/damage 2d6 acid]] damage*and the target is &amp;reference[Slowed] until the end of your next turn.</p></li><li><p><strong>Success:</strong> half damage</p></li></ul><p>​</p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*At Higher Levels:</strong> This ability's damage increases by 2d6 when you reach a total character or creature level of 5th level (</span>[[/damage 4d6 acid]]<span style=\"font-family:Signika, sans-serif\">), 11th level (</span>[[/damage 6d6 acid]]<span style=\"font-family:Signika, sans-serif\">), and 17th level (</span>[[/damage 8d6 acid]]<span style=\"font-family:Signika, sans-serif\">).</span></p>"
