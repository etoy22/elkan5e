    value: "<p>Gnomes look like very small elves, with pointed ears and an average height between 3 and 4 ft. Unlike elves, gnomes can grow facial hair, and it is not uncommon to see a gnome with a stylized beard. Shorter gnomes sometimes look like their heads are too big for their small bodies.</p><p><strong>Size</strong>:\_Small</p><p><strong>Walking Speed</strong>: 25 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.​</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.JeD8mTBfopTjV8yz]{Gnome Cunning}</strong></p><p></p><p><em>In the world of Elkan, gnomes form two distinct ethnic groups. The forest gnomes of Ananua live in harmony with the Wood Elves, and delight in their secretive woodland communities. The better known rock gnomes are led by House McGrath in the north. The rock gnomes are famous for magical inventions, especially those which use the power of the Lord of Light, Glanis.</em></p>"
