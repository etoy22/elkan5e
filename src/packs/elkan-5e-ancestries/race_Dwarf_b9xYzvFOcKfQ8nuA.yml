system:
  description:
    value: "<p>Dwarves look like short, stout humans, though they vary in height from 4 to 5 ft. They tend to be well-muscled and hardy, but dwarves raised in non-dwarven cultures show more variability in build. Dwarves can almost universally grow beards (not just male dwarves), and have a legendary tolerance to alcohol.</p><p><strong>Size</strong>:\_Medium</p><p><strong>Walking Speed</strong>: 25 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>Damage Resistance:</strong> &amp;Reference[Poison]</p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.InoiZKsErd54LfKy]{Dwarven Resilience}</strong></p><p><strong>@UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.5sGc2Tsu23jDaBS3]{Sturdy}</strong></p><p></p><p><em>In the world of Elkan, dwarves tend to live among their own. The largest population of dwarves live in Ironhome, where dwarves cover themselves constantly in metal armor, drink beer, and teach their young to stay true to family traditions. Another significant population, the Red Dwarves, have been imbibing the blood of red dragons and bowing to their draconic overlords for generation. Dwarves are stereotyped as a thick headed people by most of their neighbors.</em></p>"
