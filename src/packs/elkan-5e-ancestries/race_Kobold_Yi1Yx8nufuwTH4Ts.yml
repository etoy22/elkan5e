system:
  description:
    value: "<p>Kobolds are small draconic creatures that range from 2-3 ft. tall. Their bodies are covered in colorful scales, and they have the heads and bodies of humanoid lizards, usually with two short horns extending backwards from the top of their head. Most kobolds have scales the color of one of the various species of dragon: either a chromatic like red or black, or a metallic like brass or silver. Whether kobolds are descended from dragons varies by campaign setting.</p><p><strong>Size</strong>:\_Small</p><p><strong>Walking Speed</strong>: 25 ft.</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.​</p><p><strong>Crawling Speed</strong>: equal to walking speed. You use this speed when prone.</p><p><strong>Burrow Speed</strong>: 5 ft. [Limitations apply: see @UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.hrgRDcPgwSwuaHmr]{Burrowing Crawler}]</p><p>\_</p><p><em>In the world of Elkan, kobolds have been slaves or servants to dragons for all recorded history. The largest population of kobolds live as slaves to the Red Bloodline of dragons, who use the kobolds to tunnel ever deeper into the mountains, expanding their territory. Kobolds are sometimes able to make their way to large cities successfully, but some chromatic dragons hunt such kobolds for daring to defy the social order of draconic society.</em></p>"
