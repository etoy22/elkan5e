  description:
    value: "<p>Aasimar are mortals with a parent or ancestor who is an angel or other celestial creature. Usually, an aasimar looks most like their mortal ancestry, but with yellow glowing eyes and shiny skin. Sometimes, an aasimar has a halo or vestigial wings too weak too allow the aasimar to fly.</p><p><span style=\"font-weight:bold\"><strong>Type:</strong></span>\_&amp;Reference[Celestial]</p><p><strong>Size</strong>: Medium or Small</p><p><strong>Walking Speed</strong>:\_30 ft.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Language}</strong>:\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.VZggCkMcvhk0X5Xj#celestial]{Celestial}</p><p><strong>Senses</strong>:\_&amp;Reference[Darkvision] 60 ft.</p><p><strong>Cantrips</strong>:\_\_@UUID[Compendium.elkan5e.elkan5e-spells.Item.e4MmHYtpD4jFrRuH]{Light}-OR-\_@UUID[Compendium.elkan5e.elkan5e-spells.Item.vRUeWAv7ZesZ1Tzj]{Thaumaturgy}</p><p><strong>Damage Resistance: </strong>&amp;Reference[Necrotic] and &amp;Reference[Radiant]</p><p></p><p><em>In the world of Elkan, aasimar are rare. The largest population of aasimar are human aasimar, and live with their angelic parents or ancestors in lands controlled by the Solar Hegemony. People usually assume aasimar are trustworthy people, but this trust is unearned. Those who know better view aasimar as being closer to their mortal heritage than anything else.</em></p>"
