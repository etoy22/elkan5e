system:
  description:
    value: >-
      <p><em>The Cripple's Crutch is a lanky looking cane that empowers its
      wielder with unnatural strength. Unfortunately, the wielder has to hold it
      to gain the benefit, and the crutch itself is a poor
      weapon.</em></p><p>This is a quarterstaff with a penalty of -2 to both
      attack and damage rolls. It does not deal magical damage.</p><p>While
      attuned to this item and holding it, the wielder's strength score becomes
      17 if it isn't already
      higher.</p><p></p><p>Properties:</p><p>&amp;Reference[Versatile] (1d8)</p>
