name: Gotthorm's Warmth Charm
type: equipment
system:
  description:
    value: >-
      <p><em>A small charm made of whale bone and enchanted to help dock workers
      and explorers in frigid climes. This one was mass produced by a company
      owned by a professional show diver named Gotthorm who used to do shows in
      the Batten Cliffs region.</em></p><p>Once per dawn, you can rub this charm
      to create a warm glow that lasts for 8 hours. The glow magically envelops
      whoever is wearing it, preventing them from environmental cold effects,
      but not cold damage.</p>
