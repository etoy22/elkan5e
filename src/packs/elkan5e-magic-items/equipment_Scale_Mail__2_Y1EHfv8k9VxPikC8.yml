    value: >-
      <p><em>This armor has been embellished with powerful runes, crafted in
      sorcerous fires, blessed by a powerful being, or some other event has seen
      it bequeathed with enhanced protection for the wearer.</em></p><p>You have
      a bonus to AC while wearing this armor.</p><p><span
      style="font-family:Signika, sans-serif">Scale mail is made of overlapping
      scale shaped metal plates attached to a cloth or leather backing. It is
      extremely rare to see a suit of scale mail made of actual animal or
      monster scales, but such things do exist where the monster's scales are
      thick and durable, like those of dragons. Mundane scale mail is iron,
      bronze, or steel.</span></p>
