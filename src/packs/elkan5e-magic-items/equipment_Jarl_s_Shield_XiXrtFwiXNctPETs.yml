system:
  description:
    value: >-
      <p><em>Most such shield have a jarl’s bindrune, whether or not they are
      carried by a dwarven jarl. Jarls are no longer a common part of dwarven
      society, but the practice of enchanting shields for the leaders of small
      warbands continues.</em></p><p>Attuning to this large shield item requires
      you to stand vigil to swear to become the leader or protector of a group
      of people, and requires you to have proficiency with medium
      armor.</p><p>Once per short rest, when attuned to this shield, you can use
      a bonus action to rally up to 6 friendly creatures within 30 ft. of you,
      who can then add 1d4 to the first attack roll they make on their next
      turn.</p>
