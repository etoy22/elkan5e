system:
  description:
    value: >-
      <p><em>This ring is electrum with a square cut topaz in its center. It was
      made by the hobgoblins of the Plumed Legion to allow their civilian
      commanders to stand on a battlefield without great risk of death. The ring
      causes the wearer's muscles to magically harden, allowing them to resist
      punishment.</em></p><p>While attuned to this item, your hit point maximum
      increases by 2 for every hit die you have (equal to your character
      level).</p>
