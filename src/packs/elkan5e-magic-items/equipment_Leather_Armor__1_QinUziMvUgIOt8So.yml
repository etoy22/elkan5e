system:
  description:
    value: >-
      <p><em>This armor has been embellished with powerful runes, crafted in
      sorcerous fires, blessed by a powerful being, or some other event has seen
      it bequeathed with enhanced protection for the wearer.</em></p><p>You have
      a bonus to AC while wearing this armor.</p><p><span
      style="font-family:Signika, sans-serif">Leather armor consists of either
      layers of leather or a single thick layer of leather. The leather is
      hardened, often by boiling it in oil or coating it in a hardening
      compound. This armor usually only covers the torso, and provides more
      mobility than heavier armor, making it the choice for most archers or
      warriors who depend more on dodging and fast movement than tougher
      armor.​</span></p>
