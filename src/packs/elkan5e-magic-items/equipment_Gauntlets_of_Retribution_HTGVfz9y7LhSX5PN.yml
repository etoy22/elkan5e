system:
  description:
    value: >-
      <p><em>These bright metal gauntlets appear to blur when you stare at them
      too long. Sometimes you see purple runes floating on the surface in
      Celestial- warnings against anyone who might mean the wearer harm. When
      the wearer is damaged, the wearer can choose to activate the runes and
      strike their attacker with magical force.</em></p><p></p><p>When attuned
      to by a creature who can speak Celestial, the wearer can use their
      reaction to deal 1d6 force damage to a creature within 30 ft. that damages
      them.</p>
