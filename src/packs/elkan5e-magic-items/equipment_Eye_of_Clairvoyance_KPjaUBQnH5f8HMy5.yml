system:
  description:
    value: "<p><span style=\"font-family:Signika, sans-serif\"><em style=\"box-sizing:border-box;user-select:text\">This glass eye has been enchanted to allow a diviner to grant divination magic to those without the ability to cast the spell themselves. While anyone can use it, it must be recharged by a diviner, and the magic is somewhat limited.</em></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">When a spellcaster casts the<em> Clairvoyance</em>\_spell, they can use this eye as the material component. When they do, they do not cast the spell normally. Instead, the spell is stored in the eye. Any creature can then cast<em> Clairvoyance</em>\_with the eye as an action by holding it in their hand and staring into it, but they can only see, not hear, the location chosen for the spell.</span></p><p>Once the eye has been used, it must be recharged by casting <em>Clairvoyance</em> on the eye again.</p>"
