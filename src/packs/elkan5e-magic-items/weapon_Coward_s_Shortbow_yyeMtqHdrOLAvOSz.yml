  description:
    value: >-
      <p><em>This bow is designed to be easy to draw, though it doesn't shoot as
      far as larger bows. It uses arrows as ammunition and comes with a
      quiver.</em></p><p><em>The Coward's Shortbow was created to allow a less
      skilled or physically powerful individual fire a bow at long range.
      Enchantments carry arrows fired from this bow as if they were fired from a
      much more powerful weapon.</em></p><p>This shortbow has a range of
