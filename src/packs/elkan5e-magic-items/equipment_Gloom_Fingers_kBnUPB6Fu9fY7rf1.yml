name: Gloom Fingers
type: equipment
system:
  description:
    value: >-
      <p><em>Slippery black gloves believed to have belonged to one of the
      legendary Gloom Orphans. The gloves magically fit anyone, and sometimes
      the fingers can extend to fill keyholes. While attuned to these gloves,
      the wearer can use them in the place of thieves’ tools to pick
      locks.</em></p><p>When attuned to these gloves, y<span
      style="font-family:Arial"><strong style="font-weight:normal"
      id="docs-internal-guid-a1cdd644-7fff-c9c7-e272-12c6b9252526">ou gain
      proficiency in sleight of hand skill checks if you don’t have it already.
      When using these gloves to pick locks, you gain a +5 bonus to the
      roll.</strong></span></p>
