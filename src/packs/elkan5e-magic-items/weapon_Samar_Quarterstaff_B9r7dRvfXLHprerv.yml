system:
  description:
    value: "<p><em>This staff is between 6 and 9 ft. in length, and is used by travelers and adventurers to defend themselves. It can be effectively wielded in combat with two hands.</em></p><p><span style=\"font-family:Signika, sans-serif\"><em style=\"box-sizing:border-box;user-select:text\">Covered in writing in Gnomish that suggests it’s a creation of Ananuan artificers. It's also dated to be older than Ananua. The writing doesn’t shed light on what it’s supposed to be for. The staff can’t be damaged through conventional means.</em></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:1rem;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">If attuned by a spellcaster, gives you +2 to spell attack rolls.\_</span><span style=\"font-family:Arial\"><strong id=\"docs-internal-guid-5d73fe72-7fff-e74e-0cee-b006e2e0dd43\" style=\"box-sizing:border-box;user-select:text;font-weight:normal\">You are immune to exhaustion, and don’t need to eat, drink, or sleep. You also stop aging.</strong></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:1rem;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">This staff also serves as a spellcasting focus.</span></p><p>Properties:</p><p>&amp;Reference[Magicw], &amp;Reference[Reach] (10 ft.), &amp;Reference[Handed]</p>"
