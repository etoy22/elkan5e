  description:
    value: "<p><em>Darts are pointed throwing weapons larger than the sort you would throw at a dart board in a tavern. They can also be used for stabbing at close range, but do not function well enough to be an off-hand side arm like a dagger. A small thrown implement crafted with a short wooden shaft and crossed feathers with a sharp wooden or metal tip. Darts can be thrown with sufficient force to puncture the skin.</em></p><p><em>A magic weapon like this one has a bonus to attack and damage rolls and deals\_magical\_bludgeoning, piercing, or slashing damage.</em></p><p>You have a bonus to attack and damage rolls made with this magic weapon.</p><p>Properties:</p><p>&amp;Reference[Magicw], &amp;Reference[Coldw], &amp;Reference[Finesse], &amp;Reference[Thrown]</p>"
