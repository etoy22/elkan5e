system:
  description:
    value: >-
      <p>Thieves are among the most nimble rogues, adept at multitasking beyond
      the skills of any other. They move like a blur, with opponents often
      striking at them only to find they have already disappeared. Compared to
      other rogues, they focus more on defense and mobility. Thieves come from a
      variety of backgrounds, and while they are often skilled at stealing, they
      are far more than a common cutpurse.</p>
