  description:
    value: >-
      <p>Rangers belonging to the Hunter Conclave specialize in hunting
      creatures that pose a threat to civilization or the wild. They hone their
      fighting skills and reflexes beyond the limits of most rangers. You should
      play a hunter if you want to be an exceptionally agile fighter who
      exemplified the peak of physical ability for a ranger. Some hunters also
      specialize in fighting groups of enemies.</p>
