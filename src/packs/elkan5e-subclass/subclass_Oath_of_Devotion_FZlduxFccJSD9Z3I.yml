system:
  description:
    value: >-
      <p>When you swear an oath of devotion, you begin a life in service to your
      chosen ideals or virtues. Many paladins who swear an oath of devotion
      choose to live their lives as virtuously as possible. Some paladins choose
      a specific virtue or code of honor, and they often hold themselves to
      almost impossibly high standards. Paladins who swear an oath of devotion
      are more resistant to mental influence than other paladins, and can stand
      as literal beacons of light against their foes.</p>
