system:
  description:
    value: >-
      <p><span style="letter-spacing:normal" class="wixui-rich-text__text">A
      bloodrager has powerful magical abilities that normally lie dormant. When
      a bloodrager taps into their power, either when they're angry or otherwise
      enter Rage, their magical power awakens and their blood becomes volatile
      and dangerous, harming their attackers and allowing them to cast a limited
      array of spells.</span></p>
    chat: ''
