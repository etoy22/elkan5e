system:
  description:
    value: >-
      <p>You tap into the nightmares of a creature you can see within range and
      create an illusory manifestation of its deepest fears, visible only to
      that creature. The target must make a Wisdom saving throw. On a failed
      save, the target becomes Frightened for the Duration. At the end of each
      of the target’s turns before the spell ends, the target must succeed on a
      Wisdo⁠m saving throw or take 4d10 psychic damage. On a successful save,
      the spell ends.</p><p></p><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><span style="font-family:Signika, sans-serif"><strong
