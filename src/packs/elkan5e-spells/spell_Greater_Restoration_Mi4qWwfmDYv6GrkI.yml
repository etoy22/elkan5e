system:
  description:
    value: >-
      <div><p>You imbue a creature you touch with positive energy to undo a
      debilitating effect. You can reduce the target's exhaustion level by one,
      or end one of the following effects on the target:</p><ul><li>One effect
      that charmed or petrified the target</li><li>One curse, including the
      target's attunement to a cursed magic item</li><li>Any reduction to one of
      the target's ability scores</li><li>One effect reducing the target's hit
      point maximum</li></ul></div>
