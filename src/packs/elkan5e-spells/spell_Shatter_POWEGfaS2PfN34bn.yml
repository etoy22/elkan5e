system:
  description:
    value: "<div class=\"rd__b  rd__b--3\"><p><em>You tap on a chip of mica and say a word of power, the tiny vibrations in the stone replicated at many times the strength at a location you choose, blasting your foes with a painfully intense ringing noise and an eruption of force.</em></p><p><strong>Constitution Save</strong></p><p>A creature made of inorganic material such as stone, crystal, or metal has disadvantage on this saving throw.</p><ul><li><p><strong>Failure</strong>:\_Targets take [[/damage 3d8 thunder]] damage.*</p></li><li><p><strong>Success</strong>:\_Half damage.</p></li></ul><div class=\"rd__spc-inline-post\"><p></p></div></div><div class=\"rd__b  rd__b--3\"><div class=\"rd__b  rd__b--3\"><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*</strong></span><strong>Upcasting</strong>: Increase damage by [[/damage 1d8 thunder]]{1d8} for each spell level above 2nd.</p></div></div>"
