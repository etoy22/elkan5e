system:
  description:
    value: >-
      <p><em>You make a magical proclamation, insisting that poisons will not
      harm your target as you touch them.</em></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Buff/Healing</strong></span></p><ul><li><p>If
      the target is &amp;reference[Poisoned], you neutralize the poison, ending
      the condition and its secondary effects, if any. If more than one poison
      afflicts the target, you neutralize one poison that you know is present,
      or you neutralize one at random.</p></li><li><p>The target has advantage
      on saving throws against being &amp;reference[Poisoned] and has resistance
      to poison damage.</p></li></ul>
