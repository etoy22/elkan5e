  description:
    value: "<p><span style=\"font-family:Signika, sans-serif\"><em style=\"box-sizing:border-box;user-select:text\">A large white gem, gleaming like fresh dew. One of the hardest nonmagical substances in the world.</em></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">This is used as the material component for the <em style=\"box-sizing:border-box;user-select:text\">@UUID[Compendium.elkan5e.elkan5e-spells.Item.Qj9baV1UtPqdd4P8]{Resurrection}\_</em>spell, which cannot be cast unless this component is carried by the caster. </span><span style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-size:13px\"><span style=\"font-family:Signika, sans-serif\">Alternatively, it might be part of the material component of a <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.rmliJsYc0Loo3Jgt]{Raise Dead}</em> or <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.bjDebvXFbxqEYkw6]{True Resurrection}</em> spell.</span></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">This component is consumed by casting the <em style=\"box-sizing:border-box;user-select:text\">Resurrection\_</em>spell.</span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">This diamond can be crushed into diamond dust over 1 hour using smith's or tinker's tools. You get the equivalent of 2 bags of diamond dust, valued at 200 gold.</span></p>"
