    value: "<div class=\"rd__b  rd__b--3\"><p><em>As you hold your hands with thumbs touching and fingers spread and say a word of power, a thin sheet of flames shoots forth from your outstretched fingertips.</em></p><p><strong>Dexterity Save</strong></p><ul><li><p><strong>Failure</strong>:\_Target takes [[/damage 3d6 fire]]\_damage.*</p></li><li><p><strong>Success</strong>:\_Half damage.</p></li></ul><p></p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*</strong></span><strong>Upcasting</strong>: Increase damage by [[/damage 2d6 fire]] for each spell level above 1st.</p></div>"
