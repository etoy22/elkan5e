system:
  description:
    value: >-
      <p>This spell assails and distorts the minds of creatures, generating
      illusions and causing uncontrolled actions. Each creature in a sphere of
      10-foot-radius centered on a point chosen in the range of the spell must
      make a Wisdom saving throw otherwise it will be affected by the
      spell.</p><p>An affected target can react and it must start at the
      beginning of 1d10 each of his game rounds to determine its behavior for
      that round.</p><p>At the end of each turn, an affected creature can make a
      saving throw of Wisdom. If successful, the effect of the spell ends for
      this target.</p><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><strong>Upcasting:</strong> <span style="font-family:Signika,
      sans-serif">The radius of the spell increases by 5 ft.</span> for each
      spell level above 4th level.</p></div></div>
