  itemacro:
    macro:
      _data:
        name: Grease
        type: script
        scope: global
        command: >-
          //On use macro to apply an item's active effects to the placed
          template instead of applying through the normal midi QoL workflow 

          // requires midi qol, furnace and Active Auras 

          debugger

          if (args[0].tag === "OnUse") {
              let template = canvas.templates.get(args[0].templateId)
              let effects = args[0].item.effects
              let templateEffectData = []
              for (let effect of effects) {
                  let data = { data: duplicate(effect), parentActorId: false, parentActorLink: false, entityType: "template", entityId: template.id, }
                  templateEffectData.push(data)
              }
              await template.setFlag("ActiveAuras", "IsAura", templateEffectData)
              ActiveAuras.CollateAuras(canvas.scene.id, true, false, "spellCast")
              return { haltEffectsApplication: true }
          }



          else if (args[0] === "on") {
              const lastArg = args[args.length - 1];
              let tactor;
              if (lastArg.tokenId) tactor = canvas.tokens.get(lastArg.tokenId).actor;
              else tactor = game.actors.get(lastArg.actorId);
              const target = canvas.tokens.get(lastArg.tokenId)
              const DAEitem = lastArg.efData.flags.dae.itemData
              const saveData = DAEitem.data.save
              const flavor = `${CONFIG.DND5E.abilities["dex"]} DC${args[1]} ${DAEitem?.name || ""}`;
              let saveRoll = (await tactor.rollAbilitySave("dex", { flavor })).total;
              if (saveRoll < args[1]) {
                  game.cub.addCondition("Prone", token)
              }
          }


          else if (args[0] === "each") {

              const lastArg = args[args.length - 1];
              let tactor;
              if (lastArg.tokenId) tactor = canvas.tokens.get(lastArg.tokenId).actor;
              else tactor = game.actors.get(lastArg.actorId);
              const target = canvas.tokens.get(lastArg.tokenId)
              const DAEitem = lastArg.efData.flags.dae.itemData
              const saveData = DAEitem.data.save
              const flavor = `${CONFIG.DND5E.abilities["dex"]} DC${args[1]} ${DAEitem?.name || ""}`;
          let saveRoll = (await tactor.rollAbilitySave("dex", { flavor
          })).total;
              if (saveRoll < args[1]) {
                  game.cub.addCondition("Prone", token)
              }
          }
        author: E4BVikjIkVl2lL2j
