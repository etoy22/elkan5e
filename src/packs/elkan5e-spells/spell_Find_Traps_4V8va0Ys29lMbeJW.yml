      help protect you from unseen danger. Your senses hone in to your
      surroundings and you feel a creeping sense of paranoia. Your reaction time
      improves when faced with unseen
      danger.</em></p><p><strong>Buff</strong></p><p>You become more attuned to
      unseen dangers.</p><ul><li><p>Your passive perception increases by
      5.</p></li><li><p>You have advantage on &amp;reference[perception],
      &amp;reference[investigation], or &amp;reference[survival] checks to
      discover natural hazards, traps, or ambushes.</p></li><li><p>You cannot be
      &amp;reference[surprised].</p></li></ul></div>
