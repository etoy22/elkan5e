    value: >-
      <p>You speak a word of power that can overwhelm the mind of one creature
      you can see within range, leaving it dumbfounded. If the target has 150
      Hit Points or fewer, it is Stunned. Otherwise, the spell has no
      effect.</p><p>The stunned target must make a Constitution saving throw at
      the end of each of its turns. On a successful save, this stunning effect
      ends.</p>
