name: Well of Corruption
type: spell
img: icons/magic/unholy/orb-swirling-teal.webp
system:
  description:
    value: "<p><span style=\"font-family:Signika, sans-serif\"><em style=\"box-sizing:border-box;user-select:text\">You present a vial of magical shadow which flows outwards and creates a swirling vortex in front of you that corrupts everything it touches.</em></span></p><div data-draftjs-conductor-fragment=\"{\" style=\"white-space:pre-wrap\"><p><span data-text=\"true\"><strong>Materials: </strong>Casting this spell requires a bottled @UUID[Compendium.elkan5e.elkan5e-spells.Item.eUy7hq3K0RdLI4O7]{shadow essence} typically valued at 20 gold. This spell consumes the material.</span></p></div><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Constitution</strong> <strong>Save</strong></span></p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Failure:</strong>\_The target cannot regain hit points. Target rolls again at end of their turns, ending effect on success.</span></p></li><li style=\"box-sizing:border-box;user-select:text\"><p><span style=\"font-family:Signika, sans-serif\"><strong>Failure:\_</strong>Target is &amp;reference[drained] for [[/r 4d8]]hit points<strong>*</strong>. This cannot drain a target below their current hit point total, only draining them up to the amount of damage they've already taken.</span></p></li><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Success:</strong> Target is drained by half as much, no other effect.</span></p></li><li><p><span style=\"font-family:Signika, sans-serif\"><strong>Area Hazard:</strong> The well remains in place. Targets roll a save when they enter or when they end their turn in the well (but only once per turn).</span></p></li></ul><p></p><p><strong>*Upcasting:</strong> <span style=\"font-family:Signika, sans-serif\">Targets are drained an additional </span>[[/r 2d8]] for each spell level above 2nd level.</p>"
