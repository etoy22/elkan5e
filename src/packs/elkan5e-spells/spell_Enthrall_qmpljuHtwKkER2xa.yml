system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You weave a distracting string of
      words, waving your arms to challenge a creature or otherwise get the
      attention of a creature.</em></p><p>A creature must be able to hear you to
      be affected by this spell. This spell ends if the target can no longer
      hear you or if you become &amp;reference[incapacitated] or
      &amp;reference[silenced].</p><p><strong>Wisdom Saving
      Throw</strong></p><ul><li><p><strong>Failure:</strong> Target is
      &amp;reference[Charmed]. While charmed in this way, the target is
      &amp;reference[goaded] by you and has disadvantage on
      &amp;reference[perception] checks to locate a creature other than you.
      <span style="font-family:Signika, sans-serif">Target rolls again at end of
      their turns, ending effect on
      success.</span></p></li><li><p><strong>Success:</strong> No
      effect.</p></li></ul><p></p></div><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p>
