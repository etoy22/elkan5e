system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a bolt of lightning that arcs
      toward a target of your choice that you can see within range. Three bolts
      then leap from that target to as many as three other targets, each of
      which must be within 30 feet of the first target. A target can be a
      creature or an object and can be targeted by only one of the
      bolts.</p><div class="rd__spc-inline-post"><p></p></div><p>A target must
      make a Dexterity saving throw. The target takes [[/r 10d8]] lightning
      damage on a failed save, or half as much damage on a successful
      one.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p></p><p><span style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by [[/damage 1d8 lightning]]{1d8} for each spell level
      above 6th.</p></div></div>
