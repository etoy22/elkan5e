system:
  description:
    value: >-
      <p><em>You touch a creature where they have been wounded, mentally
      picturing their bodies mending and asking for their recovery as they are
      healed of their wounds.</em></p><p><strong>Healing</strong></p><p>This
      spell has no effect on &amp;reference[construct].</p><ul><li><p>Target
      gains hit points equal to [[/healing 1d8 + @attributes.spellmod]]{1d8 +
      your spellcasting ability modifier} .*</p></li></ul><p></p><div
