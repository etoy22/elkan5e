system:
  description:
    value: >-
      <p><em>You gain a second sort of awareness outside of yourself, seeing
      certain magical creatures in your mind, even when you aren't looking at
      them.</em></p><p><strong>Buff</strong></p><ul><li><p>You know if there is
      an &amp;reference[aberration], &amp;reference[celestial],
      &amp;reference[elemental], &amp;reference[fey], &amp;reference[fiend], or
      &amp;reference[undead] within 30 feet of you, as well as where the
      creature is located. Similarly, you know if there is a place or object
      within 30 feet of you that has been magically consecrated or desecrated
      (such as with the
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.TM7nuwiFhBjdE2MT]{Hallow}</em>
      spell). The spell can penetrate most barriers, but it is blocked by 1 foot
      of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood
      or dirt.</p></li></ul><p></p><p><em>This spell does not allow you to
      accurately see invisible creatures, but you know their location.</em></p>
