  description:
    value: "<p><em>A small white gem, gleaming like fresh dew. One of the hardest nonmagical substances in the world.</em></p><p><span style=\"font-family:Signika, sans-serif\">This is used as the material component for the <em style=\"box-sizing:border-box;user-select:text\">@UUID[Compendium.elkan5e.elkan5e-spells.Item.rmliJsYc0Loo3Jgt]{Raise Dead}</em> spell, which cannot be cast unless this component is carried by the caster. </span><span style=\"color:#191813;font-size:13px\">Alternatively, it might be part of the material component of a <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.bjDebvXFbxqEYkw6]{True Resurrection}</em> spell.</span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">This component is consumed by casting the <em style=\"box-sizing:border-box;user-select:text\">Raise Dead\_</em>spell.</span></p><p>This diamond can be crushed into diamond dust over 1 hour using smith's or tinker's tools. You get the equivalent of 1 bag of diamond dust, valued at 100 gold.</p>"
