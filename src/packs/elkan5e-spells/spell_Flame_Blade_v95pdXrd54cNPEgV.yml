system:
  description:
    value: >-
      <p><em>You hover your hand over the edge of a
      @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.NLDdf7iJt09G64Dg]{scimitar},
      @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.0hIX4VFLMTXWVYoW]{shortsword},
      or other edged weapon, muttering an incantation. In an instant, the blade
      catches fire. As you fight with it, you find yourself striking harder and
      faster as the blade listens to your will.</em></p><p><strong>Utility
      Spell</strong></p><p>Your chosen weapon gains the following
      properties:</p><ul><li><p>You can use your spellcasting ability in place
      of strength or dexterity for attack or damage rolls.</p></li><li><p>The
      weapon deals [[/damage 3d6 fire]] damage,* which replaces the weapon's
      damage.</p></li><li><p>The flaming blade sheds bright light in a 10-foot
      radius and dim light for an additional 10 feet.</p></li></ul><p>If you let
      go of the blade, the fire disappears, but you ignite the same blade again
      or ignite a new blade as a bonus action.</p><p></p><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by [[/damage 1d8 fire]] for every <strong>two spell
      levels</strong> above 2nd.</p>
