system:
  description:
    value: >-
      <p><em>You empty a flask containing a bit of tallow, a pinch of brimstone,
      and a dusting of powdered iron on the ground. As you say a few magic words
      in a firm voice, you create an sphere of fire, which in actuality is a
      confluence of elemental energy with just enough intelligence to follow
      your mental commands.</em></p><p><strong>Summoning
      Spell</strong></p><p>You create an sphere of fire.</p><ul><li><p>It is a
      medium &amp;reference[elemental] and acts immediately after the end of
      your turn.</p></li><li><p>It is immune to fire and poison damage, and
      immune to the grappled, paralyzed, petrified, poisoned, prone, restrained,
      unconscious, and exhaustion conditions.</p></li><li><p>It has AC 10, 20
      hit points,* and all its ability scores are 2, except dexterity and
      constitution which are 10. Its speed is 30 and can move through other
      creatures (but not end in their space).</p></li><li><p>At the end of each
      of the sphere's turns or if the sphere is reduced to 0 hit points, any
      creature within 5 feet of the sphere makes a dexterity
      save.</p></li><li><p>It emits &amp;reference[brightlight] in a 20 ft.
      radius and &amp;reference[dimlight] in a 40 ft.
      radius.</p></li></ul><p><strong>Dexterity
      Save</strong></p><ul><li><p><strong>Failure:</strong> Target takes
      [[/damage 2d6 fire]] damage.*</p></li><li><p><strong>Success:</strong>
      Half damage.</p></li></ul><p></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text">*</strong></span><strong>Upcasting:</strong>
      <span style="font-family:Signika, sans-serif">The sphere's hit points
      increase by 10 and its damage increases by [[/r 1d6 fire]]{1d6}</span> for
      each spell level above 2nd level.</p>
