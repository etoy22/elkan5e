system:
  description:
    value: "<p><em>You strike a piece of iron, creating a spark. The piece of iron you struck rapidly grows hot as you chant an incantation. At the same time, a metal item you can see grows just as hot, making it hard to wield if held or worn by a creature.</em></p><p><strong>Action</strong> - An Object (60 ft.) - 2nd Level (Transmutation) - VSM - Concentration (1 Minute)</p><p>You can heat a metal weapon or armor, a 5 ft. square of metal flooring or walls, or any other metal object equal in size or smaller than a suit of plate mail. Any creature in physical contact with the heated object must make a constitution save.</p><p><strong>Constitution Save</strong></p><ul><li><p><strong>Failure:</strong> Target takes [[/damage 2d6 fire]] damage.* The target can drop the object, but if they don't or can't, they have disadvantage on attack rolls and skill checks for 1 round.</p></li><li><p><strong>Success:</strong> Half damage.</p></li></ul><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li><p><span style=\"font-family:Signika, sans-serif\"><strong>Concentration:</strong>\_Once on each\_subsequent turn, you can heat the metal object again as a bonus action.</span></p></li></ul><p></p><div class=\"rd__b  rd__b--3\"><div class=\"rd__b  rd__b--3\"><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*</strong></span><strong>Upcasting</strong>: Increase damage by [[/damage 1d6 fire]] for each spell level above 2nd.</p></div></div>"
