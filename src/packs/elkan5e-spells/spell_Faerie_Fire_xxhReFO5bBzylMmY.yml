system:
  description:
    value: >-
      <p><em>You hum an upbeat folk tune as creatures in front of you light up
      with vibrant color. Objects automatically light up, while creatures can
      attempt to move away from the bright light cloying to them. The lights
      dance and lead attackers to a target's weak
      spots.</em></p><p><strong>Dexterity
      Save</strong></p><ul><li><p><strong>Failure</strong>: Target is outlined
      in blue, green, or violet light (your choice), and sheds dim light in a
      10-foot radius. All attack rolls against them have advantage if the
      attacker can see them, and they can’t benefit from being
      &amp;reference[invisible]. Target rolls a save again at end of their
      turns, ending effect on success.</p></li><li><p><strong>Success</strong>:
      No Effect.</p></li></ul>
