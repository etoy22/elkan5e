system:
  description:
    value: >-
      <div><p><em>You attempt to calm nearby creatures with your words. Your
      words may or may not actually make sense, but when you work your magic,
      affected creatures begin to agree that their feelings were
      irrational.</em></p><p><strong>Charisma
      Save</strong></p><p><strong>Failure:</strong> You choose one of the
      following effects for all affected creatures.</p><ul><li><p>You can
      suppress any effect causing a target to be &amp;reference[charmed],
      &amp;reference[frightened] or &amp;reference[goaded]. When this spell
      ends, any suppressed effect resumes, provided that its duration has not
      expired in the meantime. During the time that the effect is suppress you
      do not save at the end of your turn.</p></li><li><p>Targets get
      &amp;reference[charmed] by all creatures of your choice. This charm affect
      ends if the target gets attacked or harmed by a spell or witness any of
      its allies being harmed. When the charm ends, the creature may become
      hostile again at GM
      discretion.</p></li></ul></div><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target two additional creatures
      for each spell level above 2nd.</span></p>
