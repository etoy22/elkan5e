system:
  description:
    value: >-
      <p
      style="margin-top:6.0pt;margin-right:0in;margin-bottom:6.0pt;margin-left:0in"><em>A
      grasshopper's hind leg twitches in your hand or component pouch as you
      whisper and envision your target jumping high into the air.</em></p><p
      class="font8"><strong>Buff</strong></p><ul><li><p class="font8">The
      target's jump distance is tripled. If the target creature moves at least
      10 ft. before jumping, they can make running long jumps of up to three
      times their strength score in distance, or high jumps of a height of 3 x
      (3+ their strength modifier). Round the total possible jump distance to
      the nearest 5 ft. when using this spell. We provide a table below with
      typical jump distances.**</p></li><li><p>When the target falls further
      than 10 ft. and would take fall damage, subtract their running high jump
      height from the fall distance for calculating fall damage. A character
      with this spell doesn't take damage from their own jumps unless falling
      further than they can
      jump.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 1st.</span></p><p></p><p><em>The amount a character
      can move in one jump is still limited by their total movement speed. While
      a character with 20 strength can jump up to 60 ft. with a long jump using
      this spell, they would need to have an effective speed of 70 to pull that
      off- including the 10 ft. of lead up. When not in combat, limit a
      character's total jump distance to a maximum of their speed.</em></p><p
      style="text-align:center"><strong>**Jump Distance Table for Jump Spell
      (with 10 ft. running start)</strong></p><table><tbody><tr><td><p
      style="text-align:center"><strong>Strength Score</strong></p></td><td
      data-colwidth="198"><p style="text-align:center"><strong>Long
      Jump</strong></p></td><td><p style="text-align:center"><strong>High
      Jump</strong></p></td></tr><tr><td><p
      style="text-align:center">8</p></td><td data-colwidth="198"><p
      style="text-align:center">25 ft.</p></td><td><p
