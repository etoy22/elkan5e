      target's AC is increased to 16 if it isn't already higher, and it can't be
      reduced beyond that
      number.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p>
