system:
  description:
    value: >-
      <p><em>You crumble a bit of bark in your hand which offering thanks to the
      tree, then reach out to one of your allies. Their skin takes on a rough,
      bark-like appearance, helping to protect them from harm.</em></p><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
