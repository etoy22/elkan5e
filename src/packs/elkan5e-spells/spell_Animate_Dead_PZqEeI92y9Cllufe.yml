system:
  description:
    value: >-
      <p><em>Scattering a mix of bone dust wet with blood upon the ground, you
      call a nearby corpse back into unlife as either a skeleton or a
      zombie.</em></p><p><strong>Summoning Spell</strong></p><ul><li><p>Your
      spell imbues a target medum or small corpse with a foul mimicry of life,
      raising it as an undead creature. The target becomes a
      @UUID[Compendium.elkan5e.elkan5e-creatures.Actor.er5obJLoWkRJnirv]{skeleton}
      or a
      @UUID[Compendium.elkan5e.elkan5e-creatures.Actor.iyBmfvksjNJz5ueD]{zombie}
      depending on the state of the body.</p></li><li><p>Your summoned undead
      take their turns on your turn (including when you cast the spell), and
      count as &amp;reference[dominated] by you. If you issue no commands or the
      undead's orders do not require immediate action, the undead defends itself
      against hostile creatures.</p></li><li><p>When you lose concentration on
      this spell, the undead servant continues following whatever command you
      last gave it. If the servant finishes its task, it then returns to the
      place where it was summoned and guards that location. Even after you lose
      concentration, the undead cannot harm you, and will not attack anyone you
      tell them not to. **</p></li></ul><p></p><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><p><strong>Upcasting:</strong> <span
      style="font-family:Signika, sans-serif">Animate an additional zombie or
      skeleton</span> for each spell level above 2nd level. Each of the
      creatures must come from a different
      corpse.</p><p></p></div></div><p><span style="font-family:Signika,
      sans-serif"><em>**Animated undead can follow basic commands such as "watch
      for orcs and return here if you see any", but are prone to error when
      given complex tasks that require judgement such as "come find me if you
      see something suspicious". These undead are also susceptible to disguises,
      and if instructed not to attack necromancers in black robes, might not
      attack anyone in a black robe.</em></span></p><p><em>If you die, the
      undead servant becomes completely free-willed, and may wander as it likes.
      Typically, this</em> <em>means the skeleton or zombie will kill any living
      creature it can find.</em></p>
