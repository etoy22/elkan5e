system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">You call upon the power of
      disguise, and an illusory appearance settles over your real
      body.</em></span></p><p><strong>Utility Spell</strong></p><ul><li><p>You
      make yourself look different using an illusion*, including your clothing,
      armor, weapons, and other belongings on your person. You can seem up to 1
      foot shorter or taller and can appear thin, fat, or in between. You must
      adopt a form that has the same basic arrangement of limbs. Otherwise, the
      extent of the illusion is up to you.</p><p>The changes wrought by this
      spell fail to hold up to physical inspection. For example, if you use this
      spell to add a hat to your outfit, objects pass through the hat, and
      anyone who touches it would feel nothing or would feel your head and hair.
      If you use this spell to appear thinner than you are, the hand of someone
      who reaches out to touch you would bump into you while it was seemingly
      still in midair.</p></li></ul><p></p><div class="rd__b  rd__b--3"><p><span
      style="font-family:Signika, sans-serif"><em>*When an illusion is created,
      the caster rolls an illusion check. Roll an ability check with your
      spellcasting ability, adding your proficiency bonus. Any creature with a
      passive perception lower than the illusion check total sees the illusion
      as being real. The caster, as well as any creature that has higher passive
      perception than the illusion total or comes into physical contact with the
      illusion, disbelieves the illusion, and the illusion appears faint and
      translucent to them.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><em>If one creature sees through
      the illusion and tells other creatures, the other creatures can attempt a
      perception check using the search action with a DC equal to the
      illusionist's spell save DC or touch the illusion to disbelieve the
      illusion.</em></span></p></div>
