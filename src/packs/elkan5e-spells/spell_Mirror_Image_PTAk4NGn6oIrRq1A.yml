system:
  description:
    value: >-
      <p><em>You wave your arms and speak an old incantation which, if
      translated, is mocking your opponents for being unable to tell which image
      is you. Three illusory duplicates of yourself appear in your space. Until
      the spell ends, the duplicates move with you and mimic your actions,
      shifting position so it's impossible to track which image is
      real.</em></p><p><strong>Buff</strong></p><p>Your duplicates can only be
      destroyed by attacks that target you. They ignore area of effect damaging
      effects.</p><p>Each time a creature targets you with an attack during the
      spell's duration, roll a [[/r 1d12 # Mirror Image Check]] to determine
      whether the attack instead targets one of your
      duplicates.</p><ul><li><p>If you have <strong>three duplicates</strong>,
      you must roll a <strong>4 or higher</strong> to target a
      duplicate.</p></li><li><p>With <strong>two duplicates</strong>, you must
      roll a <strong>5 or higher</strong>.</p></li><li><p>With <strong>one
      duplicate</strong>, you must roll a <strong>7 or
      higher</strong>.</p></li></ul><p><strong>If someone attacks a
      duplicate:</strong> A duplicate's AC is 15. If an attack hits a duplicate,
      the duplicate is destroyed. The spell ends early if all three duplicates
      are destroyed.</p><p></p><p><em>A creature is unaffected by this spell if
      it can't see, if it relies on senses other than sight, such as
      &amp;reference[blindsight], or if it can perceive illusions as false, as
      with &amp;reference[truesight].</em></p>
