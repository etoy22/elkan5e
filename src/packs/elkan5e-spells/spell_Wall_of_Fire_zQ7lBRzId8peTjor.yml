system:
  description:
    value: >-
      <p>You create a wall of fire on a solid surface within range. You can make
      the wall up to 60 feet long, 20 feet high, and 1 foot thick, or a ringed
      wall up to 20 feet in diameter, 20 feet high, and 1 foot thick. The wall
      is opaque and lasts for the duration.</p><p>When the wall appears, each
      creature within its area must make a Dexterity saving throw. On a failed
      save, a creature takes 5d8 fire damage, or half as much damage on a
      successful save.</p><p>One side of the wall, selected by you when you cast
      this spell, deals 5d8 fire damage to each creature that ends its turn
      within 10 feet of that side or inside the wall. A creature takes the same
      damage when it enters the wall for the first time on a turn or ends its
      turn there. The other side of the wall deals no damage.</p><p></p><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by [[/damage 1d8 fire]]{1d8} for each spell level above
      4th.</p></div></div>
