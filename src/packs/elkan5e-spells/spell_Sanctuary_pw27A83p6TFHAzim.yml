system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>Holding a small silver mirror, you
      catch the reflection of your chosen target. A shimmering barrier forms
      around the target. This barrier doesn't physically block attacks, but it
      make it difficult for creatures to mentally focus on directly attacking
      the shielded target.</em></p><p><strong>Buff</strong></p><ul><li><p>You
      ward a creature within range against attack. Until the spell ends, any
      creature who decides to target the warded creature with an attack or a
      spell or ability that does damage must first make a wisdom saving throw.
      On a failed save, the creature must choose a new target. A creature rolls
      this save before moving to the shielded creature, if applicable, and can
      move after failing the save to reach a new target.</p><p>If the warded
      creature makes an attack, casts a spell that affects an enemy, or deals
      damage to another creature, this spell
      ends.</p></li></ul></div><p></p><p><em>A target affected by Sanctuary can
      be targeted by area of effect abilities that deal damage without the user
      first rolling a wisdom saving throw, but only if the target of Sanctuary
      is not the only target of the ability.</em></p>
