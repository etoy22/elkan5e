system:
  description:
    value: "<p>You summon elementals that appear in unoccupied spaces that you can see within range. You choose one the following options for what appears:</p><ul><li>One elemental of challenge rating 2 or lower</li><li>Two elementals of challenge rating 1 or lower</li><li>Four elementals of challenge rating 1/2 or lower</li><li>Eight elementals of challenge rating 1/4 or lower.</li></ul><p>An elemental summoned by this spell disappears when it drops to 0 hit points or when the spell ends.</p><p>The summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which has its own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions.</p><p></p><p><strong>Upcasting:</strong>\_Summon twice as many creatures when casting this spell at 6th level or higher, or three times as many creatures at 8th level or higher.</p>"
