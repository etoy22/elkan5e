system:
  description:
    value: >-
      <p>Thin and wispy flames wreathe your body for the Duration, shedding
      bright light in a 10-foot radius and dim light for an additional 10 feet.
      You can end the spell early by using an action to dismiss it.</p><p>The
      flames provide you with a warm shi⁠eld or a chill sh⁠ield, as you choose.
      The warm shi⁠eld grants you Resistance to cold damage, and the chill
      shi⁠eld grants you resist⁠ance to fire damage.</p><p>In addition, whenever
      a creature within 5 feet of you hits you with a melee Attack, the shiel⁠d
      erupts with flame. The attacker takes 2d8 fire damage from a warm shie⁠ld,
      or 2d8 cold damage from a cold sh⁠ield.</p><p>Here are the
      attacks:</p><p>@UUID[Compendium.elkan5e.elkan5e-spells.Item.B4SNhPQkgrWJ95o7]{Fire
      Shield
      [Hot]}</p><p>@UUID[Compendium.elkan5e.elkan5e-spells.Item.MYhYpT9ToJA7ly7V]{Fire
      Shield [Cold]}</p>
