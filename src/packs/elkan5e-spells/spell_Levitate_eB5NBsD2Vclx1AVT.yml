system:
  description:
    value: "<p><em>You hold a piece of wire, one normally meant to hold small eggs to dip them in paint. You gesture as if lifting a creature or object from afar, offering a prayer to elemental spirits of air. When you lift the wire, the creature or object lifts into the air and gains the ability to float above the ground. While close to the ground, gravity has little effect on them.</em></p><p><strong>Buff</strong></p><p>The spell can levitate a target that weighs up to 500 pounds.</p><ul><li><p>Target immediately rises up to 20 ft. into the air (your choice).</p></li><li><p>Target gains a fly speed of 20 ft. and can hover.</p></li><li><p><span style=\"font-family:Signika, sans-serif\"><strong>Concentration:</strong>\_Once per turn, you can use your action to move the levitated target up to 20 ft., but never higher than 20 ft. off the ground.</span></p></li></ul><p></p><p><strong>Upcasting</strong>: <span style=\"font-family:Signika, sans-serif\">Target one additional creature for each spell level above 2nd.</span></p>"
