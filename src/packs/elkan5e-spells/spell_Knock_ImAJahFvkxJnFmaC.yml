system:
  description:
    value: >-
      <p><em>You knock on a locked or barred object, knocking three times as you
      will the object to open. Your knock reverberates out, loud and clear, and
      the object opens.</em></p><p><strong>Utility
      Spell</strong></p><ul><li><p>A target that is held shut by a mundane lock
      or that is stuck or barred becomes unlocked, unstuck, or unbarred. If the
      object has multiple locks, only one of them is unlocked.</p></li><li><p>If
      the target is affected by
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.fsKqUGAIN0YXi4Dm]{arcane
      lock}</em> of the same level or lower the spell is suppressed for 10
      minutes.</p></li><li><p>When you cast the spell, a loud knock, audible
      from as far away as 300 feet, emanates from the target
      object.</p></li></ul>
