system:
  description:
    value: "<p><em>You hold a handful of dry leaves, grass, or other plant material. You whistle, and the air escaping your lips rips the leaves into tiny pieces as it carries forward and forms a small but powerful dust devil, capable of picking up all but the heaviest of creatures.</em></p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Strength Save</strong></span></p><p>This spell conjures a dust devil 10 ft. across and 30 ft. tall. It can lift up to 1000 pounds of weight, and at your GM's discretion, may rip some objects out of the ground. Creatures of large size or larger may be too heavy to be lifted, restrained, or knocked &amp;reference[prone] by this spell, but they will still take damage.</p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;margin-block-end:0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Failure:</strong>\_Target takes [[/damage 4d6 bludgeoning]] damage, rises 15 ft. off the ground, and is both &amp;reference[restrained] and &amp;reference[prone].\_Target rolls again at end of their turns. On a success, they take half damage and end the restrained condition, falling to the ground prone without taking falling damage.</span></p></li><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;margin-block-end:0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Success:</strong> Half damage, no other effect.</span></p></li><li><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Area Hazard:</strong> The area is &amp;reference[difficultterrain]. Creatures who enter the area must save against the spell.</span></p></li><li><p><span style=\"font-family:Signika, sans-serif\"><strong>Concentration:</strong>\_Once per turn, you can use your bonus action to move the whirlwind up to 15 ft., moving all creatures currently held by the whirlwind and forcing all creatures in its path to roll a save against the spell.</span></p></li></ul><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:1rem;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"></p><div class=\"rd__b  rd__b--3\"><div class=\"rd__b  rd__b--3\"><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*</strong></span><strong>Upcasting</strong>: Increase damage by [[/damage 2d6 bludgeoning]]{2d6} for each spell level above 5th.</p></div></div>"
