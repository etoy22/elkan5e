system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You take control of the weather within 5
      miles of you for the duration. You must be outdoors to cast this spell.
      Moving to a place where you don't have a clear path to the sky ends the
      spell early.</p><div class="rd__spc-inline-post"></div><p>When you cast
      the spell, you change the current weather conditions, which are determined
      by the DM based on the climate and season. You can change precipitation,
      temperature, and wind. It takes [[/r 1d4 * 10]] (1d4 × 10) minutes for the
      new conditions to take effect. Once they do so, you can change the
      conditions again. When the spell ends, the weather gradually returns to
      normal.</p><p>When you change the weather conditions, find a current
      condition on the following tables and change its stage by one, up or down.
      When changing the wind, you can change its direction.</p><table
      class="rd__table 
      stripe-odd-table"><caption>Precipitation</caption><thead><tr><th
      class="col-1 text-center" data-rd-isroller="false">Stage</th><th
      class="col-11"
      data-rd-isroller="false">Condition</th></tr></thead><tbody><tr><td
      class="col-1 text-center">1</td><td class="col-11">Clear</td></tr><tr><td
      class="col-1 text-center">2</td><td class="col-11">Light
      clouds</td></tr><tr><td class="col-1 text-center">3</td><td
      class="col-11">Overcast or ground fog</td></tr><tr><td class="col-1
      text-center">4</td><td class="col-11">Rain, hail, or snow</td></tr><tr><td
      class="col-1 text-center">5</td><td class="col-11">Torrential rain,
      driving hail, or blizzard</td></tr></tbody></table><table
      class="rd__table 
      stripe-odd-table"><caption>Temperature</caption><thead><tr><th
      class="col-1 text-center" data-rd-isroller="false">Stage</th><th
