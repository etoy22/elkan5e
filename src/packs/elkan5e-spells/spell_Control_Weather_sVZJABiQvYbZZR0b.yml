      class="col-1 text-center">1</td><td class="col-11">Unbearable
      heat</td></tr><tr><td class="col-1 text-center">2</td><td
      class="col-11">Hot</td></tr><tr><td class="col-1 text-center">3</td><td
      class="col-11">Warm</td></tr><tr><td class="col-1 text-center">4</td><td
      class="col-11">Cool</td></tr><tr><td class="col-1 text-center">5</td><td
      class="col-11">Cold</td></tr><tr><td class="col-1 text-center">6</td><td
