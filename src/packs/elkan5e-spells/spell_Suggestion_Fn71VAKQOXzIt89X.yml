system:
  description:
    value: >-
      <div><p><em>You place a dab of honey or sweet oil on your lips and offer a
      suggestion to a creature, magically making your words sound appealing to
      them.</em></p><p><strong>Control Spell</strong></p><p>You suggest a
      specific course of action that a creature believes they could finish
      within 8 hours.</p><p>The target must be able to hear and understand you.
      This spell cannot compel someone to do something they would not normally
      consider doing. If a character could not influence a creature to do
      something with a persuasion skill check, the suggestion spell will not
      work either.</p><p><strong>Wisdom
      Save</strong></p><ul><li><p><strong>Failure:</strong> The target is
      &amp;reference[Charmed] by you. While charmed, they make your suggested
      course of action an immediate priority. If the suggested course of action
      leads the target or one of their allies to physical harm, or is about to
      lead them to harm, the spell ends. Targets will generally eat and take
      care of themselves, but only as much as is needed to follow the suggested
      course of action.</p></li><li><p><strong>Success:</strong> No
      effect.</p></li></ul></div><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p><p></p><p><em>You can also specify
      conditions that will trigger an action during the duration. For example,
      you might suggest that a knight give money to the first beggar they meet.
      If the condition isn’t met before the spell expires, the activity isn’t
      performed.</em></p>
