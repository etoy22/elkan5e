system:
  description:
    value: >-
      <p><em>Holding a piece of fur or a feather from the chosen animal, you
      call out for the animal's blessing, asking them to grant abilities to
      those who lack them. A spirit responds with an animal call, enhancing your
      chosen target with their
      prowess.</em></p><p><strong>Buff</strong></p><p>This spell grants
      proficiency in certain skills and other checks. If the target already has
      proficiency on a given roll, they gain no benefit from this spell for that
      check. When you cast this spell, choose one of the following effects to
      bestow on a creature:</p><ul><li><strong>Bear’s Endurance</strong>: The
      target gains proficiency in constitution ability checks, as well as
      constitution saving throws to maintain <span
      class="reference-link">&amp;reference[Concentration]</span>. <strong>Note:
      this effect's automation currently incorrectly gives proficiency in all
      constitution saving throws.</strong></li><li><strong>Bull’s
      Strength</strong>: The target gains proficiency in strength ability checks
      (including skills).</li><li><strong>Cat’s Grace</strong>: The target gains
      proficiency in dexterity ability checks (including
      skills).</li><li><strong>Eagle’s Splendor</strong>: The target gains
      proficiency in charisma ability checks (including
      skills).</li><li><strong>Fox’s Cunning</strong>: The target gains
      proficiency in intelligence ability checks (including
      skills).</li><li><strong>Owl’s Wisdom</strong>: The target gains
      proficiency in wisdom ability checks (including
      skills).</li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p><p></p><p><strong>Note: this spell
      will add all six options as disabled effects. Toggle the chosen effect on
      for each affected character.</strong></p>
