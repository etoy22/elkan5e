system:
  description:
    value: >-
      <p><em>You smile at a creature, say something friendly, and make a
      welcoming or beckoning gesture, magically influencing their mind to see
      you as a friendly face.</em></p><p><strong>Wisdom
      Save</strong></p><ul><li><p><strong>Failure:</strong> The target is
      &amp;Reference[Charmed] by you. The target views you as a friendly
      aquaintance, and cannot harm you, but is not compelled to do as you
      say.</p><p>If you or one of your allies do anything harmful to the target,
      the spell ends. When the spell ends, the creature knows it was charmed by
      you.</p></li><li><p><strong>Success</strong>: No
      effect.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 1st.</span></p>
