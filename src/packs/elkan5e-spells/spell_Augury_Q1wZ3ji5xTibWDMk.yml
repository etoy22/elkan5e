system:
  description:
    value: >-
      <p><em>Rolling bones, reading splatter patterns, laying out ornate cards,
      or employing some other divining tool, you receive an omen about the
      future.</em></p><p><strong>1 Minute (Ritual: 10 Minutes)</strong> - Self -
      2nd Level (Divination) - VSM</p><div class="rd__b  rd__b--3"><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Materials:</strong>
      You require a set of
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.jWPz8vlkooFW63xi]{Augury
      Bones} or something similar, typically valued at 25
      gold.</span></p></div><p><strong>Utility
      Spell</strong></p><p><strong>State a specific course of action</strong>
      that you or your group plan to take <strong>within the next 30
      minutes</strong>. The GM will state one of the
      following:</p><ul><li><p>Weal, if pursuing this course of action is most
      likely better than not pursuing it.</p></li><li><p>Woe, if pursuing this
      course of action will likely make things worse.</p></li><li><p>Weal and
      woe, if both of the above are likely.</p></li><li><p>Nothing, if results
      will most likely be mundane or minor.</p></li></ul><p>The spell doesn’t
      take into account any possible circumstances that might change the
      outcome, such as the casting of additional spells or the loss or gain of a
      companion.</p><p></p><p><em>If you cast the spell two or more times before
      completing your next long rest, there is a cumulative 25 percent chance
      for each casting after the first that you get a random reading. The GM
      makes this roll in secret.</em></p><p><strong>Note: This spell grants your
      character an 'augury' active effect solely to track how many times you've
      cast the spell since your last long rest.</strong></p>
