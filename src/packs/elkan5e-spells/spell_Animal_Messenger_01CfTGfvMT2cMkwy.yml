system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You kneel, holding a morsel of food
      out towards an animal, tempting it to your service with promises of more
      food to come.</em></p><p><strong>Utility
      Spell</strong></p><ul><li><p>Choose a Tiny &amp;reference[beast] you can
      see within range, such as a squirrel or a bird. You specify a location,
      which you must have visited, and a recipient who matches a general
      description, such as a man or woman dressed in the uniform of the town
      guard.</p></li><li><p>You speak a message of up to 30 seconds in length.
      The target beast travels for the duration of the spell towards the
      specified location, covering about 50 miles per 24 hours for a flying
      messenger or 25 miles for other animals.</p></li><li><p>If the messenger
      arrives, it delivers your message to the creature that you described,
      replicating the sound of your voice.</p></li></ul><p></p><div
      class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><strong>Upcasting:</strong> <span style="font-family:Signika,
      sans-serif">Enchant an additional beast</span> for each spell level above
      2nd level. Each beast receives the same message but travels to a different
      location and recipient you specify when you cast the
      spell.</p></div></div></div><p></p><p><em>The messenger can only speak to
      a creature matching the description you gave. If the messenger doesn't
      reach its destination before the spell ends, the message is lost, and the
      beast makes its way back to where you cast this spell.</em></p>
