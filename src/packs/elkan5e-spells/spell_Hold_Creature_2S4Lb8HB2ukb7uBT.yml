  description:
    value: >-
      <div><p><em>You command a creature to submit to your power, and as you
      worm your way into they mind, you bend a small piece of iron. As you do,
      your target feels as if they are unable to move more than slightly, as if
      chained by invisible chains.</em></p><p><span style="font-family:Signika,
      sans-serif"><strong style="box-sizing:border-box;user-select:text">Wisdom
      Save</strong></span></p><ul
