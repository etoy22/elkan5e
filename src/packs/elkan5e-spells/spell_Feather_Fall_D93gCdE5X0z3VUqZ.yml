system:
  description:
    value: >-
      <p><em>Grabbing a small feather or a piece of down, you chant the names of
      your falling allies as your magic makes them more air resistant them as
      they fall, slowing them down to a gentle
      descent.</em></p><p><strong>Buff</strong></p><ul><li><p>A falling
      creature's rate of descent slows to 60 feet per round until the spell
      ends. If the creature lands before the spell ends, it takes no falling
      damage and can land on its feet, and the spell ends for that
      creature.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 1st.</span></p>
