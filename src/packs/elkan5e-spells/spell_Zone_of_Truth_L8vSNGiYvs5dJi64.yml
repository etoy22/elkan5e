system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You draw a circle on the ground by
      pointing with your finger. Glowing softly, it magically compels truth from
      those standing within it. Creatures within the circle can resist the
      effect, and if they successfully resist, you feel a twinge in your mind
      and know who resisted. The spell does not force people to speak, but it
      can prevent lies.</em></p><p><strong>Utility Spell</strong></p><p>You
      create a magical zone that guards against deception. Only you know where
      the circle is, or who is affected. All affected creatures instantly know
      what the spell is doing to them.</p><p><strong>Charisma
      Save</strong></p><ul
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px
      0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><li
      style="box-sizing:border-box;user-select:text"><p><span
      style="font-family:Signika, sans-serif"><strong>Failure: </strong>Target
      cannot say things it believes are untrue while in the circle. If the
      target tries to lie or deliberately mislead someone into believing
      something untrue, their words make no sound. This spell only affects
      spoken language, and not gestures or written or sign
      language.</span></p></li><li
      style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Success:</strong> No
      effect, and you know the target resisted the
      effect.</span></p></li><li><p><span style="font-family:Signika,
      sans-serif"><strong>Area Hazard:</strong> The zone remains in place.
      Targets roll a save when they enter for the first
      time.</span></p></li></ul></div>
