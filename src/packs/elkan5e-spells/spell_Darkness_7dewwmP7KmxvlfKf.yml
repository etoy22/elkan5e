system:
  description:
    value: >-
      <p><em>You either smear a drop of pitch on your hands or step on a piece
      of brittle coal as you imagine darkness spreading into the area you can
      see. All light fails to penetrate the black wispy globe the spell creates,
      which looks like a thick cloud of smoke.</em></p><p><strong>Area
      Hazard</strong></p><ul><li><p>You create darkness that cannot be seen
      through even by creatures with &amp;reference[darkvision]. This magical
      darkness spreads arounds corners.</p></li><li><p>Non-magic light can't
      spread through the darkness.</p></li><li><p>If this spell overlaps with an
      area of light created by a spell of 1st level or lower*, the spell that
      created the light is dispelled.</p></li><li><p>If the point you choose is
      an object you are holding or one that is being worn or carried the
      darkness is exuded by the object and moves with
      it.</p></li></ul><p></p><p><strong>*Upcasting:</strong> The level of
      light-creating spell Darkness can dispel increases by 1 for each spell
      level above 2nd level.</p>
