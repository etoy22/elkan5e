system:
  description:
    value: >-
      <div class="rd__b  rd__b--2">

      <p>You unleash a virulent disease on a creature that you can see within
      range. The target must make a Constitution saving throw. On a failed save,
      it takes <span class="roller render-roller" title="Click to roll. SHIFT to
      roll a critical hit, CTRL to half damage (rounding down)."
      data-packed-dice="{&quot;type&quot;:&quot;dice&quot;,&quot;rollable&quot;:true,&quot;toRoll&quot;:&quot;14d6&quot;,&quot;subType&quot;:&quot;damage&quot;}">14d6</span>
      necrotic damage, or half as much damage on a successful save. The damage
      can't reduce the target's hit points below 1. If the target fails the
      saving throw, its hit point maximum is reduced for 1 hour by an amount
      equal to the necrotic damage it took. Any effect that removes a disease
      allows a creature's hit point maximum to return to normal before that time
      passes.</p>

      </div>
