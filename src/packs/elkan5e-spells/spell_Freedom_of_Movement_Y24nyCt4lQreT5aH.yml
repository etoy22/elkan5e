system:
  description:
    value: >-
      <p>You touch a willing creature. For the Duration, the target's Movement
      is unaffected by difficult terrain, and Spells and other magical Effects
      can neither reduce the target's speed nor cause the target to be Paralyzed
      or Restrained.</p><p>The target can also spend 5 feet of Movement to
      automatically escape from nonmagical restraints, such as Manacles or a
      creature that has it Grappled. Finally, being Underwater imposes no
      penalties on the target's movement or attacks.</p>
