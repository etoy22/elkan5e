    value: "<p><em>You create a glowing dart of magical force. The missile animates and hurtles through the air, unerringly seeking its target.</em></p><p>This spell moves around objects to strike its target, but is completely negated by the <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.k6lJOHWJa0XF2zCb]{Shield} </em>spell.</p><p><strong>Always Hits</strong></p><p>[[/damage 1d4+1 force]] damage<strong>*</strong>.</p><p></p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*At Higher Levels:\_</strong>This spell's damage increases by 2 when you reach 5th level ([[/damage 1d4+3 force]]), 11th level ([[/damage 1d4+5 force]]), and 17th level ([[/damage 1d4+7 force]]).</span></p>"
