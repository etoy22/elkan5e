system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">You
      hold your hand out towards the location you want to create your mage hand,
      briefly close your eyes and say a few magic words, and conjure forth a
      second, magical hand at the position you choose.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Summoning
      Spell</strong></span></p><ul><li><p>It is a tiny
      &amp;reference[elemental]{Elemental}</p></li><li><p>A spectral, floating
      hand appears at a point you choose within range. The hand vanishes if it
      is ever more than 30 feet away from you or if you cast this spell
      again.</p></li><li><p>You can use your action to control the hand. You can
      use the hand to manipulate an object, open an unlocked door or container,
      stow or retrieve an item from an open container, or pour the contents out
      of a vial. You can have the hand fly up to 30 ft. each time you use
      it.</p></li><li><p>The hand can't attack, activate magic items, or carry
      more than 10 pounds. It is clumsy, and automatically fails all
      &amp;reference[sleightOfHand] checks.</p></li><li><p>It is immune to all
      damage and conditions.</p></li></ul>
