system:
  description:
    value: >-
      <p>You create a 20-foot-radius sphere of poisonous, yellow-green fog
      centered on a point you choose within range. The fog spreads around
      corners. It lasts for the duration or until strong wind disperses the fog,
      ending the spell. Its area is heavily obscured.</p><p>When a creature
      enters the spell's area for the first time on a turn or starts its turn
      there, that creature must make a Constitution saving throw. The creature
      takes 5d8 poison damage on a failed save, or half as much damage on a
      successful one. Creatures are affected even if they hold their breath or
      don't need to breathe.</p><p>The fog moves 10 feet away from you at the
      start of each of your turns, rolling along the surface of the ground. The
      vapors, being heavier than air, sink to the lowest level of the land, even
      pouring down openings.</p><p></p><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by [[/damage 1d8 poison]]{1d8} for each spell level above
      5th.</p></div></div>
