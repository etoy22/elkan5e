system:
  description:
    value: >-
      <p>You touch a willing creature and bestow a limited ability to see into
      the immediate future. For the Duration, the target can't be surprised and
      has advantage on Attack rolls, Ability Checks, and Saving Throws.
      Additionally, other creatures have disadvantage on attack rolls against
      the target for the duration.</p><p>This spell immediately ends if you cast
      it again before its Duration ends.</p>
