system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>As you grasp a copper wire or other
      trinket, your lips move, but no sound comes out from your mouth. Instead,
      a creature nearby hears your words in their head. If they possess a
      matching trinket, they can respond in the same way.</em></p><div
      class="rd__spc-inline-post"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Utility
      Spell</strong></span></p><ul><li><p>You say a message of up to 6 seconds
      in length silently (though your lips still move), and your target hears it
      in their head. If your target has a trinket that matches yours*, they can
      respond to your message in the same
      way.</p></li></ul></div></div><p></p><p>*This spell requires a conductive
      object as the material component. Most wizards are taught to cast this
      spell using a small piece of conductive wire, but any small metal object
      will do. Adventuring parties will often commission unique trinkets, such
      as iron pins, to form a message link.</p><div class="rd__b 
      rd__b--3"><p><em>You can cast this spell through solid objects if you are
      familiar with the target and know they are beyond the barrier. Magical
      silence, 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or
      3 feet of wood blocks the spell.</em></p></div>
