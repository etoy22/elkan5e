system:
  description:
    value: >-
      <p><em>You slip a platinum ring onto two allies or reach out in the
      direction of the two linked rings. You speak an old chant to bind their
      souls together for a time. When one of them is injured, the spirit of the
      other sacrifices their life force to share the
      burden.</em></p><p><strong>Action</strong> - 2 Allies (30 ft.) - 2nd Level
      (Abjuration) - VSM - 1 Hour</p><div class="rd__b  rd__b--3"><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Materials:</strong>
      You require a pair of
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.tU3np7ze5Y6YFx0K]{Platinum
      Rings}, typically valued at 50 gold each.</span></p><p><span
      style="font-family:Signika, sans-serif">Your targets must be wearing the
      rings when you cast the spell. Normally this spell has a range of 30 ft.,
      but if you touch two creatures while casting, you can slip the rings onto
      them as part of casting this
      spell.</span></p></div><p><strong>Buff</strong></p><p>A target cannot be
      targeted by this spell if they are unwilling.</p><ul><li><p>While the two
      targets chose are within 60 feet of each other they take half damage from
      all sources, and the other linked creature takes the other half (which
      cannot be reduced in any way).</p></li><li><p>The spell ends if either of
      the targets drops to 0 hit points or if the targets become seperated by
      more than 60 feet. Either of the linked creatures can dismiss the spell at
      the start of their turn.</p></li></ul>
