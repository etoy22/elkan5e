system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A blast of cold air erupts from your
      hands. Each creature in a 60-foot cone must make a Constitution saving
      throw. A creature takes [[/r 8d8]] cold damage on a failed save, or half
      as much damage on a successful one.</p><div
      class="rd__spc-inline-post"><p></p></div><p>A creature killed by this
      spell becomes a frozen statue until it thaws.</p></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><p></p><p><span
