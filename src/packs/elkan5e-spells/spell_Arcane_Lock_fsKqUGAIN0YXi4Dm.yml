system:
  description:
    value: >-
      <p><em>You touch a closed door, window, gate, chest, or other solid
      entryway, scattering gold dust on the door handle or latch. You verbally
      say the password and the names of your chosen allies, and the object
      becomes locked for the duration.</em></p><div class="rd__b 
      rd__b--3"><p><span style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Materials:</strong>
      You require 0.1 pounds of pure
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.Ia9Kl5nqaJlv67VI]{gold dust},
      typically valued at 25 gold. This spell consumes this
      material.</span></p></div><p><strong>Utility Spell</strong></p><p>You and
      the creatures you designate when you cast this spell can open the object
      normally. You also set a password that, when spoken within 5 feet of the
      object, suppresses this spell for 1 minute. Otherwise, it is impassable
      until it is broken or the spell is dispelled or suppressed. Casting
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.ImAJahFvkxJnFmaC]{knock}
      </em>at the same spell level or lower on the object suppresses arcane lock
      for 10 minutes.</p><ul><li><p>As an action you can touch the object and
      can change who you designated to be able to open the door
      manually.</p></li><li><p>While affected by this spell, the object is more
      difficult to break or force open; the DC to break it or pick any locks on
      it increases to 20 + the spell slot level you used to cast this
      spell.</p></li></ul>
