system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Choose one creature, object, or magical
      effect within range. Any spell of 3rd level or lower on the target ends.
      For each spell of 4th level or higher on the target, make an ability check
      using your spellcasting ability. The DC equals 10 + the spell's level. On
      a successful check, the spell ends.</p><p></p></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track)">Upcasting: </strong>This spell can
      automatically end the effects of a spell on the target if the spell's
      level is at least one level lower than the Dispel Magic
      spell.</span></p></div></div>
