system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em style="box-sizing:border-box;user-select:text">You peer
      into a large pearl as you touch an unidentified object. As the object
      appears on the surface of the pearl, information about the object comes to
      your conscious awareness.</em></span></p><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Materials:</strong>
      You require a
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.73U419qEonS61g1l]{large
      pearl}, typically valued at 100 gold.</span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Utility
      Spell</strong></span></p><ul><li><p>If the chosen object is a magic item
      or some other magic-imbued object, you learn its properties and how to use
      them, whether it requires attunement to use, and how many charges it has,
      if any. If the item was created by a spell, you learn which spell created
      it.</p></li></ul></div><p></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Upcasting:
      </strong>This spell can pierce illusions concealing the nature of an
      object if the illusion was cast with a spell of at least one level lower
      than the Identify spell.</span></p>
