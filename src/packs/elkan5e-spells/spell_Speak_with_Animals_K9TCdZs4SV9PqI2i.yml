system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You mutter a few nonsensical sounds,
      which start to sound like words as you cast the
      spell.</em></p><p><strong>Buff</strong></p><ul><li><p>You gain the ability
      to comprehend and verbally communicate with beasts for the duration. The
      knowledge and awareness of many beasts is limited by their intelligence,
      but at minimum, beasts can give you information about nearby locations and
      monsters, including whatever they can perceive or have perceived within
      the past day.</p></li></ul><p></p><p><em>You might be able to persuade a
      beast to perform a small favor for you, at the GM's
      discretion.</em></p><div class="rd__spc-inline-post"><p></p></div></div>
