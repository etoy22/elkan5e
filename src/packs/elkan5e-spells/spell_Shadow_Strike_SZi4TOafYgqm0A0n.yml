name: Shadow Strike
type: spell
img: icons/weapons/swords/sword-broad-serrated-blue.webp
system:
  description:
    value: >-
      <p><em>You brandish your weapons or begin casting a spell, only to
      disappear in a burst of shadows or magical energy. You strike, then
      immediately teleport to your original position again.</em></p><div
      class="rd__b  rd__b--2"><div class="rd__b  rd__b--2"><p><strong>Utility
      Spell</strong></p><p>You can use a hand that's holding a weapon to perform
      the somatic component of this spell.</p><ul><li><p>You teleport up to 30
      ft. to an unoccupied space on the ground, use your action to use your
      &amp;reference[attack] action (or a cantrip or other offensive action)
      against a target within range. Once you have finished attacking your
      target (or targets, if you have multiple), you teleport to your original
      position.</p></li><li><p>Your first attack on this turn has
      advantage.</p></li></ul><p></p></div></div><p><em>Overall, <strong>this
      spell uses both your action and bonus action</strong>. You cannot use more
      than one spell slot in a turn, as usual, so your action cannot be a spell
      of 1st level or higher.</em></p>
