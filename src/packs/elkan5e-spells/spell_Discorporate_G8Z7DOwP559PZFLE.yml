system:
  description:
    value: "<p><em>Placing your fingers in the residue left behind by a ghost, you draw incorporeal symbols in the air, attempting to transfer the ghostly energy to your target.</em></p><p><strong>Charisma</strong> Save</p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Failure:</strong>\_Target becomes a ghostly version of themselves.\_While transformed, the target deals half as much damage with weapon attacks, takes half as much damage from nonmagical physical, acid, cold, fire, and electric damage, is immune to poison and necrotic damage, is immune to the poisoned, petrified, and restrained condition, and can pass through solid objects as difficult terrain (but cannot end their turn inside a solid object or be forcibly moved into one). An incorporeal creature also can't move any object or creature that is not also incorporeal.</span></p></li><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Success:</strong> No Effect</span></p></li></ul><p></p><div class=\"rd__b  rd__b--2\"><div class=\"rd__b  rd__b--2\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\"><strong>Upcasting</strong>: Target one additional creature for each spell level above 4th.</span></p><p></p></div></div><p><em>If a discorporated target would somehow unwillingly end their turn in a solid object, they are immediately moved to the nearest empty space.</em></p>"
    chat: ''
