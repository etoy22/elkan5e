system:
  description:
    value: >-
      <p><em>Calling upon the holy power of your chosen deity, you summon a
      weapon of pure energy into your hand before it flies off and attacks your
      enemies.</em></p><p><strong>Summoning Spell</strong></p><p>You create a
      weapon which can take any form you choose. It cannot be damaged or
      destroyed directly, and follows your commands.</p><ul><li><p>It is a small
      &amp;reference[construct], and acts at the end of your turns.</p><p>It is
      immune to all damage and conditions.</p><p>The spiritual weapon can fly up
      to 30 ft. and make an attack against a creature within 5 ft. of
      it.</p></li></ul><p><strong>Spell
      Attack</strong></p><ul><li><p><strong>Hit:</strong> Target takes 1d8 +
      your spellcasting ability modifer force
      damage.*</p></li></ul><p></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by [[/damage 1d8 force]] for every <strong>two spell
      levels</strong> above 2nd.</p>
