system:
  description:
    value: "<p><em>You hold out a morsel of food appropriate for an animal in front of you. As you whisper, your words sooth the creature to convince it you mean no harm.</em></p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Wisdom</strong> <strong style=\"box-sizing:border-box;user-select:text\">Save</strong></span></p><p>The target &amp;reference[beast] must be able to see and hear you. If the beast's Intelligence is 4 or higher, the spell fails.</p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin-block-end:0px;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Failure:</strong>\_Target is &amp;reference[charmed] by you and your allies, but is not compelled to do as you say.\_</span></p><p style=\"box-sizing:border-box;user-select:text;margin-block-end:0px;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\">If you or one of your allies harms the target, the spell ends.</span></p></li><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin-block-end:0px;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Success:</strong>\_No effect.</span></p></li></ul><p></p><p><strong>Upcasting</strong>: <span style=\"font-family:Signika, sans-serif\">Target one additional beast for each spell level above 1st.</span></p>"
