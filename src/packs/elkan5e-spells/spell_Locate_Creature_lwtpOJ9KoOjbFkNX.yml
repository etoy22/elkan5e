system:
  description:
    value: "<div class=\"rd__b  rd__b--3\"><p>Describe or name a creature that is familiar to you. You sense the direction to the creature's location, as long as that creature is within 1,000 feet of you. If the creature is moving, you know the direction of its movement.</p><div class=\"rd__spc-inline-post\"><p>\_</p></div><p>The spell can locate a specific creature known to you, or the nearest creature of a specific kind (such as a human or a unicorn), so long as you have seen such a creature up close—within 30 feet—at least once. If the creature you described or named is in a different form, such as being under the effects of a <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.wfPXFotkHWY7laah]{Polymorph}</em>\_spell, this spell doesn't locate the creature.</p><p>This spell can't locate a creature if running water at least 10 feet wide blocks a direct path between you and the creature.</p></div>"
