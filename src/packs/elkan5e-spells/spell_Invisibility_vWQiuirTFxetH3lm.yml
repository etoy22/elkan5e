system:
  description:
    value: >-
      <p><em>As you chant a short magical phrase and make a motion with your arm
      as if covering your target with an invisible cloak, your target(s) vanish
      from view. For an unknown reason, this spell fails to function if a single
      eyelash encased in gum arabic isn't on your
      person.</em></p><p><strong>Buff</strong></p><ul><li><p>The target becomes
      &amp;reference[invisible] until the spell ends. Anything the target is
      wearing or carrying that is at least half their size or smaller is
      invisible as long as it is on the target's person. After the target rolls
      an attack roll or casts a spell, the spell
      ends.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p>
