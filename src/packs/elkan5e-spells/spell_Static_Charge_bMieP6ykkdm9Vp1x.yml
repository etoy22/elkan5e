system:
  description:
    value: >-
      <div class="rd__b  rd__b--2"><div class="rd__b  rd__b--2"><p><em>You hold
      out a small conductive metal rod , pointing at your target, concentrating
      static electricity around them.</em></p><p><strong>Constitution</strong>
      <strong>Save</strong></p><ul><li><p><strong>Failure:</strong> [[/damage
      1d6 lightning]] damage<strong>*</strong> and target has disadvantage on
      their next skill check or saving
      throw.</p></li><li><p><strong>Success:</strong> No
      Effect</p></li></ul><p></p><p><strong>*At Higher Levels:</strong> The
      spell's damage increases by <span class="roller render-roller"
      title="Click to roll. SHIFT/CTRL to roll twice."
      data-packed-dice="{">1d6</span> when you reach a total character or
      creature level of 5th level ([[/damage 2d6 lightning]]), 11th level
      ([[/damage 3d6 lightning]]), and 17th level ([[/damage 4d6
      lightning]]).</p></div><p><em>Any creature touching your target is
      harmlessly shocked. At the GM's discretion, the target may not suffer
      disadvantage on a saving throw against electricity damage (due to
      lightning taking the path of least resistance).</em></p></div>
