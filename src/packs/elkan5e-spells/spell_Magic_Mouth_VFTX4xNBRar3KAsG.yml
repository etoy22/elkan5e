system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You place your mouth close to an
      object. You scatter a small amount of lapis lazuli dust, and say "Accept
      these words, which I now place in your mouth." You then speak a message up
      to 30 seconds long, and set the condition for the object to repeat your
      message. When the object speaks, it appears to form a mouth and the
      message is played in your voice.</em></p><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Materials:</strong>
      You require 0.1 pounds of pure
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.obmHkoF0Lp9AX6P8]{Lapis
      Lazuli Dust}, typically valued at 10 gold. This spell consumes this
      material.</span></p><p><strong>Utility Spell</strong></p><ul><li><p>You
      implant a message up to 30 seconds long within the object. The message is
      repeated in your voice when a trigger condition is met. You can set the
      message to only occur once, after which the spell is dispelled, or it can
      repeat every time the trigger is met. The trigger can be anything you want
      but must be based on visual or audible conditions that occur within 30
      feet of the object.</p></li><li><p>If the object has a mouth, it animates
      and delivers the message. Otherwise, an illusory mouth forms and speaks
      the message.</p></li></ul></div><p></p><p><em>If the mouth is triggered
      twice at the same time, it will only play the message once. If the message
      finishes playing and then the trigger is met again, it will then start
      playing the message a second time. It does not queue its message or
      restart a message it has already begun speaking.</em></p>
