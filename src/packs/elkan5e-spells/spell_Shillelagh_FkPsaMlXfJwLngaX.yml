system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">You touch a wooden club,
      greatclub, or quarterstaff you are carrying. The wood is enchanted with
      your magical power, allowing you to wield it with ease and strike powerful
      creatures deadly blows.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Utility
      Spell</strong></span></p><ul><li><p>Your chosen weapon now deals magical
      bludgeoning damage. You can use your spellcasting ability instead of
      Strength for attack and damage rolls, and the weapon's damage die becomes
      a d8 if wielded one handed, and a d10 if wielded two-handed. The spell
      ends if you cast it again or if you let go of the weapon.</p></li></ul>
