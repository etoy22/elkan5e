system:
  description:
    value: >-
      <p>You create a sword-shaped plane of force that hovers within range. It
      lasts for the Duration.</p><p>When the sword appears, you make a melee
      spell Attack against a target of your choice within 5 feet of the sword.
      On a hit, the target takes 3d10 force damage. Until the spell ends, you
      can use a Bonus Action on each of your turns to move the sword up to 20
      feet to a spot you can see and repeat this Attack against the same target
      or a different one.</p>
