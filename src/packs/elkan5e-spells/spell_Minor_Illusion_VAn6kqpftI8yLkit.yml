system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">You
      use one of your many simple illusion spells. These don't require magical
      words of power, and may appear to onlookers as simple sleight of hand, but
      your magic allows you to perform even greater feats.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Utility
      Spell</strong></span></p><p>You create an illusory* sound or an image of
      an object within range that lasts for the duration. The illusion ends if
      you cast this spell again.</p><div
      class="rd__spc-inline-post"><ul><li><p>If you create a sound, its volume
      can range from a whisper to a scream. It can be your voice, someone else's
      voice, a lion's roar, a beating of drums, or any other sound you choose.
      The sound continues unabated throughout the duration, or you can make
      discrete sounds at different times before the spell
      ends.</p></li></ul></div><ul><li><p>If you create an image of an
      object—such as a chair, muddy footprints, or a small chest—it must be no
      larger than a 5-foot cube. The image can't create sound, light, smell, or
      any other sensory effect. Physical interaction with the image reveals it
      to be an illusion, because things can pass through it.  A creature can
      carry an illusory object created by this spell so long as the caster
      allows them and is aware of the creature's
      location.</p></li></ul><p></p><p><span style="font-family:Signika,
      sans-serif"><em>*When an illusion is created, the caster rolls an illusion
      check. Roll an ability check with your spellcasting ability, adding your
      proficiency bonus. Any creature with a passive perception lower than the
      illusion check total sees the illusion as being real. The caster, as well
      as any creature that has higher passive perception than the illusion total
      or comes into physical contact with the illusion, disbelieves the
      illusion, and the illusion appears faint and translucent to
      them.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><em>If one creature sees through
      the illusion and tells other creatures, the other creatures can attempt a
      perception check using the search action with a DC equal to the
      illusionist's spell save DC or touch the illusion to disbelieve the
      illusion.</em></span></p></div>
