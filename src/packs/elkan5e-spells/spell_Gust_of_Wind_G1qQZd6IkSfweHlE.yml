system:
  description:
    value: "<div class=\"rd__b  rd__b--3\"><p><em>You exhale, pushing all the air in your lungs forward in the direction of your outstretched hand. Your breath becomes a strong gust that throws objects and creatures around.</em></p><p>Candles, torches, and similar unprotected flames in range of the wind are extinguished.</p><p><strong>Strength Save</strong></p><ul><li><p><strong>Failure:</strong> Targets are pushed 15 feet away from you in a direction following the line.</p></li><li><p><strong>Success:</strong> Nothing</p></li><li><p><span style=\"font-family:Signika, sans-serif\"><strong>Area Hazard:</strong> </span>Any movement going towards you against the direction of the latest gust of wind counts as movement through &amp;reference[difficultterrain].</p></li><li><p><span style=\"font-family:Signika, sans-serif\"><strong>Concentration:</strong>\_On each of your subsequent turns, you </span>can use a bonus action to both change the direction of the wind and have the spell occur again.</p></li></ul></div>"
