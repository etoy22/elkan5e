system:
  description:
    value: >-
      <p><em>Holding a small amount of iron powder, you make either an expanding
      or compressing motion with your hands in the direction of your chosen
      creature. The creature and their apparel change size rapidly, their voice
      deepening or getting higher pitched as they
      do.</em></p><p><strong>Action</strong> - 1 Creature or Object (30 feet.) -
      2nd Level (Transmutation) - VSM - Concentration (1 Hour)</p><p>If the
      target is a creature, everything it is wearing and carrying changes size
      with it. Any item dropped by an affected creature returns to normal size
      at once.</p><p><strong>Constitution Save</strong></p><p>A willing creature
      automatically fails this saving throw as
      normal.</p><p><strong>Failure:</strong> The targets gain one of the
      following effects:</p><ul><li><p><strong>Enlarge:</strong> The target's
      size increases by one size category. If there isn't enough room for the
      target to double their size, the creature or object attains the maximum
      possible size in the space available. The target gains advantage on
      strength saves and strength skill checks but suffers disadvantage on
      dexterity saves and dexterity skill checks. If the target is a creature
      their speeds increase by 5 ft. and their carrying capacity is
      doubled.</p></li><li><p><strong>Reduce:</strong> The target's size
      decreases by one size category. The target gains advantage on dexterity
      saves and dexterity skill checks but suffers disadvantage on strength
      saves and strength skill checks. If the target is a creature their speeds
      decrease by 5 ft. and their carrying capacity is
      halved.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p>
