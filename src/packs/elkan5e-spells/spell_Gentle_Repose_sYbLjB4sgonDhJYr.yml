system:
  description:
    value: >-
      <div><p><em>You place a pinch of salt and a copper piece on each of a
      corpse's eyes or on the body in some way if the eyes no longer exist. You
      say a prayer for their soul, protecting the corpse from desecration,
      either by the passage or time or magic.</em></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Utility
      Spell</strong></span></p><ul><li><p>The target corpse is protected from
      decay and can't become &amp;reference[undead].</p></li><li><p>Days spent
      under the influence of this spell don't count against the time limit of
      spells such as
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.rmliJsYc0Loo3Jgt]{raise
      dead}</em>.</p></li></ul></div><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional corpse for
      each spell level above 2nd.</span></p>
