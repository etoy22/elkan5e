system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You sprinkle a bit of water on one of
      your hands and hold the hand outstretched, causing rain to appear in an
      area you choose, extinguishing flames. Alternatively, by sprinkling sand
      on your hands, you can clear fog in an area you choose, causing the water
      to disperse into the air, where it joins with the clouds if it
      can.</em></p><div class="rd__spc-inline-post"><p><strong>Utility
      Spell</strong></p><p><span style="font-family:Signika, sans-serif">You
      cause one of the following effects.</span></p></div><div class="rd__b 
      rd__b--3"><ul><li><p><span class="entry-title-inner">Create Rain:</span>
      You cause rain to fall from midair in the area you choose, which continues
      to fall for a minute. Overall, this creates about 10 gallons of water
      overall, which remains when the spell is finished, but is very difficult
      to catch much of. This effect also clears light
      smoke.</p></li><li><p>Condense Fog: Fog in the area clears. If a cloud
      created by the
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.KAxrIssIzjSZveQL]{Fog Cloud}
      spell is in the area, the spell ends
      immediately.</p></li></ul></div></div>
