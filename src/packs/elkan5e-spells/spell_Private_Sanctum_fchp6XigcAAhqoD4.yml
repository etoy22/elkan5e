system:
  description:
    value: >-
      <p>You make an area within range magically secure. The area is a cube that
      can be as small as 5 feet to as large as 100 feet on each side. The spell
      lasts for the Duration or until you use an action to dismiss
      it.</p><p>When you cast the spell, you decide what sort of security the
      spell provides, choosing any or all of the following
      properties:</p><ul><li>Sound can't pass through the barrier at the edge of
      the warded area.</li><li>The barrier of the warded area appears dark and
      foggy, preventing vision (including darkvision) through
      it.</li><li>Sensors created by Divination spells can't appear inside the
      protected area or pass through the barrier at its
      perimeter.</li><li>Creatures in the area can't be targeted by divination
      spells.</li><li>Nothing can Teleport into or out of the warded
      area.</li><li>Planar Travel is blocked within the warded
      area.</li></ul><p>Casting this spell on the same spot every day for a year
      makes this effect permanent.</p><p></p><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><p><strong>*Upcasting:</strong> <span
      style="font-family:Signika, sans-serif">The size of the cube increases by
      100 ft.</span> for each spell level above 4th level.</p></div></div>
