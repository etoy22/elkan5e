system:
  description:
    value: >-
      <p>Swarming, biting locusts fill a 20-foot-radius Sphere centered on a
      point you choose within range. The sph⁠ere spreads around corners. The
      sphe⁠re remains for the Duration, and its area is lightly obscured. The
      sphere’s area is difficult terrain.</p><p>When the area appears, each
      creature in it must make a Constitution saving throw. A creature takes
      4d10 piercing damage on a failed save, or half as much damage on a
      successful one. A creature must also make this saving throw when it enters
      the spell’s area for the first time on a turn or ends its turn
      there.</p><p></p><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><span style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
