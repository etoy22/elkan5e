system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>A shimmering shield forms around one
      of your arms, allowing you to block incoming attacks.</em></p><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Buff:</strong></span></p><p>You
      cast this spell to block an incoming attack.</p><p>If you are holding a
      shield, you cannot gain the benefits of your shield and this spell at the
      same time.</p><ul><li><p>You have a +3* bonus to AC for 1 round, including
      against the triggering attack, and you take no damage from magic
      missile.</p></li></ul><p></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      <span style="font-family:Signika, sans-serif">The bonus to AC increases by
      1</span> for each spell level above 1st, <span style="font-family:Signika,
      sans-serif">to a maximum of +5 to AC</span>.</p></div>
