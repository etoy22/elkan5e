system:
  description:
    value: >-
      <p><em>You lay a small handbell at the precipice of a door, window, or
      other opening. Alternatively, you lay the handbell at the center or end of
      a 20 ft. long silver wire. Mentally thinking of your allies, you attune
      the bell to ring when approached by anyone
      unexpected.</em></p><p><strong>Utility Spell
      (Ritual)</strong></p><ul><li><p>Choose a door, a window, or an area within
      range that is no longer than a 20 ft. line. You choose which creatures
      won't set off the alarm, and then until the spell ends, a bell alerts you
      whenever a Tiny or larger creature touches or enters the warded entrance
      or line.</p><p>The alarm produces the sound of a hand bell for 12 seconds
      (2 rounds), and can be heard from within 100 feet. The caster can choose
      to make the bell only audible to themselves when they cast the
      spell.</p></li></ul>
