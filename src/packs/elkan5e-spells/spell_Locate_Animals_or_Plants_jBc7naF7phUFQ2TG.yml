system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You touch a bit of bloodhound fur to
      your nose, heightening your senses and projecting your awareness outside
      of your body. You can smell a plant or animal of your choice in your
      vicinity.</em></p><p><strong>Utility Spell</strong></p><p>Describe or name
      a specific kind of &amp;reference[beast] or
      &amp;reference[plant].</p><ul><li><p>You learn the direction and distance
      to the closest creature or plant of that kind within 5 miles, if any are
      present.</p></li><li><p>If the creature is in motion, you know the
      direction of its movement.</p></li></ul></div><p></p><div class="rd__b 
      rd__b--3"><p><span style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Range increases by 5 miles for each spell level above 2nd.</p></div>
