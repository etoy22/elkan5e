system:
  description:
    value: >-
      <p><em>You drape a small piece of silk over an object or creature, making
      arcane gestures with your hands and speaking old words to twist magical
      signatures to look differently to trained
      diviners.</em></p><p><strong>Utility Spell</strong></p><p>When you cast
      the spell choose one or both of the following effects. If you cast this
      spell on the same creature or object every day for 30 days, placing the
      same effect on it each time, the illusion lasts until it is
      dispelled.</p><ul><li><p><strong>False Aura:</strong> You change the way
      the target appears to spells and magical effects, such as
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.zWjDq2YlL1XWOcji]{Detect
      Magic}</em>, that detect magical auras. You can make a nonmagical object
      appear magical, a magical object appear nonmagical, or change the object’s
      magical aura so that it appears to belong to a specific school of magic
      that you choose. When you use this effect on an object, you can make the
      false magic apparent to any creature that handles the
      item.</p></li><li><p><strong>Mask:</strong> You change the way the target
      appears to spells and magical effects that detect creature types, such as
      a paladin’s
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.0EsX9KRdWSAGuiWG]{Divine
      Sense} or the trigger of a
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.BMJBThELhlLMiJ1e]{Symbol}
      spell. You choose a creature type and other spells and magical effects
      treat the target as if it were a creature of that type.</p></li></ul>
