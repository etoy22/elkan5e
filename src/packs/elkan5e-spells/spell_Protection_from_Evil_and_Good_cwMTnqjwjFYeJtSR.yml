system:
  description:
    value: >-
      <p><em>You sprinkle a tiny bit of holy water or powdered silver and cold
      iron on an ally, offering a prayer and warding them from harm from certain
      magical creatures.</em></p><p><strong>Buff</strong></p><p>The target is
      protected against certain types of creatures: &amp;reference[aberration],
      &amp;reference[celestial], &amp;reference[elemental], &amp;reference[fey],
      &amp;reference[fiend], and &amp;reference[undead].</p><ul><li><p>Creatures
      of those types have disadvantage on attack rolls against the
      target.</p></li><li><p>The target can't be &amp;reference[charmed],
      &amp;reference[frightened], or possessed by those types of creatures. If
      the target is already charmed, frightened, or possessed by such a
      creature, the target has advantage on any new saving throw against the
      relevant effect.</p></li></ul>
