system:
  description:
    value: "<p><em>Holding out a holy or profane symbol, you call upon its power to condemn or weaken your targets.</em></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;text-align:start\"><strong>Charisma Save</strong></p><ul><li><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;text-align:start\"><strong>Failure</strong>:\_The target must subtract [[/r 1d4]] from all attack rolls and saving throws for the duration, rolling 1d4 again for every roll. Target rolls again at end of their turns, ending effect on success.</p></li><li><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;text-align:start\"><strong>Success</strong>:\_No effect.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span style=\"font-family:Signika, sans-serif\">Target one additional creature for each spell level above 1st.</span></p>"
