system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Necromantic energy washes over a creature
      of your choice that you can see within range, draining moisture and
      vitality from it. The target must make a Constitution saving throw. The
      target takes [[/r 8d8]] necrotic damage on a failed save, or half as much
      damage on a successful one. This spell has no effect on undead or
      constructs.</p><div class="rd__spc-inline-post"><p></p></div><p>If you
      target a plant creature or a magical plant, it makes the saving throw with
      disadvantage, and the spell deals maximum damage to it.</p><p>If you
      target a nonmagical plant that isn't a creature, such as a tree or shrub,
      it doesn't make a saving throw, it simply withers and dies.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><p></p><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by either [[/damage 1d8 necrotic]]{1d8} for each spell
      level above 4th.</p></div></div>
