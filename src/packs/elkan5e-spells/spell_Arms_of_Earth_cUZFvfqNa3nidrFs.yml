system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">Saying an incantation to
      draw upon the power contained in an igneous stone you carry, you make a
      grasping gesture at your target location, and the earth surges upwards to
      grab creatures in the radius.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Strength
      Save</strong></span></p><ul
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px
      0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><li
      style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;margin-block-end:0px"><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Failure:</strong> [[/damage
      2d6 bludgeoning]] damage*, and target is &amp;reference[grappled]. Target
      rolls again at end of their turns, ending effect on
      success.</span></p></li><li
      style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;margin-block-end:0px"><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Success:</strong> Half
      damage, no other effect.</span></p></li><li><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Area Hazard:</strong> The
      area is &amp;reference[difficultterrain]. Creatures who remain
      &amp;reference[grappled] take damage again at the end of each of their
      turns.</span></p></li></ul><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;min-height:1rem;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"></p><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><p><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Increase damage by [[/damage 1d6 bludgeoning]]{1d6} for each spell level
      above 2nd.</p></div></div>
