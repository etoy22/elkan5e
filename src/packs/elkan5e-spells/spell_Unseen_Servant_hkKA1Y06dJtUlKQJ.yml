system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">You beckon forth an
      invisible servant, calling its name. Holding a piece of string tied to
      wood, the creature grasps out and takes it from you. This creature, really
      a minor air elemental, performs simple tasks at your
      command.</em></span></p><div class="rd__b  rd__b--2"
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><div
      class="rd__b  rd__b--2" style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Summoning
      Spell</strong></span></p></div></div><ul><li><p>You create an
      &amp;reference[Invisible]
      @UUID[Compendium.elkan5e.elkan5e-creatures.Actor.QHbbzyqIbYaekjXY]{Unseen
      Servant}. It is a medium &amp;reference[elemental] that has AC 10, 1 hit
      point, and all its ability scores are 2, except dexterity which is 10. It
      can't attack. If it drops to 0 hit points, the spell
      ends.</p></li><li><p>The servant can act on your turns. It can move up to
      15 feet and perform simple tasks, such as fetching things, cleaning,
      mending, folding clothes, lighting fires, serving food, and pouring wine.
      Once you give the command, the servant performs the task to the best of
      its ability until it completes the task, then waits for your next
      command.</p></li></ul><p></p><p><em>The unseen servant is not capable of
      interpreting non-literal commands, and may need step-by-step instructions
      for complex tasks. On the other hand, Unseen Servants are often summoned
      for housekeeping duties, and are typically experienced at following such
      commands.</em></p>
