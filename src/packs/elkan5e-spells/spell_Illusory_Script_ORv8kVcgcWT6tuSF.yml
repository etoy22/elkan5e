system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em>You write on a surface, first writing a hidden message,
      then enchanting your ink and pen to write a false message that hides the
      original text beneath an illusion.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Utility
      Spell</strong></span></p><ul><li><p>To you and any creatures you designate
      when you cast the spell, the writing appears normal, written in your hand,
      and conveys whatever meaning you intended when you wrote the text. To all
      others, the writing appears to be an entirely different message, appearing
      in a different hand and potentially even another language that you
      know.</p><p>A creature with <span class="help
      help--hover">truesight</span> can read the hidden
      message.</p></li></ul></div><p></p><div class="rd__b 
      rd__b--3"><p><em>Should the spell be dispelled, the hidden message is
      revealed for all to see.</em></p></div>
