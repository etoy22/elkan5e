system:
  description:
    value: "<div class=\"rd__b  rd__b--3\"><p><em>You uncap a waterskin, letting the water flow out in a direction of your choice. As you hold out your hands, a large torrent of waters jets forth, blasting creatures with a jet of freezing water.</em></p><p><strong>Strength Save</strong></p><ul><li><p><strong>Failure</strong>:\_Targets take [[/damage 2d6 bludgeoning]] damage and [[/damage 1d6 cold]] damage* and are pushed 10 ft. away from you.</p></li><li><p><strong>Success</strong>:\_Half damage<span style=\"font-family:Signika, sans-serif\">, no other effect</span>.</p></li></ul><div class=\"rd__spc-inline-post\"><p></p></div></div><div class=\"rd__b  rd__b--3\"><div class=\"rd__b  rd__b--3\"><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*</strong></span><strong>Upcasting</strong>: Increase damage by [[/damage 1d6 bludgeoning]] and [[/damage 1d6 cold]] for each spell level above 2nd.</p></div></div>"
