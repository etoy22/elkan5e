  description:
    value: >-
      <p><em>You touch a weapon, instilling your magic into it so that it may
      strike faster and harder than before, piercing magical
      defenses.</em></p><p><strong>Enchant Item</strong></p><p>You touch a
      weapon. That weapon becomes a &amp;reference[Magicw] weapon if it wasn't
      already, with a +1 bonus to attack rolls and damage rolls* if it didn't
      already have at least a +1 bonus.</p><p>This spell ends early if you
      finish a short or long rest.</p><p></p><p><strong>*Upcasting:</strong> At
      spell level 4 or 5, the bonus to attack and damage becomes +2 if not
      already higher, and at spell level 6 or higher, the bonus becomes +3.</p>
