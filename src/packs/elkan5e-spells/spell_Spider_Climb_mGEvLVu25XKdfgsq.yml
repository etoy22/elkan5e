system:
  description:
    value: >-
      <p><em>You touch a vial containing a drop of bitumen and a spider (living
      or dead), drawing on the magical energy of the spider. You think of your
      chosen target, chanting to give them the power of the
      spider.</em></p><p><strong>Buff</strong></p><ul><li><p>The target gains
      the ability to move up, down, and across vertical surfaces and upside down
      along ceilings while leaving its hands free.</p></li><li><p>The target
      also gains a climbing speed equal to its walking
      speed.</p></li></ul><p></p><p><strong>Upcasting</strong>: <span
      style="font-family:Signika, sans-serif">Target one additional creature for
      each spell level above 2nd.</span></p>
