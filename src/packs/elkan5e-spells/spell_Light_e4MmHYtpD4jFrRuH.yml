system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">You pass your hand close to
      a firefly, phosphorescent moss, or other naturally glowing thing, chanting
      softly. You then touch an object, which then begins to
      glow.</em></span></p><p><strong>Utility Spell</strong></p><ul><li><p>You
      touch one object that is no larger than 10 feet in any dimension. Until
      the spell ends, the object sheds &amp;reference[brightlight] in a 20-foot
      radius and &amp;reference[dimlight] for an additional 20 feet. The light
      can be colored as you like. Completely covering the object with something
      opaque blocks the light. The spell ends if you cast it again or become
      &amp;reference[Incapacitated].</p></li></ul><p></p><p><em>If you target an
      object held or worn by a hostile creature, that creature must succeed on a
      Dexterity saving throw to avoid the spell.</em></p>
