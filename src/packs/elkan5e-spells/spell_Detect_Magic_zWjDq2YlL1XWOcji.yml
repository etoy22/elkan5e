system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">You
      gain the ability to sense magic, usually in the form of unusual smells.
      Different schools of magic are different to your senses, and if you take a
      moment to stop, you can usually tell where the magic is coming
      from.</em></span></p><p><strong>Buff</strong></p><ul><li><p>You sense the
      presence of magic within 30 feet of you. If you sense magic in this way,
      you can use your action to see a faint aura around any visible creature or
      object in the area that bears magic, and you learn its school of magic in
      the case of active spells. The spell can penetrate most barriers, but it
      is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of
      lead, or 3 feet of wood or dirt.</p></li></ul><p></p>
