system:
  description:
    value: >-
      <p><em>You wet your finger in magical scribing ink and dab it your skin by
      the eyes, ears, or forehead. The ink seeps into the skin, disappearing,
      and an understanding of all spoken and written language spreads through
      your mind.</em></p><p><strong>Utility Spell</strong></p><ul><li><p>You
      understand the literal meaning of any spoken language that you hear. You
      also understand any written language (or sign language) that you see. It
      takes about 1 minute to read one page of text. This spell doesn't decode
      secret messages in a text or a glyph, such as an arcane sigil, only gives
      you the most literal interpretation.</p></li></ul>
