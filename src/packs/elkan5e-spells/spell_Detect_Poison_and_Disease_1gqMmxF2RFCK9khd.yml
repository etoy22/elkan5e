system:
  description:
    value: >-
      <p><em>You hold a yew leaf as you chant a short spell. You gain the
      ability to sense poisons and diseases, usually by amplifying visual or
      olfactory cues that a creature or object is
      contaminated.</em></p><p><strong>Buff</strong></p><div class="rd__b 
      rd__b--3"><ul><li><p>You can sense the presence and location of poisons,
      poisonous creatures, diseases, and creatures afflicted with a poison or a
      disease within 30 feet of you. The spell can penetrate most barriers, but
      it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of
      lead, or 3 feet of wood or dirt.</p></li></ul></div>
