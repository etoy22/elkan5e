system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">You
      shape the image of a small scene, bringing to life what appears in your
      mind with a few words of power as you stretch a small piece of fleece
      slightly in your hand, the illusion stretching and taking form over the
      area you choose.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Utility
      Spell</strong></span></p><ul><li><p>You create an illusion* of an object,
      a creature, or some other visible phenomenon that is no larger than a
      15-foot cube. The image appears at a spot within range and lasts for the
      duration. The image is purely visual; it isn't accompanied by sound,
      smell, or other sensory effects.</p><p>On each of your turns, you can
      cause the image to move to any spot within range. As the image changes
      location, you can alter its appearance so that its movements appear
      natural for the image. For example, if you create an image of a creature
      and move it, you can alter the image so that it appears to be
      walking.</p></li></ul><p></p><p><span style="font-family:Signika,
      sans-serif"><em style="box-sizing:border-box;user-select:text">*When an
      illusion is created, the caster rolls an illusion check. Roll an ability
      check with your spellcasting ability, adding your proficiency bonus. Any
      creature with a passive perception lower than the illusion check total
      sees the illusion as being real. The caster, as well as any creature that
      has higher passive perception than the illusion total or comes into
      physical contact with the illusion, disbelieves the illusion, and the
      illusion appears faint and translucent to them.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin-block-end:0px;color:rgb(25,
      24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;margin:0.5em
      0px;text-align:start"><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">If one creature sees
      through the illusion and tells other creatures, the other creatures can
      attempt a perception check using the search action with a DC equal to the
      illusionist's spell save DC or touch the illusion to disbelieve the
      illusion.</em></span></p></div>
