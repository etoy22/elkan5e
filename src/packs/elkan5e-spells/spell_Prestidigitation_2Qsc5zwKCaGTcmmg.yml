system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Each
      spellcaster's prestidigitations are different, but include various quick
      magic tricks, complete with hand gestures and short magical
      incantations.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Utility
      Spell</strong></span></p><p>You create one of the following effects. Up to
      three can be active at a time. If you cast this spell while three effects
      are already in place, you choose one to end.</p><ul class="rd__list"><li
      class="rd__li ">You create an instantaneous, harmless sensory effect, such
      as a shower of sparks, a puff of wind, faint musical notes, or an odd
      odor. This effect cannot create words, and dissipates within 1
      round.</li><li class="rd__li ">You instantaneously light or snuff out a
      candle, a torch, or a small campfire.</li><li class="rd__li ">You
      instantaneously clean an area or object no larger than 1 cubic
      foot.</li><li class="rd__li ">You chill, warm, or flavor up to 1 cubic
      foot of nonliving material for 1 hour.</li><li class="rd__li ">You make a
      color, a small mark, or a symbol appear on an object or a surface for 1
      hour.</li><li>You cause an unlocked door or window to fly open or slam
      shut.</li></ul></div>
