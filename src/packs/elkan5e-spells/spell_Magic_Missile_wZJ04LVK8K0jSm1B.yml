system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You create a cluster of glowing darts
      of magical force. The missiles animate and hurtle through the air,
      unerringly seeking their target.</em></p><p>This spell is completely
      negated by the
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.k6lJOHWJa0XF2zCb]{Shield}
      </em>spell.</p><p><strong>Always Hits</strong></p><p>Hits three times,
      which can be split between targets when casting: [[/damage 1d4+1 force]]
      damage<strong>*</strong>. If you strike the same target multiple times and
      your target needs to make a concentration check, only roll once for the
      combined damage.</p><p></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Add one missile ([[/damage 1d4+1 force]]{1d4+1 force damage}) for each
      spell level above 1st.</p></div>
