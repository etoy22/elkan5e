system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><em>You hold a forked twig in the air,
      repeating the name of the object you're looking for. With a few hand
      gestures, the twig hones in on the object you're looking for, bending and
      pulling your arm gently in the direction of the
      object.</em></p><p><strong>Utility Spell</strong></p><ul><li><p>Describe,
      name an object that you are familiar with, or locate a specific object
      known to you. Your chosen object must be one you have touched or seen
      before.</p></li><li><p>You sense the closest object that meets the
      requirements that you state.</p></li><li><p>If the object is in motion,
      you know the direction of its
      movement.</p></li></ul><p></p><p><strong>Upcasting</strong>: Range
      increases by 500 feet for each spell level above
      2nd.</p><p></p><p><em>This spell can't locate an object if any thickness
      of lead, even a thin sheet, blocks a direct path between you and the
      object.</em></p></div>
