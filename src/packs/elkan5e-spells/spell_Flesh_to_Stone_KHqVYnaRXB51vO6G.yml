              let saveRoll = (await tactor.rollAbilitySave(saveData.ability, {flavor})).total;

              ChatMessage.create({content: `${tactor.name}'s save roll is ${saveRoll} vs ${saveData.dc}`});
              if (saveRoll < saveData.dc) {
                  if (flag.failures === 2) {
