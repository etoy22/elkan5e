system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em style="box-sizing:border-box;user-select:text">Holding a
      small sprig that once carried edible berries, you ask for nature's
      blessing and magically regrow the berries, now instilled with healing
      magic.</em></span></p><p><strong>Healing</strong></p><ul><li><p>Eight
      berries* appear in your hand. A creature can use their action to eat up to
      eight berries, or a creature can use their action to feed a berry to
      another creature, including unconscious creatures. Eating a berry restores
      1 hit point.</p></li></ul></div><p></p><div class="rd__b  rd__b--3"><div
      class="rd__spc-inline-post"><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong></span><strong>Upcasting</strong>:
      Create four more berries for each spell level above
      1st.</p></div></div></div></div><p><em>A creature that cannot swallow or
      digest the berry cannot gain hit points from this spell.</em></p>
