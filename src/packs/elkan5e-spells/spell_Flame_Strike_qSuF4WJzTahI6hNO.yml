system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A vertical column of divine fire roars
      down from the heavens in a location you specify. Each creature in a
      10-foot-radius, 40-foot-high cylinder centered on a point within range
      must make a Dexterity saving throw. A creature takes [[/damage 4d6 fire]]
      damage and [[/damage 4d6 radiant]] damage on a failed save, or half as
      much damage on a successful one.</p><div
