system:
  description:
    value: >-
      <div class="rd__b  rd__b--2"><div class="rd__b  rd__b--2"><p><em>Pointing
      at a creature you can see, you call upon dark forces, shooting a beam of
      necrotic energy that rots or weathers your target. If your target is
      undead, you are temporarily magically bound together by dark
      tendrils.</em></p><p><strong>Spell
      Attack</strong></p><ul><li><p><strong>Hit:</strong> [[/damage 1d8
      necrotic]] damage<strong>*</strong> and target cannot be healed. If target
      is undead, target has disadvantage on attack rolls against
      you.</p></li></ul><p></p><p><strong>*At Higher Levels:</strong> This
      spell's damage increases by 1d8 when you reach a total character or
      creature level of 5th level ([[/damage 2d8 necrotic]]), 11th level
      ([[/damage 3d8 necrotic]]), and 17th level ([[/damage 4d8
      necrotic]]).</p></div><p><em>Negative energy refers to dark magic that
      drains life or rots and weathers whatever it touches. Whether an elf, a
      zombie, or a wooden door, most things are susceptible.</em></p></div>
