system:
  description:
    value: >-
      <p><em>You touch a bit of spiderweb with your fingers, muttering strange
      spider-like sounds and stretching your fingers slightly as you focus on
      the area where your magical spiderweb spontaneously appears.</em></p><p>If
      the webs aren’t anchored between two solid masses (such as walls or trees)
      or layered across a floor, wall, or ceiling, the conjured web collapses on
      itself and the spell ends. Webs layered over a flat surface have a height
      or depth of 5 ft. rather than the full 20 ft.*</p><p><strong>Dexterity
      Save</strong></p><ul><li><p><strong>Failure:</strong> Target is
      &amp;reference[restrained]. Target rolls a <strong>[[/save str]]</strong>
      <strong>Save</strong> at end of their turns, ending effect on
      success.</p></li><li><p><strong>Success:</strong> No
      effect.</p></li><li><p><strong>Area Hazard:</strong> Once per turn, when a
      target moves at least 5 ft. into a webbed square, they<span
      style="font-family:Signika, sans-serif"> roll a save. </span>The web is
      &amp;reference[difficultterrain] and &amp;reference[lightlyobscured] the
      area. The webs are flammable. If the webs or a creature inside the webs
      takes fire damage, the web will rapidly and harmlessly burn away after 1
      round.</p></li></ul><p></p><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><strong>*Upcasting:</strong> <span
      style="font-family:Signika, sans-serif">The size of the cube increases by
      5 ft.</span> for each spell level above 2nd level.</p></div></div>
