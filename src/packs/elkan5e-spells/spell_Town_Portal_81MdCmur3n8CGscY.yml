name: Town Portal
type: spell
img: icons/environment/settlement/gazebo.webp
system:
  description:
    value: >-
      <p><em>You hold a vessel containing at least half a pound of pure water
      drawn from a fountain or body of water within the chosen settlement. You
      sprinkle a bit of the water on each of the chosen 6 creatures (including
      yourself, if chosen) and you think of the place you want to go as you
      softly chant. When the spell concludes, you fade from view and appear
      safely at your destination.</em></p><p><strong>Materials:</strong> You
      must use at least one pound of water taken from a fountain or body of
      water within the chosen settlement.</p><p><strong>Teleportation
      Spell</strong></p><ul><li><p>When you finish casting this spell, your
      targets are teleported instantly to the edge of the same body of water
      within the chosen town, in a safe space.</p></li></ul><p></p><p><em>This
      spell fails immediately upon beginning to cast it if the body of water
      your water came from is gone, or if the town has been abandoned. Your GM
      may also rule that your chosen location does not count as a town if the
      location has fewer than 100 residents, but some very small towns should
      work with the spell. If this spell fails in this way, your spell slot is
      not expended.</em></p>
