system:
  description:
    value: >-
      <p><em>You say a command word and pour a single drop of mercury into the
      air, which dissipates and forms into a circular, horizontal plane of
      force, 3 feet in diameter and 1 inch thick, which floats 3 feet above the
      ground and follows you, acting as a platform to carry objects or
      people.</em></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Utility
      Spell</strong></span></p><ul><li><p>A floating disk appears in an
      unoccupied space of your choice. It can hold up to 500 pounds. If more
      weight is placed on it, the spell ends, and everything on the disk falls
      to the ground.</p><p>The disk is immobile while you are within 20 feet of
      it. If you move more than 20 feet away from it, the disk follows you so
      that it remains within 20 feet of you. It can move across uneven terrain,
      up or down stairs, slopes and the like, but it can't cross an elevation
      change of 10 feet or more. For example, the disk can't move across a
      10-foot-deep pit, nor could it leave such a pit if it was created at the
      bottom.</p><p>If you move more than 100 feet from the disk (typically
      because it can't move around an obstacle to follow you), the spell
      ends.</p></li></ul>
