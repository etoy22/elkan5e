system:
  description:
    value: >-
      <p><em>You dab your hand on a wet adder's stomach stuffed with rhubarb
      leaves. When you then point at your target and speak the magic command
      phrase, a shimmering green arrow streaks toward them and bursts in a spray
      of acid.</em></p><p><strong>Spell
      Attack</strong></p><ul><li><p><strong>Hit</strong>: Target takes [[/damage
      4d4 acid]] damage* immediately and [[/damage 4d4 acid]] damage* at the end
      of their next turn.</p></li><li><p><strong>Miss:</strong> [[/damage 2d4
      acid]] initial damage, no damage on your next
      turn.</p></li></ul><p></p><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><span style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
