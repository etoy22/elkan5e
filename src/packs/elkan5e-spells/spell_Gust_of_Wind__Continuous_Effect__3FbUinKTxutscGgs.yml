    value: >-
      <p><strong>Bonus Action</strong> - Self (60 ft. line 10 feet wide)</p><div
      class="rd__b  rd__b--3"><p>Candles, torches, and similar unprotected
      flames in range of the wind are extinguished.</p><p><strong>Strength
      Save</strong></p><ul><li><p><strong>Failure:</strong> Targets are pushed
      15 feet away from you in a direction following the
      line.</p></li><li><p><strong>Success:</strong>
      Nothing</p></li><li><p><span style="font-family:Signika,
      sans-serif"><strong>Area Hazard:</strong> </span>Any movement going
      towards you against the direction of the latest gust of wind counts as
      movement through &amp;reference[difficultterrain].</p></li></ul></div>
