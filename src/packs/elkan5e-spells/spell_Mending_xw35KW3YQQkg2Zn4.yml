system:
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p><span style="font-family:Signika,
      sans-serif"><em style="box-sizing:border-box;user-select:text">You place
      two lodestones on either side of a broken object, then hold the broken
      object or its pieces together as you chant your spell, slowly joining the
      object back together. When the spell concludes, the lodestones are sucked
      together by a sudden boost to their magnetism.</em></span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Utility
      Spell</strong></span></p><ul
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px
      0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><li
      style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px"><span
      style="font-family:Signika, sans-serif">This spell repairs a single break
      or tear in an object you touch, such as broken chain link, two halves of a
      broken key, a torn cloak, or a leaking wineskin*. As long as the break or
      tear is no larger than 1 foot in any dimension, and you have all the
      pieces, you mend it, leaving no trace of the former
      damage.</span></p></li></ul><div
      class="rd__spc-inline-post"><p></p></div><p><em>This spell cannot restore
      hit points to a construct, vehicle, or object, and can only repair
      physical damage (bludgeoning, piercing, or slashing damage). If used to
      reattach a body part, the body part is non-functional, as if the nervous
      system or circulatory system failed to connect
      properly.</em></p></div><p><em>You could put a shredded piece of paper
      back together, but you couldn't restore a burned note.</em></p>
