system:
  description:
    value: >-
      <p>You call forth spirits to protect you. They flit around you to a
      distance of 15 feet for the duration. If you are good or neutral, their
      spectral form appears angelic or fey (your choice). If you are evil, they
      appear fiendish.</p><p>When you cast this spell, you can designate any
      number of creatures you can see to be unaffected by it. An affected
      creature's speed is halved in the area, and when the creature enters the
      area for the first time on a turn or starts its turn there, it must make a
      Wisdom saving throw. On a failed save, the creature takes 3d8 radiant
      damage (if you are good or neutral) or 3d8 necrotic damage (if you are
      evil). On a successful save, the creature takes half as much
      damage.</p><p></p><p><span style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">*</strong><strong
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Upcasting</strong>:
      Increase damage by </span><a data-action="roll"
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
