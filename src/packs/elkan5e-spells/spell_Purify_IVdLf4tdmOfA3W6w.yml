system:
  description:
    value: >-
      <p><em>You call out to the poisons afflicting a creature or object,
      drawing them out with a few swift motions, weakening or slowing the
      effects of poisons that are already present, whether in a vial of poison
      or afflicting a creature.</em></p><p><strong>Utility
      Spell</strong></p><ul><li><p>All food and drink in the area is purified
      and rendered free of &amp;reference[poison] and &amp;reference[disease],
      though it may still be rotten or inedible. This has no effect on magical
      poisons or diseases.* This effect is permanent.</p></li><li><p>A creature
      currently afflicted with a poison or disease is bolstered against the
      effect for the next 8 hours. They have advantage on any saves against the
      poison or disease's effects, or any save made to determine if it gets
      worse or better with time.</p></li></ul><p></p><p><span
      style="font-family:Signika, sans-serif">*<strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Upcasting</strong>:
      This spell can remove poisons or diseases from food or drink if cast at
      least one level higher than the level of the spell that made the poison or
      disease, if applicable.</span></p>
