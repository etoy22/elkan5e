system:
  description:
    value: >-
      <p><em>You hold your hand in front of you as if holding a ball and hum a
      single low note. Creatures within the area of silence hear ringing in
      their ears and then nothing.</em></p><p><strong>Utility
      Spell</strong></p><ul><li><p><strong>Area Hazard: </strong>No sound can
      enter or escape the zone of silence and no sound can be heard within. Any
      creature or object within the sphere is immune to &amp;reference[thunder]
      damage. All creatures are &amp;reference[deafened] and
      &amp;reference[silenced] while inside. Casting a spell that includes a
      verbal component is impossible there.</p></li></ul><p></p><div
      class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><p><strong>Upcasting:</strong> <span style="font-family:Signika,
      sans-serif">The radius of the spell increases by 5 ft.</span> for each
      spell level above 2nd level.</p></div></div>
