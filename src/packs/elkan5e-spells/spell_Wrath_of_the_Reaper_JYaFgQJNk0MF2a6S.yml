name: Wrath of the Reaper
type: spell
img: icons/magic/death/weapon-scythe-rune-green.webp
system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif"><em
      style="box-sizing:border-box;user-select:text">With but a single word, you
      call upon the power of death. A scythe descends upon your target. There is
      no avoiding it.</em></span></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Constitution</strong>
      <strong>Save</strong></span></p><p>This spell has no effect on unliving
      &amp;reference[construct].</p><ul
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px
      0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><li
      style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Failure:</strong> target
      takes damage equal to half their maximum hit points, up to a maximum of
      100. If the target has already had their maximum hit points reduced by
      something else, this is half of their original hit point maximum. Target's
      maximum hit points are reduced by the amount of damage taken until they
      next finish a long rest.</span></p></li><li
      style="box-sizing:border-box;user-select:text"><p
      style="box-sizing:border-box;user-select:text;margin:0.5em 0px"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Success:</strong> target
      takes the same damage, but their hit point maximum is not
      reduced.</span></p></li></ul>
