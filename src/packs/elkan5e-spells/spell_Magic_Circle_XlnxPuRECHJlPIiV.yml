system:
  description:
    value: >-
      <div><p>You create a 10-foot-radius, 20-foot-tall cylinder of magical
      energy centered on a point on the ground that you can see within range.
      Glowing runes appear wherever the cylinder intersects with the floor or
      other surface.</p><div><p></p></div><p>Choose one or more of the following
      types of creatures: celestials, elementals, fey, fiends, or undead. The
      circle affects a creature of the chosen type in the following
      ways:</p><ul><li>The creature can't willingly enter the cylinder by
      nonmagical means. If the creature tries to use teleportation or
      interplanar travel to do so, it must first succeed on a Charisma saving
      throw.</li><li>The creature has disadvantage on attack rolls against
      targets within the cylinder.</li><li>Targets within the cylinder can't be
      &amp;reference[Charmed], &amp;reference[Frightened], or possessed by the
      creature.</li></ul><p>When you cast this spell, you can elect to cause its
      magic to operate in the reverse direction, preventing a creature of the
      specified type from leaving the cylinder and protecting targets outside
      it.</p><p></p></div><div><div><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Upcasting:</strong>
      The duration of the spell increases by 1 hour for each spell level above
      3rd level.</span></p><div><p></p></div></div><div><p></p></div></div>
