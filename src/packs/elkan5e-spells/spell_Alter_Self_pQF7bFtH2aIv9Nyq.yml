system:
  description:
    value: >-
      <p><em>You chant the names of several animals and your body distorts in a
      grotesque way as it changes shape and you assume a different
      form.</em></p><p><strong>Action</strong> - Self - 2nd Level (Abjuration) -
      VS - Concentration (8 Hours)</p><p><strong>Utility
      Spell</strong></p><p>You change your appearance. You decide what you look
      like, including your facial features, hair length, height, weight, sex,
      skin color, sound of your voice, etc. You can't appear as a size other
      than medium or small, and you can't gain extra limbs or other body parts,
      and you can't gain any extra abilities. While this spell lasts, you can
      change your appearance as an action.</p><p>While transformed you gain one
      of the following, which cannot be replaced without casting this spell
      again:</p><ul><li><p><strong>Natural Weapons:</strong> Your
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.pRDNsHpNLLk1Qq58]{unarmed
      strikes} are replaced with a natural weapon of your choice, such as claws,
      horns, or hooves. You are proficient with this natural weapon. The natural
      weapon deals [[/r 1d6]] bludgeoning, piercing, or slashing damage, as
      appropriate to the natural weapon you chose. It has a 5 ft. range, is
      magic, and you have a +1 bonus to the attack and damage rolls you make
      using it.</p></li><li><p><strong>Aquatic Adaptation:</strong> You adapt
      your body to an aquatic environment, sprouting gills and growing webbing
      between your fingers. You can breathe underwater and gain a swimming speed
      equal to your walking speed.</p></li></ul>
