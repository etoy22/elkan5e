system:
  description:
    value: >-
      <div class="rd__b  rd__b--2"><p><em>You call upon the power of water,
      forming a fog cloud where you reach out your hand.</em></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong
      style="box-sizing:border-box;user-select:text">Utility
      Spell</strong></span></p><ul><li><p>You create a 20-foot-radius sphere of
      fog centered on a point within range. The sphere spreads around
      corners.</p></li><li><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Area
      Hazard:</strong> The </span>area is &amp;reference[heavilyobscured]. It
      lasts for the duration or until a wind of moderate or greater speed (at
      least 10 miles per hour) disperses it. This spell also doesn't function
      underwater.</p></li></ul></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><p></p><p><strong>Upcasting:</strong> <span
      style="font-family:Signika, sans-serif">The radius of the spell increases
      by 20 ft.</span> for each spell level above 1st level.</p></div></div>
