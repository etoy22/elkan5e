    value: >-
      <p>Scale mail is made of overlapping scale shaped metal plates attached to
      a cloth or leather backing. It is extremely rare to see a suit of scale
      mail made of actual animal or monster scales, but such things do exist
      where the monster's scales are thick and durable, like those of dragons.
      Mundane scale mail is iron, bronze, or steel.</p>
