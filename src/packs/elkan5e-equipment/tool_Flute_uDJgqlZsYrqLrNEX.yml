    value: >-
      <p>Artist's Tools are used primarily by characters to create
      art.</p><p>Each type of musical instrument requires a separate
      proficiency. When you learn an instrument, you may choose any instrument,
      pending your GM's approval. Alternatively, you can be a trained singer,
      which requires no instrument to perform music. In Elkan, musical
      instruments are more modern than in most 5e settings. It is reasonable if
      your character plays the Trombone, for example. If you have proficiency
      with a given musical instrument, you can add your proficiency bonus to any
      ability checks you make to play music with the instrument.</p>
