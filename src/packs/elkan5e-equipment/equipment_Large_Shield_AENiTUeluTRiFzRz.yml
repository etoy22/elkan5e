system:
  description:
    value: >-
      <p>Large shields can be made of metal or wood, and provide substantial
      protection to those carrying them. They typically extend to cover one
      flank of the creature carrying them, though they are not so large that
      they hinder movement. Unlike with small shields, the wielder of a large
      shield has little to no ability to manipulate objects with the shield
      hand.</p>
