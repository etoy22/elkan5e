system:
  description:
    value: >-
      <p>Leather armor consists of either layers of leather or a single thick
      layer of leather. The leather is hardened, often by boiling it in oil or
      coating it in a hardening compound. This armor usually only covers the
      torso, and provides more mobility than heavier armor, making it the choice
      for most archers or warriors who depend more on dodging and fast movement
      than tougher armor.​</p>
