name: Devout
type: background
img: icons/skills/social/diplomacy-offering-ritual.webp
system:
  description:
    value: "<p>In many campaign settings, there is a culture where religion plays a central role in nearly everything they do. Some with the devout background were raised by priests. Many with the devout background are raised by devout members of a less devout society, or are members of a small sect or cult.\_</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and one other</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Insight] and &amp;reference[Religion])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.SySQiDfSWcSRUCFN]{Tools}:</strong>\_one set of @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#artists-tools]{Artist's Tools} of your choice​​</p><p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Items:</strong></span>\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 25 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>Cantrips:</strong>\_<em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.zOXEMpARlENZuoL1]{Guidance}</em></p><p><strong>Spells:</strong> <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.cwMTnqjwjFYeJtSR]{Protection from Evil and Good}</em>. You can cast this spell once per long rest without expending a spell slot. If you are a spellcaster, you count this spell as a spell you know and have prepared, and can cast it with a spell slot. This spell is a bonus on top of your normal number of spells known.</p><p></p><p><em>In the world of Elkan, the Solar Hegemony is a predominantly human kingdom ruled by living saints who have ascended and become angels, each embodying one of their revered virtues. The Archangels, the first among the saints, look for mortal paragons of their associated virtues, and raise these mortal paragons as new angels when they die. Further northeast, the gnomish god and Lord of Light, Glanis, walks among his children, encouraging them to take up arms to protect the weak and seek the truth.</em></p>"
