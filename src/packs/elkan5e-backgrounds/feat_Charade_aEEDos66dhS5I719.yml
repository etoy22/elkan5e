name: Charade
type: feat
system:
  description:
    value: >-
      <p><em>You shift your demeanor and body language to appear more or less
      dangerous than you really are. Your enemies then either fight more
      cautiously against you than they need to, or choose to ignore the threat
      you pose.</em></p><p><strong>1 Bonus Action</strong> - Self - 1/Short
      Rest</p><p>Until the end of your next turn, creatures have disadvantage on
      attacks against you.</p>
