folder: RoE8MiIsrMhDqpYQ
name: Noble
type: background
img: icons/environment/settlement/city-hall.webp
system:
  description:
    value: "<p>Nobles tend to grow up outside the larger culture they are part of, with different skills and experiences. While most characters with the noble background would have been born into such a lifestyle, others entered the aristocracy later in life, sometimes through illegal means. Others were never wealthy, but learned to fit into high society regardless.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and two others</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[History] and &amp;reference[Persuasion])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}:</strong>\_three, which can be @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#artists-tools]{Artist's Tools}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.PSBsNmH0WWBmwTMY]{Calligraphers' Tools}, a @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.ArsBY1Z7YMKYCWp5]{Disguise Kit}, a @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.dFa31G5pfZ3FGcjk]{Forgery Kit}, or\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#gaming-set]{Gaming Sets}</p><p><strong>Items</strong>:\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 50 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.xWXxDVeqNj6bPqoi]{Coordinating Direction}</strong></p><p></p><p><em>In the world of Elkan, the country of Karsa is rampant with inequality, and the upper class is built on the suffering of indentured servants and the desperate lower classes. In Mahavala, the leaders are supposedly the most pious, but their religious beliefs mainly involve taking whatever you can to make yourself happy, so they resemble a noble aristocracy more than a priesthood.</em></p>"
    chat: ''
    unidentified: ''
