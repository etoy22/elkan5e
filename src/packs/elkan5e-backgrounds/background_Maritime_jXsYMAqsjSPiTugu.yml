system:
  description:
    value: "<p>Characters with the maritime background grew up in and around sailing and large bodies of water. Whether in the water or on the deck of boats, this character is very comfortable with the water.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and one other</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Athletics] and &amp;reference[Survival])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}:</strong>\_two, which can be @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#artists-tools]{Artist's Tools}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#gaming-set]{Gaming Sets},\_or\_@UUID[Compendium.dnd5e.items.Item.YHCmjsiXxZ9UdUhU]{Navigator's Tools}</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{Vehicles}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#water]{Water Vehicles}</p><p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Items:</strong></span>\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 25 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.4DYt3dmXKgCrnBhO]{Strong Swimmer}</strong></p><p>​​</p><p><em>In the world of Elkan, the Isles of Takat are a cold, unforgiving place. While there is a thriving lumber industry, most youth grow up in the water, rolling logs down rivers or working on ships. The human and elven shipwright families are the most influential, and determine who is able to advance to a lucrative career. Nearby, there are strange creatures in the deeps, but the people of Takat maintain their willingness to brave the terrible tentacled horrors.</em></p>"
    chat: ''
    unidentified: ''
