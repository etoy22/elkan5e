system:
  description:
    value: "<p>In most campaign settings, there is at least one culture where magical training is provided to everyone. In many settings, elves are the ones to build these magical 'utopias'. Most with the Arcanist background, however, are mage's apprentices from a young age, learning from local tutors away from mainstream society.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and two others (often one\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.VZggCkMcvhk0X5Xj]{Magical Languages})</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;Reference[Arcana] and &amp;Reference[Religion])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.SySQiDfSWcSRUCFN]{Tools}:</strong>\_one @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok]{Crafting tool} of your choice</p><p><strong>Items:</strong>\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 30 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>Cantrips:</strong>\_two of your choice from the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.wD6ZbIk07VLdjnYM.JournalEntryPage.fOsoybNgOpSvgpsy]{sorcerer} or @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.wD6ZbIk07VLdjnYM.JournalEntryPage.FqiOWpOazxD8tR1y]{wizard} spell list.</p><p><strong>Spells:</strong>\_<span style=\"font-style:italic\" class=\"wixui-rich-text__text\"><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.zWjDq2YlL1XWOcji]{Detect Magic}</em></span>. You can cast this spell once per long rest without expending a spell slot. If you are a spellcaster, you count this spell as a spell you know and have prepared, and can cast it with a spell slot. This spell is a bonus on top of your normal number of spells known.</p><p></p><p><em>In the world of Elkan, the northern realm of Tyopalvka is a no-man's land blasted by magical experiments, monsters, and bandits. While there is no significant central government in Tyopalvka, many unscrupulous wizards have built towers and lairs here to avoid attention. Knowledge of basic magic has slowly bled out of these towers as the wizards take countless apprentices who are later released back into the general population.</em></p>"
