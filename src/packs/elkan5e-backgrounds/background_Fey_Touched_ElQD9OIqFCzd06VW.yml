name: Fey-Touched
type: background
img: icons/magic/nature/dreamcatcher-green.webp
system:
  description:
    value: "<p>In most campaign settings, most elves and some gnomes grow up in close harmony with nature and fey creatures. This background could also represent anyone growing up with strong elvish or fey influences.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and two others: (usually @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#elvish]{Elvish}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.XKDt41tEzeqkLzvu#gnomish]{Gnomish}, and/or @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.VZggCkMcvhk0X5Xj#sylvan]{Sylvan})</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Animal Handling] and &amp;reference[Nature])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}:</strong>\_two @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#musical-instrument]{Musical Instruments} of your choice and one set of @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#artists-tools]{Artist's Tools} of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.uHNpC0W5EdHCOnP6]{Shortbow}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.u9OIgbETWimkeEx5]{Longbow}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.0hIX4VFLMTXWVYoW]{Shortsword}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.NLDdf7iJt09G64Dg]{Scimitar}, and @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.ZOyejSDAVAH74Z4u]{Longsword}</p><p><strong>Items</strong>:\_one of the above @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{weapons}, and the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold: </strong>10 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>Cantrips:</strong>\_<em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.cUNPAfIYP7tiEHo9]{Druidcraft}</em></p><p><strong>Spells:</strong> <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.K9TCdZs4SV9PqI2i]{Speak with Animals}</em>. You can cast this spell once per long rest without expending a spell slot. If you are a spellcaster, you count this spell as a spell you know and have prepared, and can cast it with a spell slot. This spell is a bonus on top of your normal number of spells known.​​​​</p><p></p><p><em>In the world of Elkan, two cultural groups count as Fey-Touched. The Wood Elves and Forest Gnomes of Ananua live in shrouded forests and live in harmony with nature. The druids of Maronne raise orphans and runaway children alongside fey spirits.</em>\_</p>"
