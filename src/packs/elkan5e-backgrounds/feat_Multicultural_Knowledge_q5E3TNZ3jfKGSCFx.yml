name: Multicultural Knowledge
type: feat
img: icons/consumables/food/bowl-salad-green.webp
system:
  description:
    value: >-
      <p>You have advantage on any skill check requiring basic information about
      the other ancestries and cultures represented in the cities of your
      setting. This could be biological information (like a nature check about
      the dietary needs of a gnome) or cultural information (like an
      &amp;reference[insight] check to tell the difference between an orc joke
      and an orc insult). This doesn't apply to ancient history, but does apply
      to current events.</p>
