folder: RoE8MiIsrMhDqpYQ
name: Forge-Bound
type: background
img: icons/weapons/hammers/hammer-square-white.webp
system:
  description:
    value: "<p>In most campaign settings, dwarves are an intensely conservative society that places a tremendous value on smithing and craftsmanship. In other settings, similar cultures exist among other ethnic groups. Some with the Forge-Bound background are the exceptions in their society, raised by blacksmiths or other craftspeople to carry the legacy of their trade.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and one other (usually @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#dwarvish]{Dwarvish} or @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#goblin]{Goblin})</p><p><strong>Feat:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Athletics] and &amp;reference[History])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{​Tools}:</strong>\_two @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#crafting-tools]{Crafting Tools} or @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{Vehicle types} of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.qqsRY0HoGdEJ6dZr]{Light Hammer}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.ntmAbPMerRRj93Jy]{Mace}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.gpZnusEdpaxAPesT]{Battleaxe}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.rIzJTl2bsFVDNji3]{Handaxe}, @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.3geQ0izotY1xNo8c]{Warhammer}</p><p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Items:</strong></span>\_one of the above @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{weapons}, and the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 30 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>One of:</strong></p><ul><li><p>Feat:\_@UUID[Compendium.elkan5e.elkan-5e-feats.Item.15DYqMSBjFZ0E8sN]{Armor Training} (if you don't already have proficiency with heavy armor)</p></li><li><p>@UUID[Compendium.elkan5e.elkan5e-background.Item.IvUPYu8rBfvr1UnU]{Superior Armor Training}</p></li></ul><p></p><p><em>​​In the world of Elkan, the largest dwarven population lives in Ironhome, where residents spent most days walking around in full-body metal armor. Smithing is something that comes naturally to most dwarves, and many make their own armor. They drink ale, tell boisterous stories, and harden their heart against outsiders. Rumour has it that the dwarves used to be a more open and accepting people, but they are the target of some foul curse.</em></p>"
