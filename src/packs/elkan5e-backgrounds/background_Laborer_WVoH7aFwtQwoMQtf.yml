name: Laborer
type: background
img: icons/containers/misc/wheelbarrow-white.webp
system:
  description:
    value: "<p>Laborers come from humble origins, where they grew up doing manual labor. Many are farmers, miners, or other lower class working people. A player character who is a labourer could be from a small provincial town, where they tended their family farm, they could be an oppressed dockhand working in a big city, or perhaps even a former slave who has since escaped bondage.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and one other</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Athletics] and &amp;reference[Survival])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{​Tools}:</strong>\_two, which can be\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#crafting-tools]{Crafting Tools} or @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#forgery-kit]{Gaming Sets}</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{Vehicles}:</strong>\_one vehicle\_type of your choice</p><p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Items:</strong></span>\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 10 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>One of:</strong></p><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-background.Item.69YxjRtv3sDIfldG]{Laborer's Endurance}</p></li><li><p>@UUID[Compendium.elkan5e.elkan5e-background.Item.fJGA8g8O0nZ40KoG]{Large Frame}</p><p>Click @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.xu7KkQUPMqoEsg19.JournalEntryPage.mfk7fxqfNwqfx3cq]{here} for a breakdown of this ability's effects (3). Note that if you already have Large Frame as a Half-Blood, Minotaur, or Orc, then you can't get this ability twice.​</p></li></ul><p></p><p><em>In the world of Elkan, laborers can be found everywhere. The Borderlands are a place marred by conflict but rife in resources, and cheap laborers are always being brought in from abroad to work the fields and the mines. In metropolis cities like Mothside City, the poor laborers who keep the city running are trampled beneath the feet of their so-called betters, and slavemasters in Mahavala will enslave anyone they can reach, but especially goblinoids.</em></p>"
