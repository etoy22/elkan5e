system:
  description:
    value: "<p>Wild characters spent a large amount of their lives living in the wilderness. Some live on their own, honing their skills, while some live in family groups or small communities. Sometimes this is because of family and cultural influence, and sometimes it's a personal choice made by people trying to escape civilization. Regardless, wild characters tend to experience regular danger in the wilderness.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_Common and one other</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Nature] and &amp;reference[Survival])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.lExi8Y6jXHBv8vd2]{Navigation Tools} and two of:\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#artists-tools]{Artist's Tools},\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#crafting-tools]{Crafting Tools}, or @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{Vehicles}</p><p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Items:</strong></span>\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above (but not @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{vehicles})</p><p><strong>Starting Gold:</strong> 5 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>One of:</strong></p><ul><li><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.TCOc8XypKyuxvv1t]{Solitary Focus}</strong></p></li><li><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.vWyKAQLCByU7pdUU]{Sudden Warning}</strong></p><p></p></li></ul><p><span style=\"font-style:italic\"><em>In the world of Elkan, the Howler orcs spend most of their time in the wilderness, living among the animals. In the Morventry frontier, small halfling families live off their own skills, with little contact with civilization.</em></span></p>"
