name: Outsider
type: background
img: icons/skills/movement/figure-running-gray.webp
system:
  description:
    value: "<p>This background is meant for any character who never fit into the culture of those around them. While they didn't live alone, they were always separate from other people. Sometimes an outsider is a scorned child, sometimes a fugitive, and sometimes just someone who never had a home.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and two others</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Deception] and &amp;reference[Stealth])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}:</strong>\_one @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tool} and either an\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#exploration-tools]{Exploration Tool} or @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.dFa31G5pfZ3FGcjk]{Forgery Kit}</p><p><strong>Items</strong>:\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 10 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.aEEDos66dhS5I719]{Charade}</strong></p><p></p><p><span style=\"font-style:italic\" class=\"wixui-rich-text__text\"><em>In the world of Elkan, the ruined towns of Fallow and Leslie were abandoned after an undead army swept through and killed most of the inhabitants. Most people who now live there are fugitives or pariahs who don't fit in anywhere else.</em></span></p>"
