name: Cosmopolitan
type: background
img: icons/environment/settlement/market-stall.webp
system:
  description:
    value: "<p>Characters with the Cosmopolitan background were influenced by many cultures. A cosmopolitan culture is one that includes and encourages members of different world cultures to come together. In most campaign settings, there will be several urban centers where members of any culture are welcome. Most of the time, these cosmopolitan cities are trade hubs, often located along water, and they usually have a large population.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.5l8QNlgPDPOHpGID]{Languages}:</strong>\_Common and two others (usually @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF]{Trade Languages})</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.rv19GFzEa0nMTuAF]{Skills}:</strong>\_three of your choice: (Recommended: &amp;reference[Persuasion], &amp;reference[Insight], and either &amp;reference[Deception] or &amp;reference[Investigation])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.SySQiDfSWcSRUCFN]{Tools}:</strong>\_any two @UUID[Compendium.elkan5e.elkan5e-rules.SySQiDfSWcSRUCFN]{tools}</p><p><strong>Items</strong>:\_the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 30 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.q5E3TNZ3jfKGSCFx]{Multicultural Knowledge}</strong></p><p><span style=\"font-style:italic\"><em>In the world of Elkan, the country of Karsa is a cosmopolitan place built for the wealthy to partake of extravagant pleasures at the expense of the lower classes and slaves. Outside Karsa, the cities of Mothside City, Ka'uhane, and Batten Cliffs invite anyone to work in their chaotic ports. The Sleeping Towns are watched by gold dragons who prevent anyone from feeling unwelcome. The Borderlands between orc, human, and elven lands are home to varied peoples and never-ending warfare.</em></span></p>"
