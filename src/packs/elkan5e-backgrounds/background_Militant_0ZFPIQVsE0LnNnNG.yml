system:
  description:
    value: "<p>This background is meant to represent any number of militant cultures and organizations that rely on the strength of organized armies to keep up with their magically gifted neighbors. Humans often belong to such a culture, and most campaign settings feature an empire of hobgoblins, sometimes with goblins or bugbears integrated into a militant culture. It is also possible for your character to have been raised by a militant sect within a larger culture.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common} and one other</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lGAvinVvDjAXzQ1Q]{Feat}:</strong> one level 1 feat of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of your choice: (Recommended: &amp;reference[Athletics] and &amp;reference[Intimidation])</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}:</strong>\_one @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#gaming-set]{Gaming Set} of your choice</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{Vehicles}:</strong>\_two @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#vehicles]{vehicle\_type} or mount</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}:</strong>\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.0mJgDHc69dAZQtRr#simple-weapon]{All Simple Weapons}</p><p><strong>Items</strong>:\_one @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.0mJgDHc69dAZQtRr#simple-weapon]{Simple Weapon}, and the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{tools} you gained proficiency with above</p><p><strong>Starting Gold:</strong> 25 gold, which can be spent at character creation to buy nonmagical equipment at base cost.</p><p><strong>@UUID[Compendium.elkan5e.elkan5e-background.Item.keQ2WWtWr78scMvk]{Martial Command}</strong></p><p></p><p><em>In the world of Elkan, the most notable militant culture is the Empire of the Ancestors, which is a massive country founded by immortal hobgoblin Ancestors who live forever by possessing the most physically fit of their descendants.</em>\_</p>"
    chat: ''
    unidentified: ''
  source:
    custom: elkan5e.com/ancestrybackground
