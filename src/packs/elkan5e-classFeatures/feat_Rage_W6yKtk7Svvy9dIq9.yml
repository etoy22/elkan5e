system:
  description:
    value: "<p><em>You enter a state of\_primal ferocity or intense focus.</em></p><p><strong>Bonus Action</strong>\_- Self - 1 Minute</p><p>You have a bonus called the Rage Bonus that increases as you gain levels as a barbarian, listed in the Rage Bonus column of the @UUID[Compendium.elkan5e.elkan5e-class.M8lNLAe2okA9qgFg]{Barbarian Progression Chart}. At level 1, your Rage Bonus is +2.</p><p>While raging, you gain the following benefits:</p><ul><li>Your rage bonus is added to weapon damage with melee weapons (including thrown melee weapons).</li><li>You have resistance to &amp;reference[bludgeoning], &amp;reference[piercing], and &amp;reference[slashing] damage.</li><li>You have advantage on strength checks (including skill checks) and strength saving throws.</li><li>If you are able to cast spells, you can't cast them or concentrate on them while raging.</li><li><p><span style=\"letter-spacing:normal\">Your rage ends early if\_you fall</span> &amp;reference[unconscious]. You can also end your rage at any time of your choice. Once you have raged the number of times shown for your barbarian level in the Rages column of the Barbarian table, you must finish a long rest before you can rage again.</p></li><li><p>Other abilities will give you additional benefits while raging.</p><p></p></li></ul><p>You can use this ability once per long rest at level 1, and gain additional uses of this ability as you level up, listed in the @UUID[Compendium.elkan5e.elkan5e-class.M8lNLAe2okA9qgFg]{Barbarian Progression Chart}.</p>"
