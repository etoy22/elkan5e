system:
  description:
    value: >-
      <p>You formally swear a binding oath, which you can then draw power from.
      Your choice of sacred oath represents you choosing the values and ideals
      you will embody. Your oath grants you features at this level and again at
      6th, 10th, 14th, and 20th level.</p><p>Sacred Oaths published elsewhere
      are compatible with this version of the paladin class.</p><p
      class="font_8">Your oath will have two Channel Conviction options. If you
      choose an oath that's not from Elkan 5e, these will be labeled as 'Channel
      Divinity'. At this level, you choose one of them, which you can use once
      between every short or long rest. The other you then gain at level
      10.</p><p><strong>Note: You'll need to add your sacred oath manually by
      dragging it from the Elkan 5e 'subclasses' compendium onto your features
      list.</strong></p>
