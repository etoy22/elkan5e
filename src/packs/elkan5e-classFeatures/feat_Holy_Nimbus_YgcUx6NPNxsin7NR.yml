      <p><em>You emit powerful radiant energy from your body, channeling the
      power of the sun to burn your enemies.</em></p><p><strong>Bonus
      Action</strong> - Enemies in a 60 ft. Radius - 1 Minute - 1/Long Rest -
      Magical</p><p>When you use this ability, you begin emitting bright light
