      sunlight. When you use this ability, and again on each of your turns as a
      bonus action, you can deal damage to your
      enemies.</p><p><strong>Constitution Saving
      Throw</strong></p><p><strong>Failure:</strong> 20 radiant
      damage.</p><p><strong>Success:</strong> 10 radiant damage.</p>
