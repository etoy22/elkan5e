system:
  description:
    value: "<p>A combination of your patron's power and your own study have granted you the ability to cast spells.\_</p>\n<p>The warlock table shows how many spell slots you have to cast your spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest. For example, if you know the 1st level spell charm person and have a 1st-level and a 2nd-level spell slot available, you can cast charm person using either slot.</p>\n<h3>Cantrips</h3>\n<p>You know two cantrips of your choice from the warlock spell list. You learn additional warlock cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Warlock table.</p>\n<h3>Spell Slots</h3>\n<p>The Warlock table shows how many spell slots you have. The table also shows what the level of those slots is; all of your spell slots are the same level. To cast one of your warlock spells of 1st level or higher, you must expend a spell slot. You regain all expended spell slots when you finish a short or long rest.</p>\n<p>For example, when you are 5th level, you have two 3rd-level spell slots. To cast the 1st-level spell thunderwave, you must spend one of those slots, and you cast it as a 3rd-level spell.</p>\n<h3>Spells Known of 1st Level and Higher</h3>\n<p>\_You know two 1st-level spells of your choice from the warlock spell list. The spells known column of the warlock table shows when you learn more warlock spells of your choice. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 3rd level in this class, you can learn one new spell of 1st or 2nd level.\_</p>\n<p>When you gain a level in this class, you can choose one of the warlock spells you know and replace it with another spell from the warlock spell list, which also must be of a level for which you have spell slots.\_Alternatively, you can replace a cantrip.</p>\n<p>Charisma is your spellcasting ability for your warlock spells, since your magic draws upon your connection to your patron's power.\_</p>\n<p>\_</p>\n<p>You use your charisma whenever a warlock spell refers to your spellcasting ability. In addition, you use your charisma modifier when setting the saving throw DC for a warlock spell you cast and when making an attack roll with one.</p>\n<h3>Spellcasting Ability</h3>\n<p>Charisma is your spellcasting ability for your warlock spells, so you use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a warlock spell you cast and when making an attack roll with one.</p>\n<p><strong>Spell save DC</strong> = 8 + your proficiency bonus + your Charisma modifier</p>\n<p><strong>Spell attack modifier </strong>= your proficiency bonus + your Charisma modifier</p>\n<p>You can cast warlock spells as a ritual if they have the ritual tag.</p>\n<p>You can use a spellcasting focus for casting your spells.</p>\n<h3>Spellcasting Focus</h3>\n<p>You can use an arcane focus as a spellcasting focus for your warlock spells.</p>\n<h3>Multiclassing</h3>\n<p>If you are a multiclass character, your pact magic spell slots are combined additively with spell slots from any other class you may have. When you gain spell slots from either class, they are added to your total number of spell slots for that level.​​​​</p>"
