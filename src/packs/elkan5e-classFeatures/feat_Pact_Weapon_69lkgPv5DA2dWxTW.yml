system:
  description:
    value: >-
      <p
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);margin:0.5em 0px;margin-block-end:0px"><span
      style="font-family:Signika, sans-serif">You can transform one or two
      weapons into your Pact Weapons by performing a special ritual while you
      hold the weapons. You perform the ritual over the course of 1 hour, which
      can be done during a short rest. You can then dismiss the weapons (no
      action required), shunting them into an extradimensional space. You can
      then use an action to summon one or both of the weapons, which appear in
      your hands or on your person (your choice). A weapon ceases being your
      Pact Weapon if you die or if you use the 1-hour ritual again and don't
      include the previous weapon as one of your two Pact Weapons. The weapon
      appears at your feet if it is in the extradimensional space when the bond
      breaks.</span></p><ul
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);margin:0.5em 0px;padding:0px 0px 0px
      1.5em;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><li
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track)"><p><span style="font-family:Signika,
      sans-serif">Whenever you deal damage with a Pact Weapon, it counts as
      magical damage.</span></p></li><li
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track)"><p
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);margin:0.5em 0px;margin-block-end:0px"><span
      style="font-family:Signika, sans-serif">You can use a Pact Weapon as a
      Spellcasting Focus.</span></p></li></ul>
