    value: "<p><span style=\"font-weight:bold\"><strong>Bonus Action</strong></span>\_- 1 Creature</p><p>You can cast a cantrip that doesn't deal damage or buff a creature. Some examples include <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.VAn6kqpftI8yLkit]{minor illusion}</em> or <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.vRUeWAv7ZesZ1Tzj]{thaumaturgy}</em>. When you do, choose one creature within range of the spell to be distracted by the effect. You can use @UUID[Compendium.elkan5e.elkan5e-class-features.Item.8Ctt1vOsZuKXxAIN]{Sneak Attack} on them for the duration of the spell.</p>"
