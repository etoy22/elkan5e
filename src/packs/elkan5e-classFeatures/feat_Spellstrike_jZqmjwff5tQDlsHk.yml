system:
  description:
    value: "<p><strong>As Part of a Weapon Attack</strong>\_- 1 Creature - 5/Long Rest - Magical</p><p>When you hit with a weapon attack, you can channel a spell into your weapon, so long as your target is within the normal range of the cantrip. Choose a cantrip you know that targets only one creature other than yourself. You cannot choose a cantrip that already requires you to make an attack with a weapon, or one that requires you to make more than one attack roll.</p><p>If the cantrip requires an attack roll, such as with the\_<em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.3wT0BXLrGDEtFkUP]{Ray of Frost}</em>\_spell, the target suffers the damage and effects of the spell and takes damage from your weapon.</p><p>If the spell normally requires a saving throw, such as the <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.4rtPXHnqtH8A4LBd]{Vicious Mockery}</em> spell, then the target rolls the saving throw against the effect as normal.</p>"
