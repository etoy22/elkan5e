    value: "<p><span style=\"font-weight:bold\"><strong>Bonus Action</strong></span>\_- 1 Ally (5 ft.) - 1 Round</p><p>You cover an adjacent ally of medium size or smaller. Until the end of your next turn or until they are no longer within 5 ft. of you, they gain &amp;reference[half cover]. While they have &amp;reference[cover] in this way, you may choose to take half of any damage that isn't psychic damage from abilities or attacks that would damage them. You do not transfer @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.NmrCCN5LHdTpspXs]{conditions} or other ongoing effects when you take this damage. Note that if one of you has resistance to the damage, that doesn't mean the other is also resistant.\_</p>"
