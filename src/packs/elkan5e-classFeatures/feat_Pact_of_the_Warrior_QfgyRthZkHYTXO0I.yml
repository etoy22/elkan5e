system:
  description:
    value: "<p>Youu gain the ability to bind weapons with your patron's power. Your patron might send you one or two weapons when you\_gain this feature.</p><ul><li><p>You gain proficiency with all @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.MzJ8wA3QJOZDJ1El]{martial weapons} and with @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#medium-armor]{medium armor}.</p></li></ul><ul><li><p>You can transform one or two weapons into your Pact Weapons by performing a special ritual while you hold the weapons. You perform the ritual over the course of 1 hour, which can be done during a short rest. You can then dismiss the weapons (no action required), shunting them into an extradimensional space. You can then use an action to summon one or both of the weapons, which appear in your hands or on your person (your choice). A weapon ceases being your Pact Weapon if you die or if you use the 1-hour ritual again and don't include the previous weapon as one of your two Pact Weapons. The weapon appears at your feet if it is in the extradimensional space when the bond breaks.</p></li></ul><ul><li><p>Whenever you deal damage with a Pact Weapon, it counts as magical damage.</p></li><li><p>You can use a Pact Weapon as a Spellcasting Focus.</p></li></ul>"
