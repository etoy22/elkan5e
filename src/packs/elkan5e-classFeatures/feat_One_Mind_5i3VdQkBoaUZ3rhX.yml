      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.HPrjgPXLsDRBbfsD]{Mark
      for Death}, your companion gains the benefits as well, dealing the same
      amount of bonus damage on its attacks against the target you marked.</p>
