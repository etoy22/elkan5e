system:
  description:
    value: >-
      <p>When you cast a wizard spell of 1st through 5th level that deals
      damage, you can deal maximum damage with that spell.</p><p>The first time
      you do so, you suffer no adverse effect. <strong>If you use this feature
      again before you finish a long rest</strong>, you take [[/damage 2d12]]
      damage for each level of the spell immediately after you cast it. Each
      time you use this feature again before finishing a long rest, the damage
      per spell level increases by [[/damage 1d12]]. This damage cannot be
      reduced or avoided.</p><p><strong>Note: This feature deals 2d12 damage
      automatically. You may need to edit the damage or deal the damage from
      this feature manually.</strong></p><p>​</p>
