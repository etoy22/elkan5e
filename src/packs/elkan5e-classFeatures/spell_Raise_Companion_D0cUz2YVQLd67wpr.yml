system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif">If your companion dies,
      you can use a ranger spell slot as an action to bring your companion back
      to life or restore its life force, restoring its body if needed. Your
      companion comes back with half its total hit point but no other ill
      effects. This ritual also returns your companion or its body to your
      location if it is separated from you. You can cast this spell without
      using a spell slot to bring back your companion with 1 hit point
      instead.</span></p>
