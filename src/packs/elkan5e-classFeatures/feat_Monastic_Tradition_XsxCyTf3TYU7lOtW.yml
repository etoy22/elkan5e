system:
  description:
    value: >-
      <p>You commit yourself to a monastic tradition. Your choice of monastic
      tradition represents a school of thought that your monk follows to harness
      ki. Your tradition grants you features at this level and again at 6th,
      10th, and 14th level, also listed below.</p><p>Monastic Traditions
      published elsewhere are compatible with this version of the monk class.
      However, due to balance changes to the monk, any subclass feature that
      allows you to make two attacks as a bonus action should instead only allow
      you to make one attack as a bonus action. This is because we redesigned
      the monk to get an additional attack without using their bonus
      action.</p><p><strong>Note: You'll need to add your monastic tradition
      manually by dragging it from the Elkan 5e 'subclasses' compendium onto
      your features list.</strong></p>
