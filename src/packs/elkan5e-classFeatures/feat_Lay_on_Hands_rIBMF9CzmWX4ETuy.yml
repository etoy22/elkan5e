system:
  description:
    value: >-
      <p><em>Your touch can heal wounds.</em></p><p><strong>Action</strong> - 1
      Creature (5 ft.) - Magical</p><p>You have a pool of healing power that
      replenishes when you take a long rest. With that pool, you can restore a
      total number of hit points equal to your paladin level x 5.</p><p>As an
      action, you can touch a creature and draw power from the pool to restore a
      number of hit points to that creature, up to the maximum amount remaining
      in your pool.</p><p>This feature has no effect on
      &amp;reference[construct].</p>
