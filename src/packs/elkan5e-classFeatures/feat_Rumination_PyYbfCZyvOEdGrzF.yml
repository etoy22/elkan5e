  dae:
    macro:
      name: Rumination
      img: icons/magic/control/silhouette-aura-energy.webp
      type: script
      scope: global
      command: |-
        (async () => {
            const rageFeature = actor.items.find(item => item.name == "Rage");
            const barbarian = actor.items.find(item => item.name == "Barbarian");
            if (!rageFeature | !barbarian){
                console.error("Missing the Barbarian class or Rage Feature")
                return
            }
            const barbarianLevels = barbarian.system.levels
            console.log(typeof barbarianLevels)
            let calculate = 1
            if(barbarianLevels>=17){
                calculate  = 3
            }
            else if (barbarianLevels>=9){
                calculate = 2
            }
            const currentValue = rageFeature.system.uses.value;
            const maxValue = rageFeature.system.uses.max;
            const newValue = (Math.min(currentValue+calculate,maxValue))
            await rageFeature.update({"system.uses.value" : newValue});
        })();
