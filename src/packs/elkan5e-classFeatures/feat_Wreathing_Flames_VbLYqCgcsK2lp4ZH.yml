  description:
    value: "<p><strong>No Action Cost</strong>\_- 1 Creature - 1/Turn - 1 Round - Magical</p><p>Once on each of your turns, when you deal damage with a spell that deals &amp;reference[fire] or &amp;reference[radiant] damage, you can choose to temporarily wreath one affected creature in flames.</p><p><strong>Debuff</strong></p><ul><li><p>Unless a creature uses their action to put out the fire or the fire is otherwise put out, the target takes [[/damage 1d8 fire]] damage at the end of their next turn (or the end of the initiative round if the target is an object).\_</p></li></ul>"
