  description:
    value: "<p><strong>Bonus Action</strong>\_- 2/Short Rest</p><p>You gain the ability to twist your environment to your will. When you use Wild Shape, you use one of your wild shape options. When you gain this feature, you pick two of the following wild shape options. When you finish a long rest, you can exchange one of your Wild Shape options for another of the same level. All of these effects count as magical, but they are not spells. All Wild Shape abilities end immediately if you use Wild Shape again or if you become &amp;reference[incapacitated]. You can also end any Wild Shape effect as a bonus action on your turn. Click @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.VLxJ80DY7q7hkXU7.JournalEntryPage.QjLATbZ1uI3tAwjs#druid]{here} for frequently asked questions.</p>"
