system:
  description:
    value: >-
      <p>Choose a Druid Circle. This represents the traditions you followed to
      learn how to wield primal magic. Some druids are members of secret
      societies that call themselves druid circles, and some druids learn their
      magic from a single mentor or even magical creatures.</p><p>Your Druid
      Circle gives you extra features at this level and at levels 6, 10, and 14,
      also listed below.</p><p>Druid circles published elsewhere are compatible
      with this version of the druid class, with the exception of circles that
      directly interact with shapeshifting, which may not be
      compatible.</p><p><strong>Note: You'll need to add your druid circle
      manually by dragging it from the Elkan 5e 'subclasses' compendium onto
      your features list.</strong></p>
