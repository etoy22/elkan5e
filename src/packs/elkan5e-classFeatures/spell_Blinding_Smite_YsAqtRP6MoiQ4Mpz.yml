img: icons/magic/light/projectile-beam-yellow.webp
system:
  description:
    value: "<p>When you hit a creature with a weapon attack, you can expend a spell slot to deal <span class=\"reference-link\"><a class=\"content-link\" draggable=\"true\" data-link data-uuid=\"Compendium.elkan5e.elkan5e-rules.JournalEntry.C3b7Ref9xEVn34Gf.JournalEntryPage.1iv5sIBnKoFJrhMH\" data-id=\"1iv5sIBnKoFJrhMH\" data-type=\"JournalEntryPage\" data-pack=\"elkan5e.elkan5e-rules\" data-tooltip=\"Rule Page\"><i class=\"fas fa-book-open\"></i>Radiant</a></span> damage and attempt to blind the target, in addition to the weapon's damage.</p><p><strong>Constitution Save</strong></p><ul><li><p><strong>Failure</strong>:\_Target takes <span><span class=\"roll-link\" data-type=\"damage\" data-formula=\"4d6\" data-damage-type=\"radiant\"><a data-action=\"roll\"><i class=\"fa-solid fa-dice-d20\"></i>4d6</a></span> radiant</span> damage* and is <span class=\"reference-link\"><a class=\"content-link\" draggable=\"true\" data-link data-uuid=\"Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.SXTqmewRrCwPS8yW\" data-id=\"SXTqmewRrCwPS8yW\" data-type=\"JournalEntryPage\" data-pack=\"elkan5e.elkan5e-rules\" data-tooltip=\"Rule Page\"><i class=\"fas fa-book-open\"></i>Blinded</a><a class=\"enricher-action\" data-action=\"apply\" data-status=\"blinded\" data-tooltip=\"EDITOR.DND5E.Inline.ApplyStatus\" aria-label=\"Apply Status to Selected Tokens\"><i class=\"fas fa-fw fa-reply-all fa-flip-horizontal\"></i></a></span>.\_</p></li><li><p><strong>Success</strong>:\_Target takes <span><span class=\"roll-link\" data-type=\"damage\" data-formula=\"4d6\" data-damage-type=\"radiant\"><a data-action=\"roll\"><i class=\"fa-solid fa-dice-d20\"></i>4d6</a></span> radiant</span> damage.*</p></li></ul><p>​</p><p>​*<strong>Using Higher Level Spell Slots</strong>: Damage increases by <a class=\"inline-roll roll\" data-mode=\"roll\" data-flavor data-formula=\"1d6\" data-tooltip=\"1d6\"><i class=\"fas fa-dice-d20\"></i>1d6</a> for each spell level above 3rd.</p>"
