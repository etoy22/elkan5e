  dae:
    macro:
      name: Magic Coalescence
      img: icons/magic/water/projectiles-ice-explosion.webp
      type: script
      scope: global
      command: |-
        (async () => {
            const sorceryFeature = actor.items.find(item => item.name == "Sorcery Points");
            const sorcererLevels = actor.items.find(item => item.name === "Sorcerer")

            if (!sorceryFeature || !sorcererLevels){
                console.error("Missing Sorcerer Levels or the Sorcery Points Feature")
                return
            }

            const currentValue = sorceryFeature.system.uses.value;
            const maxValue = sorceryFeature.system.uses.max;
            const calculate = Math.floor(sorcererLevels.system.levels/2)
            const newValue = (Math.min(currentValue+calculate,maxValue))

            await sorceryFeature.update({"system.uses.value" : newValue});
        })();
