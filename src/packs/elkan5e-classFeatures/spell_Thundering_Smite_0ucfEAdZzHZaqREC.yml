    value: "<p>When you hit a creature with a weapon attack, you can expend a spell slot to deal &amp;reference[thunder] damage and attempt to throw the target, in addition to the weapon's damage.</p><p><strong>Strength Save</strong></p><ul><li><p><strong>Failure</strong>:\_Target takes [[/damage 3d6 thunder]] damage* and is knocked prone and pushed 5 ft. in a direction of your choice.</p></li><li><p><strong>Success</strong>:\_Target takes [[/damage 3d6 thunder]] damage.*</p></li></ul><p>​</p><p>​*<strong>Using Higher Level Spell Slots</strong>: Damage increases by [[/r 1d6]] for each spell level above 2nd.</p>"
