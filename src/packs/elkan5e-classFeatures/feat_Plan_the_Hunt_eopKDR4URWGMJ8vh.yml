  dae:
    macro:
      name: Plan the Hunt
      img: icons/tools/navigation/map-marked-gold.webp
      type: script
      scope: global
      command: |-
        (async () => {
            const deathFeature = actor.items.find(item => item.name == "Mark for Death");

            if (!deathFeature ){
                console.error("Missing the Mark for Death Feature")
                return
            }

            const currentValue = deathFeature.system.uses.value;
            const maxValue = deathFeature.system.uses.max;
            const calculate = Math.floor(maxValue/2)
            const newValue = (Math.min(currentValue+calculate,maxValue))

            await deathFeature.update({"system.uses.value" : newValue});
        })();
