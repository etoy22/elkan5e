  description:
    value: "<p><strong>No Action Cost</strong>\_- Self or Graveguard (120 ft.) - 1 Minute - Magical</p><p>Whenever you cast a necromancy spell of 1st level or higher, you can give temporary hit points to either yourself or your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.cHeoheBxXYSmJfbv]{graveguard}. This temporarily revives your graveguard if they are dead. The temporary hit points equal three times the spell's level, to a maximum total of 15. These temporary hit points last for 1 minute.</p><p><strong>This ability will grant 3 temporary hit points. You will need to manually set temporary hit points on your target when casting necromancy spells above 1st level.</strong></p>"
