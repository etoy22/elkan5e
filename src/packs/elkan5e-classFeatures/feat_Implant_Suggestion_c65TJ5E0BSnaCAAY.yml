system:
  description:
    value: "<p>You gain the ability to manipulate the minds of creatures at rest, causing them to act according to your interests. You know the <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.Fn71VAKQOXzIt89X]{Suggestion}</em> spell, which is an extra prepared warlock spell for you.\_</p><p>Any time you cast the\_<em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.Fn71VAKQOXzIt89X]{Suggestion}</em>\_spell, the spell has the following modifications:</p><p>The target doesn't have to understand you if its intelligence score is 3 or lower (most beasts and unintelligent monsters).</p><p>The target can be targeted while asleep or &amp;reference[unconscious]. In this case the target has disadvantage on the saving throw, and will carry out your <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.Fn71VAKQOXzIt89X]{suggestion}</em> when they awaken.</p>"
