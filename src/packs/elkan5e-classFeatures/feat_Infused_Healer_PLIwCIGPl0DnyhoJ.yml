system:
  description:
    value: >-
      <p>The healing spells you cast on others heal you as well. When you cast a
      spell of 1st level or higher that immediately restores hit points to a
      creature other than you, you regain hit points equal to 2 + the spell’s
      level.</p><p><strong>Note: You will need to add the spell's level in
      healing manually.</strong></p>
