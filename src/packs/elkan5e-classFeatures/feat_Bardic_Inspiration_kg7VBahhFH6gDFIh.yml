system:
  description:
    value: "<p><em>You inspire an ally at a critical moment, pushing them to succeed rather than fail.</em></p><p><strong>No Action Cost</strong>\_- 1 Ally (60 ft.) - 2/Short Rest* - Magical</p><p>While your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.3u8Og5ABnDcYhudF]{Inspiring Performance} is active, you can inspire an ally when they miss an attack roll, fail a saving throw, or fail a skill check. The ally must be able to hear you. When you inspire your ally, you can roll a d6* and add the number to the total, potentially turning the failure into a success.</p><p>Regardless of whether you succeed or fail together, you expend a use of this ability and your performance ends until you use this ability again. If you have the @UUID[Compendium.elkan5e.elkan5e-class-features.Item.QIiLoZgVJqdEguAX]{Counterpoint} feature, you don't expend a use or end your performance when the roll fails.</p><p>*Your bardic inspiration die changes from a d6 to larger dice and you get more uses of this ability when you reach certain levels in this class, as shown in the @UUID[Compendium.elkan5e.elkan5e-class.Item.SmG14gsqWBtqmcjt]{Bard} Progression Table.\_</p>"
