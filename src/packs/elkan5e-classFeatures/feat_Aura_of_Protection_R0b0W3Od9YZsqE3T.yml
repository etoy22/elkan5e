system:
  description:
    value: >-
      <p>Your presence helps shield allies from harm. Whenever you or a friendly
      creature within 10 feet of you must make a saving throw, the creature
      gains a bonus to the saving throw equal to your Charisma modifier (with a
      minimum bonus of +1). This ability does not function when you are
      &amp;reference[Petrified] or &amp;reference[Unconscious].</p><p>At 18th
      level, the range of this aura increases to 30 feet (also listed
      below).</p>
