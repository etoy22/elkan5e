system:
  description:
    value: >-
      <p>You create a Pact Tome to contain more spells.</p>

      <ul>

      <li>

      <p>When you gain this feature, choose three cantrips from any class's
      spell list. The cantrips you choose can be from different classes. While
      the Pact Tome is on your person, you can cast those cantrips at will as if
      they were warlock spells. These cantrips don't count against your number
      of cantrips known.</p>

      </li>

      <li>

      <p>If you lose your Pact Tome, you can perform a 1-hour ceremony to create
      a replacement. This ceremony can be performed during a short or long rest,
      and it destroys the previous tome. The tome turns to ash when you die.</p>

      </li>

      <li>

      <p>You have learned to regain some of your magical energy using your pact
      tome. Once per day when you finish a short rest, you can choose expended
      spell slots to recover. The spell slots can have a combined level that is
      equal to or less than half your warlock level (rounded up), and none of
      the slots can be 6th level or higher.</p>

      </li>

      </ul>
