system:
  description:
    value: >-
      <p><strong>Action Cost Varies</strong> - 1/Short Rest*</p><p>Your
      connection to your faith allows you to channel divine energy to fuel
      magical effects. You can use your Channel Divinity to cast one of your
      prepared domain spells of up to 3rd level without expending a spell slot.
      When you use Channel Divinity this way, you can cast the spell as if using
      a 2nd or 3rd level spell slot, provided you are high enough level to cast
      2nd or 3rd level spells.</p><p>Your chosen Divine Domain will give you
      more options at higher levels . When you use your Channel Divinity, you
      choose which option to use. Some Channel Divinity effects require saving
      throws. When you use such an effect from this class, the DC equals your
      cleric spell save DC.</p><p>​​</p><p>*At levels 6 and 18, you gain an
      additional use of Channel Divinity between each short rest.</p>
