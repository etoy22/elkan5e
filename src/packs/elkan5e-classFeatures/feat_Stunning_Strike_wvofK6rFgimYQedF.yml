system:
  description:
    value: "<p><strong>As Part of a Weapon Attack</strong>\_- 1 Creature - 3/Long Rest - 1 Round - Magical</p><p><span style=\"letter-spacing:normal\" class=\"wixui-rich-text__text\">Once per turn, you can interfere with the flow of ki in an opponent's body. When you hit another creature with a melee weapon attack, you attempt a stunning strike.</span></p><p><strong>Strength Save</strong></p><p><strong>Failure</strong>: Target is &amp;reference[stunned].</p><p><strong>Success</strong>: No effect.</p><p><span style=\"letter-spacing:normal\" class=\"wixui-rich-text__text\">You can use this ability three times. You gain another use at level 11 and level 17 (also listed below). You regain all uses of this ability when you complete a long rest.</span></p>"
