  description:
    value: "<p>When you hit a creature with a weapon attack, you can expend a spell slot to deal &amp;reference[radiant] damage to the target, in addition to the weapon's damage.</p><ul><li><p><span style=\"font-weight:bold\"><strong>On Hit:\_</strong></span>Target takes [[/damage 2d8 radiant]] damage.* The target becomes visible if it's &amp;reference[invisible], has its silhouette illuminated to shed dim light in a 5-foot radius, and can't become invisible for 1 minute.</p></li></ul><p>​</p><p>​*<strong>Using Higher Level Spell Slots</strong>: Damage increases by [[/r 1d8]] for each spell level above 1st.​</p>"
