system:
  description:
    value: >-
      <p><em>Two of your simplest spells are now so easy for you to cast that
      you can cast them at will.</em></p><p>Choose a 1st-level wizard spell and
      a 2nd-level wizard spell you know. You can cast those spells at their
      lowest level without expending a spell slot. If you want to cast either
      spell at a higher level, you must expend a spell slot as
      normal.</p><p>These spells must:</p><ul><li><p>Have a casting time of 1
      Action.</p></li><li><p>Be on the standard wizard spell list. For example,
      a
      @UUID[Compendium.elkan5e.elkan5e-subclass.Item.wJXoSIzImQPAjnkm]{Necromancer}
      cannot choose
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.HKiFSQzi9E2rgaLV]{Healing
      Word}, even though it is a necromancy spell they can
      learn.</p></li></ul><p></p><p>By spending 8 hours in study, you can
      exchange one or both of the spells you chose for different spells of the
      same level.</p>
