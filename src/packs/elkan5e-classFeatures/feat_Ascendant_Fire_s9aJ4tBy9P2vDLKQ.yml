system:
  description:
    value: >-
      <p><span style="letter-spacing:normal" class="wixui-rich-text__text">Your
      spells that deal &amp;reference[fire] damage ignore fire resistance and
      treat fire immunity as fire resistance. Your spells also ignore the
      effects of a creature’s 'fire absorption' ability.
      </span></p><p></p><p><span style="letter-spacing:normal"
      class="wixui-rich-text__text"><em>When you deal fire damage to a creature
      that is normally resistant, your magic twists their defenses against them.
      When you deal fire damage to a creature that is normally immune, you twist
      your magic to overwhelm their defenses. In the case of some magical
      creatures like elementals, you control and disperse their elemental
      essence.</em></span></p>
