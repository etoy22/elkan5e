system:
  description:
    value: >-
      <p><em>You can lend your aid to another creature in the completion of a
      task or help them land a devastating blow against an
      opponent.</em></p><p><strong>Action</strong> - 1 Creature</p><p>When you
      use the Help action, you choose one of two effects.</p><ul><li><p>The
      creature you aid gains advantage on the next skill check they make to
      perform the task you are helping with, provided that they make the check
      before the start of your next turn.</p></li><li><p>You aid a friendly
      creature in attacking a creature within 5 feet of you. If your ally
      attacks the target before your next turn, their first attack roll is made
      with advantage.</p></li></ul>
