system:
  description:
    value: "<p><span style=\"letter-spacing:normal\"><strong>No Action Cost</strong> - @UUID[Compendium.elkan5e.elkan5e-class-features.Item.Ik6ei7V7ryr5XVoe]{0 to 1 Sorcery Points} - Magical</span></p><p><span style=\"letter-spacing:normal\">When you cast a spell, you can choose to cast that spell without the normal verbal components or without the normal somatic components (which does not cost sorcery points). Alternatively, you can spend 1 sorcery point to cast it without either somatic or verbal components.</span></p><p></p><p></p><p><em>If you cast a spell without verbal components, you don't have to speak for the spell or make noise, and if you cast a spell without somatic components, you don't have to move, meaning you can cast a spell even if &amp;Reference[Restrained]. The spell itself will still be visible and make sound, and may give you away if it originates from you, like a @UUID[Compendium.elkan5e.elkan5e-spells.Item.wZJ04LVK8K0jSm1B]{Magic Missile}\_shooting from your hands.</em></p>"
