folder: wSeYj7YJ85CRRgnP
name: Hijack Shadow
type: feat
_id: Z1WevTWQhrRwwyp8
img: icons/creatures/magical/humanoid-silhouette-dashing-blue.webp
system:
  description:
    value: >-
      <p><strong>Bonus Action</strong> - 1 Creature (5 ft.) - 1 Minute -
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{2
      Ki Points} - Magical</p><p>You can now use hide inside a creature of small
      size or larger's shadow, merging with the shadows on the ground. When you
      do, you roll <a class="content-link" draggable="true"
      data-uuid="Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.LnS51AK4Yi0P53QT"
      data-id="LnS51AK4Yi0P53QT" data-type="JournalEntryPage"
      data-pack="elkan5e.elkan5e-rules" data-tooltip="Rule Page"
      data-scope>stealth</a>​ to hide and then turn <span
      class="reference-link"><a class="content-link"
      data-uuid="Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.GfTD899cLRZxGG1H"
      data-id="GfTD899cLRZxGG1H" data-type="JournalEntryPage"
      data-pack="elkan5e.elkan5e-rules" data-tooltip="Rule
      Page">Invisible</a></span>, occupying your target's space in their shadow.
      If you end your turn and have not moved away from your target, you remain
      in the target's shadow, moving with them when they move on their turn. You
      remain invisible and occupy their space until this effect ends.</p><p>This
      effect ends if you move away from your target, roll an attack roll, or
      cast a spell. When this ability ends, you appear in a space of your choice
      within 5 ft. of your target.</p><p>​</p><p><em>You can be targeted
      (including by the creature whose shadow you hijacked) as if invisible in
      the same space as your target. If you successfully used stealth to hide
      from the creature whose shadow you are hijacking and you haven't given
      away your presence, they usually won't know you're
      there.</em></p><p><em>While you can use this ability in darkness, if the
      target somehow doesn't cast a shadow, you cannot use this ability, and
      this ability ends if your target no longer cast a shadow.</em></p>
