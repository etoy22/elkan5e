system:
  description:
    value: "<p>Choose a &amp;reference[beast] with a CR of ¼ or lower. This beast will level up when you level up, and will be your companion until you die or until you decide to change to a new beast during a level up. If you change to a new companion, your old companion reverts to its original statistics.</p><ul><li><p>The chosen companion loses its multiattack feature if it has one, as well as any other feature that could give it more damage than 1d8 + its ability modifier on a given turn.\_</p></li><li><p>The companion's attack now deals 1d8 + its strength or dexterity modifier damage (whichever is higher), or 1d6 + its strength or dexterity modifier if the creature can fly.\_</p></li><li><p>Your companion’s armor class is equal to 10 + your proficiency bonus if it isn’t already higher.</p></li><li><p>Your companion’s proficiency bonus is equal to yours.</p></li><li><p>Your companion gains proficiency in wisdom saving throws.</p></li><li><p>If not already higher, your companion’s hit points equal 5 + your companion’s constitution modifier, multiplied by your level, or 4 + your companion's constitution modifier if it can fly.</p></li><li><p>Your companion understands all languages you do.</p></li><li><p>When you and your companion take a short rest together and you expend hit dice to regain hit points, your companion regains the same number of hit points.</p></li></ul><p>Your companion acts on its own initiative in combat, but you control it. Your companion dies if it reaches 0 hit points.<br />When gain a level in the ranger class, your companion gains hit points, and when your proficiency bonus increases, so does your companion’s.</p>"
