system:
  description:
    value: >-
      <p>You can now inscribe magical rituals in your Pact Tome. Choose two
      spells that have the ritual tag from any class's spell list; these rituals
      needn’t be from the same spell list, but they must not be a higher spell
      level than you can normally cast. The spells appear in the tome and don't
      count against the number of spells you know.</p><p>With your Pact Tome in
      hand, you can cast the chosen spells as rituals. You can't cast the spells
      except as rituals, unless you've learned them by some other means.</p><p
      style="line-height:normal" class="font_8"><span
      style="letter-spacing:normal">When you level up, you can pick a ritual
      spell from another class's spell list instead of a warlock spell of the
      same level.</span></p><p></p><p><em>1st level ritual spells include
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.Zo1HFoOJBt8vk6zJ]{Alarm},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.Bd3Qt5IS1z5S4356]{Comprehend
      Languages},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.zWjDq2YlL1XWOcji]{Detect
      Magic},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.1gqMmxF2RFCK9khd]{Detect
      Poison and Disease},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.DtqyQCHrAX96VclO]{Identify},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.ORv8kVcgcWT6tuSF]{Illusory
      Script},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.IVdLf4tdmOfA3W6w]{Purify Food
      and Drink},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.K9TCdZs4SV9PqI2i]{Speak with
      Animals},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.SVQbo44OiMZ0fpCS]{Floating
      Disk},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.hkKA1Y06dJtUlKQJ]{Unseen
      Servant}, and any first level spell from other 5e sources that include the
      ritual tag.</em></p>
