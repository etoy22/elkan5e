system:
  description:
    value: "<p>Your training allows you to harness the magic in the air around you. Your access to this energy is represented by a number of ki points. You gain a number of ki points equal to twice your monk level up to level 10, and then one ki point per level from levels 11-20. Reference the Monk @UUID[Compendium.elkan5e.elkan5e-class.VQiQktedzIusKs4y]{Progression Chart} to see your ki total for your level.\_</p><p><span style=\"letter-spacing:normal\">You can spend these points to fuel various ki features, which will have their ki point cost listed at the top of the ability description. </span>At the end of a long rest, you regain all expended ki points.</p><p>Some of your ki features require your target to make a saving throw to resist the feature's effects. The saving throw DC is calculated as follows:</p><p>Ki save DC = 8 + your proficiency bonus + your Wisdom modifier</p><p>Your ki abilities count as magical, but are not spells unless otherwise indicated.</p><p>You gain the following ki abilities.</p><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-class-features.rfkAaOhAsX1HQRuo]{Ki: Flurry of Blows}</p></li></ul><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-class-features.sRA3vPbD6QUAkFZT]{Ki: Patient Defense}</p></li></ul><ul><li><p><span style=\"font-family:var(--font-primary)\">@UUID[Compendium.elkan5e.elkan5e-class-features.UMZY7HTxI0EvRjsT]{Ki: Step of the Wind}</span></p></li></ul>"
