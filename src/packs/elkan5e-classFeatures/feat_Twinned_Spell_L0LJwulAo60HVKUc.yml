system:
  description:
    value: "<p><strong>No Action Cost</strong> - @UUID[Compendium.elkan5e.elkan5e-class-features.Item.Ik6ei7V7ryr5XVoe]{1 to 9 Sorcery Points} - Magical</p><p>When you cast a spell that has a casting time of 1 action or 1 bonus action that targets only one target other than yourself, you can spend a number of sorcery points equal to the spell’s level (1 if the spell is a cantrip) to target a second target in range with the same spell. To be eligible, a spell must not have an area of effect, and must only be capable of targeting one target. A twinned spell cannot benefit from any other metamagic abilities.</p><p></p><p></p><p><em>You may twin a spell if the spell is only capable of targeting one target and is not an area of effect spell. Here's some examples.</em></p><ul><li><p><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.2Wh2etRL3SpfI86v]{Fire Bolt}, which only targets one creature (or object), may be twinned.</em></p></li><li><p><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.2S4Lb8HB2ukb7uBT]{Hold Creature} using a level 2 spell slot, which only targets one creature, may be twinned.</em></p></li><li><p><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.2S4Lb8HB2ukb7uBT]{Hold Creature}\_using a level 3 spell slot, which targets two creatures, cannot be twinned.</em></p></li><li><p><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.pbT9cw6nsjpmwrVZ]{Fireball}, targeting an area with three creatures inside, cannot be twinned.</em></p></li><li><p><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.pbT9cw6nsjpmwrVZ]{Fireball}, targeting an area with only one creature inside, cannot be twinned.</em></p></li><li><p><em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.wZJ04LVK8K0jSm1B]{Magic Missile}, whether or not all the missiles target the same creature, cannot be twinned.</em></p></li></ul>"
