system:
  description:
    value: >-
      <p>You can cast the Pass Without Trace spell at 2nd level using
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{2
      ki points}. Your spellcasting ability for this spell is
      Wisdom.</p><p><em>You mark your forehead with ashes from a burned leaf of
      mistletoe and a sprig of spruce. The mark of ash appears over your chosen
      allies as well as you call it into being, disappearing when the spell
      ends. A veil of shadows and silence radiates from you, masking you and
      your companions from
      detection.</em></p><p><strong>Buff</strong></p><ul><li><p>Each target has
      advantage on Stealth skill checks. None of you leave footprints, disturb
      dust, leave ripples in water, or otherwise leave mundane signs of your
      passage.</p></li></ul><p></p><p><span style="font-family:Signika,
      sans-serif"><strong
      style="box-sizing:border-box;user-select:text;color:rgb(25, 24,
      19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">Using
      Higher Level Spell Slots</strong>: Target one additional creature for each
      spell level above 2nd.</span></p>
