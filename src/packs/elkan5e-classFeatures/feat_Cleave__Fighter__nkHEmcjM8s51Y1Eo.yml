    value: "<p><em>You cleave through foes that are packed together.</em></p><p><strong>Action</strong> - Melee -\_1 Creature\_- Uses Equal to Proficiency Bonus/Long Rest</p><p>You use your normal attack action, but one of your attacks is replaced by Cleave. Make a melee weapon attack against one target creature and all creatures of your choice within 5 ft. of your target. You are still limited by your weapon's normal &amp;reference[reach]. You roll a single synchronous attack roll for all targets, dealing the same damage to each.\_</p>"
