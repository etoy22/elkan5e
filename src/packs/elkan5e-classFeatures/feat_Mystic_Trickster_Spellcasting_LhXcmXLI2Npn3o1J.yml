system:
  description:
    value: "<p>You have dabbled in the spellcasting available to more powerful spellcasters. Your own journey to acquire magical ability is slow, but you have integrated spells into your fighting style in a way few spellcasters can. Choose one of the Bard, Cleric, Druid, Sorcerer, Warlock, or Wizard. Your chosen class determines your spellcasting ability, as well as which spell list you draw your spells from.</p><p>​</p><p><strong>Spell Slots</strong></p><p>The Mystic Trickster Table shows how many spell slots you have to cast your spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest. For example, if you know the 1st level spell Charm Person and have a 1st-level and a 2nd-level spell slot available, you can cast Charm Person using either slot.</p><p><strong>Cantrips</strong></p><p>Cantrips are the simplest and weakest of spells, and can be casted without expending Spell Slots. You know three cantrips of your choice from your spell list.</p><p><strong>Spells Known of 1st Level and Higher</strong><br />You know two 1st-level spells of your choice from your spell list. You learn one more spell for each two levels beyond level 3, as indicated on the spells known column of the Mystic Trickster Table. Each spell you learn must be of a level for which you have spell slots. For example, when you reach level 7 in this class, you can learn one new spell of 1st or 2nd level.\_</p><p><strong>Switching Spells</strong></p><p>When you gain a level in this class, you can choose one of the spells you know and replace it with another spell from your spell list, which also must be of a level for which you have spell slots. Alternatively, you can replace a cantrip.</p><p><strong>Spellcasting Ability</strong></p><p>Your spellcasting ability is based on the class you chose for your spellcasting. Bards, Sorcerers, and Warlocks use charisma. Clerics and Druids use wisdom. Wizards use intelligence.</p><p>You use your chosen spellcasting ability score whenever a spell refers to your spellcasting ability. In addition, you use your spellcasting ability modifier when setting the saving throw DC for a spell you cast and when making an attack roll with one.</p><p>Spell Save DC = 8 + your proficiency bonus + your spellcasting ability modifier</p><p>Spell Attack Modifier = your proficiency bonus + your spellcasting ability modifier​</p><p><strong>Spellcasting Focus</strong></p><p>You can use a spellcasting focus or a component pouch for casting your spells. To do so, you need a free hand to hold your focus or access your components. Your focus replaces the need for you to have specific material components to cast spells, unless that material component costs 1 gold or more, in which case you must use the specific component instead​</p><table><thead><tr><th>Level</th><th>Cantrips Known</th><th>Spells Known</th><th>1st</th><th>2nd</th><th>3rd</th><th>4th</th></tr></thead><tbody><tr><td>3rd</td><td>3</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>4th</td><td>3</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>5th</td><td>3</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>6th</td><td>3</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>7th</td><td>3</td><td>6</td><td>4</td><td>2</td><td>-</td><td>-</td></tr><tr><td>8th</td><td>3</td><td>6</td><td>4</td><td>2</td><td>-</td><td>-</td></tr><tr><td>9th</td><td>3</td><td>7</td><td>4</td><td>2</td><td>-</td><td>-</td></tr><tr><td>10th</td><td>4</td><td>7</td><td>4</td><td>3</td><td>-</td><td>-</td></tr><tr><td>11th</td><td>4</td><td>8</td><td>4</td><td>3</td><td>-</td><td>-</td></tr><tr><td>12th</td><td>4</td><td>8</td><td>4</td><td>3</td><td>-</td><td>-</td></tr><tr><td>13th</td><td>4</td><td>10</td><td>4</td><td>3</td><td>2</td><td>-</td></tr><tr><td>14th</td><td>4</td><td>10</td><td>4</td><td>3</td><td>2</td><td>-</td></tr><tr><td>15th</td><td>4</td><td>11</td><td>4</td><td>3</td><td>2</td><td>-</td></tr><tr><td>16th</td><td>4</td><td>11</td><td>4</td><td>3</td><td>3</td><td>-</td></tr><tr><td>17th</td><td>4</td><td>12</td><td>4</td><td>3</td><td>3</td><td>-</td></tr><tr><td>18th</td><td>4</td><td>12</td><td>4</td><td>3</td><td>3</td><td>-</td></tr><tr><td>19th</td><td>4</td><td>14</td><td>4</td><td>3</td><td>3</td><td>1</td></tr><tr><td>20th</td><td>4</td><td>14</td><td>4</td><td>3</td><td>3</td><td>1</td></tr></tbody></table>"
