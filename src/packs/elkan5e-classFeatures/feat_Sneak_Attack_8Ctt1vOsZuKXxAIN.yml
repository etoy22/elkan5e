system:
  description:
    value: "<p><span style=\"font-weight:bold\"><strong>As Part of a Weapon Attack</strong></span>\_- 1 Creature</p><p>You know how to strike subtly and exploit a foe's distraction. Once per turn, you can deal extra damage to one creature you hit with an attack. This damage counts as part of the attack, and if you roll critical hit and use sneak attack, your sneak attack damage is doubled. To deal this extra damage, your weapon cannot be a &amp;reference[Heavy] melee weapon, and you must meet one of the following criteria:</p><ul><li><p>you have advantage on the attack roll against your target</p></li><li><p>your target is within 5 ft. of another creature hostile to them, and the other creature is not &amp;reference[Incapacitated]</p></li></ul><p>Your Sneak Attack damage increases as you gain levels in this class, as shown in the Sneak Attack column of the @UUID[Compendium.elkan5e.elkan5e-class.RTS23KqJMFWlzLKd]{Rogue Progression Table}.</p><p></p><p></p><p><em>An example of Sneak Attack in action:</em></p><p><em>Let's say a rogue is attacking a bandit, and the bandit is also attacking a goblin. The rogue gets to add @UUID[Compendium.elkan5e.elkan5e-class-features.8Ctt1vOsZuKXxAIN]{Sneak Attack} because the goblin is hostile to the bandit, even though the rogue and the goblin are not allies.</em></p><p><em>If the goblin were to be &amp;Reference[Stunned], the rogue could not use @UUID[Compendium.elkan5e.elkan5e-class-features.8Ctt1vOsZuKXxAIN]{Sneak Attack} because the &amp;Reference[Stunned] condition will make the goblin &amp;Reference[Incapacitated].</em></p><p><em>If the goblin were to die, but the rogue gained advantage because the bandit was knocked &amp;Reference[Prone], the rogue could use @UUID[Compendium.elkan5e.elkan5e-class-features.8Ctt1vOsZuKXxAIN]{Sneak Attack}.</em></p>"
