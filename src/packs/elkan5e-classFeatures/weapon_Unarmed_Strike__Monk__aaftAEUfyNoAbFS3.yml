system:
  description:
    value: >-
      <p><em>People who are trained with simple weapons are also trained in
      hand-to-hand combat, useful if they don't have access to a
      weapon.</em></p><p>You roll a [[/damage 1d6]] in place of the normal
      damage dice of your unarmed strike. This die increases to [[/damage 1d8]]
      at level 5, [[/damage 1d10]] at level 11, and [[/damage 1d12]] at level
      17, as shown in the Martial Arts column of the
      @UUID[Compendium.elkan5e.elkan5e-class.VQiQktedzIusKs4y]{monk table}.
      These increases are also listed later on this
      page.</p><p>Reference:</p><p>&amp;Reference[Finesse],
      &amp;Reference[Lightw]</p>
