system:
  description:
    value: >-
      <p><em>You open your awareness to detect powerful supernatural
      creatures.</em></p><p><strong>Bonus Action</strong> - 60 ft. - 3/Long Rest
      - 1 Round - Magical</p><p>You know the location of any aberration,
      celestial, elemental, fey, fiend, or undead within 60 feet of you that is
      not behind total cover. You know the type of any being whose presence you
      sense, but not its identity. For example, if the succubus queen Octavia
      was in disguise a mere 10 ft. away, you could use this ability to detect
      that she is a fiend, but you would not know her exact identity.</p><p>This
      ability counts as a 1st level divination spell, and can be blocked with
      spells like Nondetection.</p>
