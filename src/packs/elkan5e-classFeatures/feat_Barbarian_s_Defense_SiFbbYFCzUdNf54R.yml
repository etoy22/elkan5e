system:
  description:
    value: >-
      <ul><li><p>While you are not wearing any armor, you can choose to
      calculate your armor class as 10 + your Dexterity modifier + your
      Constitution modifier. You can use a shield and still gain this
      benefit.</p></li><li><p>While wearing
      @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.4ZoOlPhNDk46Vvnr]{light}
      or
      @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.pHlopVD36uBfquJF]{medium}
      armor, you can choose to add your constitution modifier to your armor
      class instead of your dexterity modifier, with the normal maximum armor
      class applied to medium armor. (Not automated Yet)</p></li></ul>
    chat: ''
    unidentified: ''
