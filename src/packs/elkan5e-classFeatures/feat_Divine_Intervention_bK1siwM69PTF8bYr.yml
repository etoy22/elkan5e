  description:
    value: "<p><strong>Action</strong> - 1/Long Rest - Magical</p><p>You ask for assistance from your deity or the cosmic force that grants you your power, asking them to intervene when your need is great. If you want, you can automatically cast any cleric spell of 8th level or lower or one of your domain spells without expending a spell slot.\_</p><p>You can also ask for assistance in a less specific way, such as by saying, \"May the Lord of Light carry us to safety.\" In this case, your GM decides exactly how the Divine Intervention manifests. Your GM may choose to replicate a cleric or domain spell, or they might choose another effect, which cannot heal or damage creatures for more than 100 hit points total. Generally, anything beyond the scope of power of a 9th level spell is impossible, but Divine Intervention may do a weaker, but similar effect.</p><p>​</p>"
