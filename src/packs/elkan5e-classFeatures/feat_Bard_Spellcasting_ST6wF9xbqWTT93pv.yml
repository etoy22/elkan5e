system:
  description:
    value: "<p><span style=\"font-size:20px\"><strong>Bard Spellcasting</strong></span></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">You've learned to untangle and reshape the fabric of reality in harmony with your words and music. Your spells are part of your artistic repertoire, magic that you can tune to different situations.</span></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"font-weight:bold\"><strong>Spell Slots</strong></span></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">The </span>Bard Table shows how many spell slots you have to cast your spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest. For example, if you know the 1st level spell <span style=\"font-style:italic\"><em>Charm Person</em></span> and have a 1st-level and a 2nd-level spell slot available, you can cast <span style=\"font-style:italic\"><em>Charm Person</em></span> using either slot.</p><p class=\"font_8\"><span style=\"font-weight:bold\"><strong>Cantrips</strong></span></p><p class=\"font_8\">Cantrips are the simplest and weakest of spells, and can be casted without expending Spell Slots. You know two cantrips of your choice from the bard spell list. You learn more cantrips at higher levels, as shown in the Bard Table.</p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"font-weight:bold\"><strong>Spells Known of 1st Level and Higher</strong></span><br />You know four 1st-level spells of your choice from the bard spell list. The spells known column of the Bard Table<span style=\"letter-spacing:normal\"> shows when you learn more bard spells of your choice. Each of these spells must be of a level for which you have spell slots. For example, when you reach 3rd level in this class, you can learn one new spell of 1st or 2nd level.\_</span>​</p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"font-weight:bold\"><strong>Switching Spells</strong></span></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">When you gain a level in this class, you can choose one of the bard spells or cantrips you know and replace it with another spell from the bard spell list, which also must be of a level for which you have spell slots. If you learn a spell from Magical Secrets at higher levels, you can exchange that spell for one that meets the same restrictions as the one you are replacing.</span></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"font-weight:bold\"><strong>Spellcasting Ability</strong></span></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">Charisma is your spellcasting ability for your bard spells, since your magic draws on powerful emotion as you speak or perform music.</span></p><p style=\"line-height:normal\" class=\"font_8\"></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">You use your charisma score whenever a bard spell refers to your spellcasting ability. In addition, you use your charisma modifier when setting the saving throw DC for a bard spell you cast and when making an attack roll with one.</span></p><p style=\"line-height:normal\" class=\"font_8\"></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">Spell Save DC = 8 + your proficiency bonus + your charisma modifier</span></p><p style=\"line-height:normal\" class=\"font_8\"></p><p style=\"line-height:normal\" class=\"font_8\"><span style=\"letter-spacing:normal\">Spell Attack Modifier = your proficiency bonus + your charisma modifier</span></p><table border=\"1\"><thead><tr><td rowspan=\"2\">Level</td><td rowspan=\"2\">Cantrips Known</td><td rowspan=\"2\">Spells Known</td><td colspan=\"9\">—Spell Slots per Spell Level—</td></tr><tr><td>1st</td><td>2nd</td><td>3rd</td><td>4th</td><td>5th</td><td>6th</td><td>7th</td><td>8th</td><td>9th</td></tr></thead><tbody><tr><td>1st</td><td>2</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>2nd</td><td>2</td><td>5</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>3rd</td><td>2</td><td>6</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>4th</td><td>3</td><td>7</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>5th</td><td>3</td><td>8</td><td>4</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>6th</td><td>3</td><td>9</td><td>4</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>7th</td><td>3</td><td>10</td><td>4</td><td>3</td><td>3</td><td>1</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>8th</td><td>3</td><td>11</td><td>4</td><td>3</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>9th</td><td>3</td><td>12</td><td>4</td><td>3</td><td>3</td><td>3</td><td>1</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>10th</td><td>4</td><td>13</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>11th</td><td>4</td><td>14</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>-</td><td>-</td><td>-</td></tr><tr><td>12th</td><td>4</td><td>14</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>-</td><td>-</td><td>-</td></tr><tr><td>13th</td><td>4</td><td>15</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>-</td><td>-</td></tr><tr><td>14th</td><td>4</td><td>15</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>-</td><td>-</td></tr><tr><td>15th</td><td>4</td><td>16</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td><td>-</td></tr><tr><td>16th</td><td>4</td><td>16</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td><td>-</td></tr><tr><td>17th</td><td>4</td><td>17</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td><td>1</td></tr><tr><td>18th</td><td>4</td><td>17</td><td>4</td><td>3</td><td>3</td><td>3</td><td>3</td><td>1</td><td>1</td><td>1</td><td>1</td></tr><tr><td>19th</td><td>4</td><td>18</td><td>4</td><td>3</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td></tr><tr><td>20th</td><td>4</td><td>18</td><td>4</td><td>3</td><td>3</td><td>3</td><td>3</td><td>2</td><td>2</td><td>1</td><td>1</td></tr></tbody></table><h3><span style=\"font-weight:bold\"><strong>Spellcasting Focus or Instruments</strong></span></h3><p class=\"font_8\">You can use an arcane focus, component pouch, or musical instrument for casting bard spells. To do so, you need a free hand to hold your focus or access your components, or as many free hands as your instrument requires. Your arcane focus or component pouch replaces the need for you to have specific material components to cast spells, unless that material component costs 1 gold or more, in which case you must use the specific component instead. If you use a musical instrument as your Spellcasting Focus or you choose to sing, the music you make replaces your spells' normal somatic or verbal components (though some spells require you to speak or perform specific gestures).</p>"
