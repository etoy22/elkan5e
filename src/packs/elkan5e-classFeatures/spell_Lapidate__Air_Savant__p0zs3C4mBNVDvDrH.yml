name: Lapidate [Air Savant]
type: spell
img: icons/weapons/thrown/bolas-stone.webp
system:
  description:
    value: "<p><em>You pick up an object or a small creature. You shake it, saying a few words to animate it, and then throw it at your target. Your magic aids your aim and allows you to strike with unnatural force.</em></p><div data-draftjs-conductor-fragment=\"{\" style=\"white-space:pre-wrap\"><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Spell Attack</strong></span></p><p>You pick up a small object or a creature you are &amp;reference[grappled]{grappling} which is at least two sizes smaller than you. You throw it at a creature or location up to 60 ft. away.</p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Hit:</strong>\_Target takes [[/damage 1d10 bludgeoning]] damage<strong style=\"box-sizing:border-box;user-select:text\">*</strong> and the thrown object or creature takes the same damage.</span></p></li><li style=\"box-sizing:border-box;user-select:text\"><p><span style=\"font-family:Signika, sans-serif\"><strong>Miss:</strong>\_Thrown object or creatures takes\_[[/damage 1d10 bludgeoning]] damage<strong style=\"box-sizing:border-box;user-select:text\">*.</strong></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"></p></li></ul><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">*At Higher Levels:</strong> This spell's damage increases by [[/damage 1d10 bludgeoning]]{1d10} when you reach a total character or creature level of 5th level ([[/damage 2d10 bludgeoning]]), 11th level ([[/damage 3d10 bludgeoning]]), and 17th level ([[/damage 4d10 bludgeoning]]).</span></p><p></p></div><p><em style=\"font-style:italic\">An object or creature thrown by this spell does not take damage from falling, as the spell magically throttles the speed to the same speed constantly. If a creature is thrown 60 ft. into the air and then falls, they take this spell's damage when they hit the ground and no falling damage.</em></p>"
