system:
  description:
    value: "<div class=\"rd__b  rd__b--3\"><p><em>Muttering a short invocation and pointing at your target, you send a bolt of fire streaking forward.</em></p><p><strong>Spell Attack</strong></p><p>If this spell damages a vehicle or object that is flammable and has hit points, the object is set on fire**.</p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text\"><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Hit:</strong>\_[[/damage 1d12 fire]] damage<strong style=\"box-sizing:border-box;user-select:text\">*</strong></span></p></li></ul></div><p></p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">*At Higher Levels:</strong> This spell's damage increases by 1d12 when you reach a total character or creature level of 5th level ([[/damage 2d12 fire]]), 11th level ([[/damage 3d12 fire]]), and 17th level ([[/damage 4d12 fire]]).</span></p><div class=\"rd__b  rd__b--3\"><p>**Some objects may be too large or flammable to be simply extinguished as an action, and will require creative solutions. Additionally, some vehicles or other objects may have a 'damage threshold'. For example, a fire bolt would have to deal at least 5 damage to damage and ignite a wooden catapult. Once ignited, the ignited object takes [[/damage 1d10 fire]] damage at the end of each of the caster's turns, which is dealt regardless of the target's damage threshold.</p></div>"
