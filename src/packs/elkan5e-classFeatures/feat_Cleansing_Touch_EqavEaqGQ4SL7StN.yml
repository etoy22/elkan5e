system:
  description:
    value: "<p><em>Your touch can cure people of lasting illness.</em></p><p><strong>Action</strong> - 5 ft.\_Creature - Magical</p><p>You can expend 5 hit points from your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.rIBMF9CzmWX4ETuy]{Lay on Hands} pool of healing to cure one disease or remove the &amp;reference[poisoned] condition on one creature. You can cure multiple poisons or neutralize multiple poisons (or both) with a single use of Lay on Hands, expending hit points separately for each one.\_</p><p>Additionally, when you expend at least 10 hit points as part of @UUID[Compendium.elkan5e.elkan5e-class-features.Item.rIBMF9CzmWX4ETuy]{Lay on Hands}, whether to restore hit points or cure @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.fzEf89TZ1WN90bFv]{poisons} or diseases, you also end the &amp;reference[drained] condition on the target.</p>"
