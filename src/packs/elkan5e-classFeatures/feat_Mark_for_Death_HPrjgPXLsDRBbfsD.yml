system:
  description:
    value: >-
      <p><strong>Bonus Action</strong> - Self - 1 Minute - 2/Long
      Rest*</p><p>You enter a state of heightened focus during combat where you
      focus on one target.</p><p>You can mark a creature you can see when you
      take the &amp;reference[Attack] action. You deal an extra [[/r 1d4]]*
      damage with your weapons when you hit a marked target with a weapon
      attack. This damage is of the same type as your weapon. You can shift your
      mark to a new target every time you take the Attack action. You can only
      have one marked target at a time. If you kill your marked target (or knock
      them unconscious), you won't be able to deal this extra damage until your
      next turn.</p><p>This ability ends early if you become
      incapacitated.</p><p>*Your Mark for Death die changes from a d4 to larger
      dice and you get more uses of this ability when you reach certain levels
      in this class, as shown in the
      @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{Ranger
      Progression Table}.</p><p></p><p><em>This ability is meant to replace the
      hunter's mark spell. You cannot benefit from the hunter's mark spell while
      using this ability.</em></p>
