system:
  description:
    value: "<p>You form a pact with a powerful magical creature, who grants you your power. This creature usually has no direct control over you, but you likely performed a task or promised something to the creature in exchange. Some patrons are malicious, like demons who are interested in taking your soul. Some are benevolent, like powerful fey who want to protect the world. Your choice of patron represents where your warlock got their power.</p><p>Your patron gives you new features at levels <span style=\"letter-spacing:normal\">3,</span> 6, 10, and 14.\_</p><p>Warlock patrons available elsewhere are compatible with this version of the warlock class. We have given warlocks their patron's expanded spell list as extra prepared spells that don't count against the number of warlock spells known, and so you should grant warlocks using non-Elkan subclasses their expanded spell list for free as well.</p><p><strong>Note: You'll need to add your warlock patron manually by dragging it from the Elkan 5e 'subclasses' compendium onto your features list.</strong></p>"
