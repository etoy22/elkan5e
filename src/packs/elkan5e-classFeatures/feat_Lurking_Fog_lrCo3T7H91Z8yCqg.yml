    value: "<p><span style=\"font-weight:bold\"><strong>Bonus Action</strong></span>\_- 100 ft. Radius (30 ft.) - 1 Minute - Magical</p><p>Fog expands outwards in a 100 ft. radius from you. This fog makes all creatures &amp;reference[obscuredlightly] in the radius. At the end of each of your turns when this fog is active, you can make all creatures in a 30 ft. radius centered on a point within the fog &amp;reference[obscuredheavily], which lasts until the end of your next turn, when you can use this ability again.</p><p><strong>To use the heavy obscurment part have this ability on your sheet: @UUID[Compendium.elkan5e.elkan5e-class-features.Item.xngotibSpdIH7zcf]{Lurking Fog [Heavy]}</strong></p>"
