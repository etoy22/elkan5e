system:
  description:
    value: "<p>Your devotion allows you to channel magical energies. While many paladins are granted their spells by the power of an oath they swear to a deity, there are other ways to become a paladin. Whether by the influence of supernatural creatures, prophecy, or sheer force of will, swearing yourself to a cause can grant paladins the ability to cast spells. Regardless, this power is considered divine.</p><h3>Spell Slots</h3><p>The paladin table shows how many spell slots you have to cast your spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest. For example, if you know the 1st level spell bless and have a 1st-level and a 2nd-level spell slot available, you can cast bless using either slot.</p><table><thead><tr><td rowspan=\"2\">Level</td><td colspan=\"5\">-\_ Spell Slots per Spell Level\_ -</td></tr><tr><td>1st</td><td>2nd</td><td>3rd</td><td>4th</td><td>5th</td></tr></thead><tbody><tr><td>1st</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>2nd</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>3rd</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>4th</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>5th</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td></tr><tr><td>6th</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td></tr><tr><td>7th</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>8th</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>9th</td><td>4</td><td>3</td><td>2</td><td>-</td><td>-</td></tr><tr><td>10th</td><td>4</td><td>3</td><td>2</td><td>-</td><td>-</td></tr><tr><td>11th</td><td>4</td><td>3</td><td>3</td><td>-</td><td>-</td></tr><tr><td>12th</td><td>4</td><td>3</td><td>3</td><td>-</td><td>-</td></tr><tr><td>13th</td><td>4</td><td>3</td><td>3</td><td>1</td><td>-</td></tr><tr><td>14th</td><td>4</td><td>3</td><td>3</td><td>1</td><td>-</td></tr><tr><td>15th</td><td>4</td><td>3</td><td>3</td><td>2</td><td>-</td></tr><tr><td>16th</td><td>4</td><td>3</td><td>3</td><td>2</td><td>-</td></tr><tr><td>17th</td><td>4</td><td>3</td><td>3</td><td>3</td><td>1</td></tr><tr><td>18th</td><td>4</td><td>3</td><td>3</td><td>3</td><td>1</td></tr><tr><td>19th</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td></tr><tr><td>20th</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td></tr></tbody></table><h3>Spells Prepared of 1st Level and Higher</h3><p>You prepare the list of paladin spells that are available for you to cast, choosing from the paladin spell list. Choose a number of paladin spells equal to your Charisma modifier + half your paladin level, rounded down (minimum of one spell).Each of these spells must be of a level for which you have spell slots. For example, when you are level 5 in this class, you can prepare 1st and second level spells.</p><h3>Switching Spells</h3><p>You can change your list of prepared spells when you finish a long rest, allowing you to switch any paladin spell you have prepared. Preparing a new list of paladin spells requires time spent in meditation, focusing on your convictions and the path before you.</p><h3>Spellcasting Ability</h3><p>Charisma is your spellcasting ability for your paladin spells, since your magic draws upon the power of your convictions.</p><p>\_</p><p>You use your Charisma score whenever a paladin spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a paladin spell you cast and when making an attack roll with one.</p><p>Spell save DC = 8 + your proficiency bonus + your Charisma modifier</p><p>Spell attack modifier = your proficiency bonus + your Charisma modifier</p><h3>Holy Symbol</h3><p>You can use a holy symbol spellcasting focus for casting your spells.</p><p>A holy symbol isn't always a symbol of a deity, but a paladin's holy symbol is always a symbol of the oath or path they are on. To use the holy symbol as a spellcasting focus, the paladin only needs the holy symbol to be displayed somewhere on their weapon, armor, or shield. Alternatively, the paladin can wear an amulet or hold the symbol in their hand. Unlike a Wizard's spellcasting focus, the holy symbol does not need to be held in the paladin's hand.</p><p>\_</p><p>​</p>"
