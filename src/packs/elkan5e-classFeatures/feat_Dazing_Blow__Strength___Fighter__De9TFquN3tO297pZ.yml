system:
  description:
    value: "<p><em>Your attack scrambles your target's senses and leaves them slow to react.</em></p><p><strong>Action</strong> - Melee/Ranged -\_1 Creature - 1 Round\_- Uses Equal to Proficiency Bonus/Long Rest</p><p>You use your normal attack action, but on your first hit on this turn, you can try to daze your target. Your DC for this ability equals 8 + your proficiency bonus + your STR or DEX modifier (your choice).</p><p><strong>Constitution Save</strong></p><ul><li><p><strong>Failure</strong>: Target is &amp;reference[dazed].</p></li><li><p><strong>Success</strong>: No effect.</p></li></ul>"
