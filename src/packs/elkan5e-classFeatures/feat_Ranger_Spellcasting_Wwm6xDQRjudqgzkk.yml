system:
  description:
    value: "<p>You gain the ability to cast spells that call on the powers of nature or natural instinct.</p><h3>Spell Slots</h3><p>The ranger table shows how many spell slots you have to cast your spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest. For example, if you know the 1st level spell animal friendship and have a 1st-level and a 2nd-level spell slot available, you can cast animal friendship using either slot.</p><h3>Spells Known of 1st Level and Higher</h3><p>At level 2, you can prepare two 1st-level spells of your choice from the ranger spell list. The spells prepared column of the ranger table shows how many spells you can prepare at a given ranger level. Each of these spells must be of a level for which you have spell slots. For example, when you reach 5th level in this class, you can prepare one more spell of 1st or 2nd level.\_</p><table border=\"0\"><thead><tr><td rowspan=\"2\">Level</td><td rowspan=\"2\">Spells Known</td><td colspan=\"5\">- Spell Slots per Spell Level -</td></tr><tr><td>1st</td><td>2nd</td><td>3rd</td><td>4th</td><td>5th</td></tr></thead><tbody><tr><td>1st</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>2nd</td><td>2</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>3rd</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>4th</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>5th</td><td>4</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td></tr><tr><td>6th</td><td>4</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td></tr><tr><td>7th</td><td>5</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>8th</td><td>5</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td></tr><tr><td>9th</td><td>6</td><td>4</td><td>3</td><td>2</td><td>-</td><td>-</td></tr><tr><td>10th</td><td>6</td><td>4</td><td>3</td><td>2</td><td>-</td><td>-</td></tr><tr><td>11th</td><td>7</td><td>4</td><td>3</td><td>3</td><td>-</td><td>-</td></tr><tr><td>12th</td><td>7</td><td>4</td><td>3</td><td>3</td><td>-</td><td>-</td></tr><tr><td>13th</td><td>8</td><td>4</td><td>3</td><td>3</td><td>1</td><td>-</td></tr><tr><td>14th</td><td>8</td><td>4</td><td>3</td><td>3</td><td>1</td><td>-</td></tr><tr><td>15th</td><td>9</td><td>4</td><td>3</td><td>3</td><td>2</td><td>-</td></tr><tr><td>16th</td><td>9</td><td>4</td><td>3</td><td>3</td><td>2</td><td>-</td></tr><tr><td>17th</td><td>10</td><td>4</td><td>3</td><td>3</td><td>3</td><td>1</td></tr><tr><td>18th</td><td>10</td><td>4</td><td>3</td><td>3</td><td>3</td><td>1</td></tr><tr><td>19th</td><td>11</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td></tr><tr><td>20th</td><td>11</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td></tr></tbody></table><h3>Switching Spells</h3><p>You can change your list of prepared spells when you finish a long rest, allowing you to switch any ranger spell you have prepared. Preparing a new list of ranger spells requires time spent in meditation, focusing on your environment: at least 1 minute per spell level for each spell on your list.</p><h3>Spellcasting Ability</h3><p>Wisdom is your spellcasting ability for your ranger spells, since your magic draws upon your attunement to nature and heightened senses.</p><p>\_</p><p>You use your Wisdom whenever a ranger spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a ranger spell you cast and when making an attack roll with one.</p><p><strong>Spell save DC </strong>= 8 + your proficiency bonus + your Wisdom modifier</p><p><strong>Spell attack modifier </strong>= your proficiency bonus + your Wisdom modifier</p>"
