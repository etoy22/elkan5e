system:
  description:
    value: "<p><em>You quickly raise your defenses against an incoming attack.</em></p><p><strong>Reaction</strong> - Melee -\_Self\_- Uses Equal to Proficiency Bonus/Long Rest</p><p>When a creature hits you with an attack roll, you can add +4 to your armor class against that attack, blocking the attack. Your game master should tell you what your attacker rolled on their attack roll before you decide to use Parry. If your attacker somehow rerolls their attack after you parry it, you keep the +4 bonus against the new roll. You must be holding a melee weapon or shield to use this maneuver.</p>"
