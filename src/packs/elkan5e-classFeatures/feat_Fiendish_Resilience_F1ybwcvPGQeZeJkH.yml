system:
  description:
    value: "<p><span style=\"letter-spacing:normal\"><strong>During a Short or Long Rest</strong>\_- Self - Magical</span></p><p><span style=\"letter-spacing:normal\">Choose one of the following damage types:: </span>&amp;reference[cold]<span style=\"letter-spacing:normal\">, </span>&amp;reference[fire]<span style=\"letter-spacing:normal\">, </span>&amp;reference[poison]<span style=\"letter-spacing:normal\">, </span>&amp;reference[bludgeoning]<span style=\"letter-spacing:normal\">, </span>&amp;reference[piercing]<span style=\"letter-spacing:normal\">, or </span>&amp;reference[slashing]<span style=\"letter-spacing:normal\">. You gain resistance to that damage type until you choose a different one with this feature. If you choose bludgeoning, piercing, or slashing damage, you still take full damage from magic or silver weapons.</span></p><p></p><p><strong>Note: This ability will give you inactive effects that provide the listed damage resistances. You can toggle which one you want in the effects panel on your character sheet.</strong></p>"
