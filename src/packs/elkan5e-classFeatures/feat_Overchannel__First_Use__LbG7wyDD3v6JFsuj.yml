system:
  description:
    value: >-
      <p>When you cast a wizard spell of 1st through 5th level that deals
      damage, you can deal maximum damage with that spell.</p><p><strong>The
      first time you do so</strong>, you suffer no adverse effect. If you use
      this feature again before you finish a long rest, you take [[/damage
      2d12]] damage for each level of the spell immediately after you cast it.
      Each time you use this feature again before finishing a long rest, the
      damage per spell level increases by [[/damage 1d12]]. This damage cannot
      be reduced or avoided.</p>
