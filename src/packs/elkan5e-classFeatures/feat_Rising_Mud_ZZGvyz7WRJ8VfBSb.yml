  description:
    value: "<p><strong>Bonus Action</strong>\_- 40 ft. Radius (60 ft.) - 1 Minute - Magical</p><p>You cause a deluge of sticky mud to form around a point. The mud counts as difficult terrain. When you use this ability and at the start of your turns, creatures in the mud are affected by the mud.</p><p><strong>Strength Saving Throw</strong></p><ul><li><p><strong>Failure:</strong>\_Target is\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.zaI1nuc41wANKoFX]{grappled} by the mud until the end of your next turn. If they fail two saving throws against this effect in a row, they are &amp;reference[restrained] until they successfully save against the effect or the effect ends.</p></li><li><p><strong>Success:</strong> No effect.</p></li></ul>"
