system:
  description:
    value: "<p><span style=\"font-weight:bold\"><strong>As Part of a Weapon Attack</strong></span>\_- 1 Creature - 1st Level (Evocation)</p><p>When you hit a creature with a weapon attack, you can expend a spell slot to deal radiant damage to the target, in addition to the weapon's damage. This damage counts as part of your weapon's damage, and if you smite on a critical hit, you roll twice as many damage dice for the smite.</p><ul><li><p><strong>On Hit:</strong>\_Target takes 2d8 radiant damage.* The damage increases by another 1d8 if the target is a celestial, fiend, or undead.</p></li></ul><p>​</p><p><strong>​*Using Higher Level Spell Slots:</strong> Damage increases by 1d8 for each spell level above 1st.​</p><p></p><p><em>Divine Smite counts as a spell, and like with other spells, you are limited to expending one spell slot per turn. You also cannot use Divine Smite on an attack that is already getting extra damage from another spell or feature with 'smite' in its name.</em></p>"
