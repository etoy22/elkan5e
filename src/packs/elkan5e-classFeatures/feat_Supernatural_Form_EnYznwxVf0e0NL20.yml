  description:
    value: >-
      <p>When you use
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.hmliC9DvCFITKc1l]{Wild
      Shapeshifting}, you can additionally use one of your
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.3Dlq6orj97yca72n]{Wild
      Shape} or Advanced Wild Shape options that only target your allies,
      targeting only yourself, but lasting 8 hours or until you next finish a
      short rest. You cannot use a Greater Wilder Shape option (such as
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.53vaYJbFrOfrWnlP]{Soaring
      Winds}) with this feature. For example, you could use
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.hLwzhdYesPXg4cnh]{Herd's
      Momentum} or
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.drFVNedQZ5J80Ghd]{Springing
      Step}, targeting only yourself, when you transform into a brown bear. This
      does not require an additional use of Wild Shape.</p>
