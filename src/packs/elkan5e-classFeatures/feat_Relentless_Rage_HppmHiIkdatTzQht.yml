    value: "<p><span style=\"font-weight:bold\"><strong>No Action Cost</strong></span>\_- Self</p><p>Your @UUID[Compendium.elkan5e.elkan5e-class-features.W6yKtk7Svvy9dIq9]{Rage}\_can keep you fighting despite grievous wounds. If you drop to 0 hit points while you're raging and don't die outright, you can make a [[/save constitution 10]] saving throw. If you succeed, you drop to 1 hit point instead.</p><p>Each time you use this feature to avoid dropping to 0, the DC increases by 5. When you finish a long rest, the DC resets to 10.</p>"
