  description:
    value: "<p><strong>Bonus Action</strong>\_- Self - Magical</p><p>You gain the ability to exchange sorcery points for spell slots on a whim.\_​</p><ul><li><p>Crush Spell Slot: You can crush a spell slot, gaining a number of sorcery points equal to the level of the spell slot you crushed.</p></li><li><p>Restore Spell Slot: You can expend sorcery points to regain\_an expended spell slot. The Restored Spell Slots Table, pictured here, lists the cost in sorcery points to regain a spell slot of a given level.</p></li></ul><table border=\"1\"><caption><strong>Creating Spell Slots</strong></caption><thead><tr><td><strong>Spell Slot Level</strong></td><td><strong>Sorcery Point Cost</strong></td></tr></thead><tbody><tr><td>1st</td><td>2</td></tr><tr><td>2nd</td><td>3</td></tr><tr><td>3rd</td><td>5</td></tr><tr><td>4th</td><td>6</td></tr><tr><td>5th</td><td>7</td></tr></tbody></table><p>\_</p>"
