system:
  description:
    value: >-
      <p>Every cleric's religion has at least one associated Domain. Your choice
      of Domain represents the tenets of your organized faith. While most faiths
      in 5e settings revolve around a a single deity, your domain could
      represent a pantheon, a faith that lacks a deity, or even a religious-like
      devotion to an ideal or organization. Your domain grants you features at
      level 3, 6, 10, and 14, also listed below. At this level, your choice of
      Divine Domain gives you access to extra spells. If you're using a Divine
      Domain published somewhere other than Elkan 5e, you gain its level 1 and 2
      features at level 3.</p><p>Divine Domains published elsewhere are
      compatible with this version of the cleric class.</p><p><strong>Note:
      You'll need to add your divine domain manually by dragging it from the
      Elkan 5e 'subclasses' compendium onto your features list.</strong></p>
