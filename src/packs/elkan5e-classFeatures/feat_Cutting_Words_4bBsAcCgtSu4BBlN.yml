  description:
    value: "<p><em>You demoralize an enemy at a critical moment, pushing them to fail rather than succeed.</em></p><p><strong>No Action Cost</strong>\_- 1 Ally (60 ft.) - Magical</p><p>While your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.3u8Og5ABnDcYhudF]{Inspiring Performance} is active, you can demoralize an enemy when they hit with an attack roll or succeed a skill check (but you cannot use this ability on saving throws). The enemy must be able to hear you. When you demoralize your target, you can roll your bardic inspiration die and subtract the number from the total, potentially turning the success into a failure.\_</p><p>Regardless of whether you succeed or fail together, you expend a use of @UUID[Compendium.elkan5e.elkan5e-class-features.Item.kg7VBahhFH6gDFIh]{Bardic Inspiration}\_and your performance ends until you use this ability again. If you have the @UUID[Compendium.elkan5e.elkan5e-class-features.Item.QIiLoZgVJqdEguAX]{Counterpoint} feature, you don't expend a use or end your performance when the roll fails.</p>"
