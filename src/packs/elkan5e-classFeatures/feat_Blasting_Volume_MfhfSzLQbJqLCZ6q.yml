  description:
    value: "<p><span style=\"font-style:italic\"><em>You\_blast nearby creatures with magical and extremely loud noise.</em></span></p><p class=\"font_8\"><span style=\"font-weight:bold\"><strong>Action</strong></span> - 20 ft. Cone - Magical Ability - 1 Round</p><p class=\"font_8\">You expend a @UUID[Compendium.elkan5e.elkan5e-class-features.Item.kg7VBahhFH6gDFIh]{bardic inspiration} die to use this ability.</p><p class=\"font_8\"><span style=\"font-weight:bold\"><strong>Constitution</strong></span>\_Save (DC Equal to Bard Spells)</p><ul class=\"font_8\"><li><p class=\"font_8\"><span style=\"font-weight:bold\"><strong>Failure</strong></span>: sonic damage equal to three rolls of your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.kg7VBahhFH6gDFIh]{bardic inspiration} die and target is &amp;reference[deafened].</p></li><li><p class=\"font_8\"><span style=\"font-weight:bold\"><strong>Success</strong></span>: Half damage.<span style=\"font-family:Signika, sans-serif\"><br /><br /></span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong>Note: to automate the uses of this ability, go into details and select Bardic Inspiration from the drop-down menu for 'Item Uses'.</strong></span></p></li></ul>"
