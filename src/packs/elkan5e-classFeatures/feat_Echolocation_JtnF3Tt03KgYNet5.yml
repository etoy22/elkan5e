    value: >-
      <p>You become so in tune with the ambient noise of your surroundings that
      you can tell where things are without looking at them. You gain
      &amp;reference[blindsight] with a radius of 60 ft., and you have advantage
      on any perception check where you can use your hearing within 60 ft. <span
      style="font-family:Signika, sans-serif">Note that when you have advantage,
      your passive perception increases by 5. </span>This feature does not
      function in a zone of silence.</p>
