  description:
    value: "<p><em>When you hit a creature with your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.8Ctt1vOsZuKXxAIN]{Sneak Attack} or one of your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.hW3DmOPgBpa7lGU8]{Precision Attacks}, you interfere with your target's ability to focus clearly.</em></p><p><strong>No Action Cost</strong> - 1 Creature - 1 Round</p><p><strong>Debuff</strong></p><ul><li><p>Your target cannot have advantage on any roll or use any ability that forces a reroll in their favor.</p></li><li><p>Your target has disadvantage on &amp;reference[concentration] checks, including against the @UUID[Compendium.elkan5e.elkan5e-class-features.Item.8Ctt1vOsZuKXxAIN]{Sneak Attack} damage you just dealt.\_</p></li></ul>"
