system:
  description:
    value: "<p>You commit yourself to a particular school of thought within wizardry. Your choice of arcane tradition represents your general specialization when it comes to casting spells. Your tradition grants you features at this level and again at 3rd, 6th, 10th, and 14th level, also listed below.</p><p>​</p><p>Arcane Traditions published elsewhere are compatible with this version of the wizard class.\_If you choose an arcane tradition that has you specialize in a school of magic, all spells of that school of magic are treated as being on the wizard spells for you, and you can choose them when picking wizard spells. This replaces the savant features, such as 'Evocation Savant'. If you chose an arcane tradition that doesn't specialize in a school of magic, you don't gain any features until level 3.</p><p><strong>Note: You'll need to add your arcane tradition manually by dragging it from the Elkan 5e 'subclasses' compendium onto your features list.</strong></p>"
