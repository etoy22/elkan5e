system:
  description:
    value: "<p>\_ You bind a familiar to your service. You gain the @UUID[Compendium.elkan5e.elkan-5e-feats.Item.ARYHxPswR8Sbp1dZ]{Find Familiar} feat, with the following revisions. If you already had the feat, choose a different level 1 feat to replace it.​​</p><ul><li><p>Your familiar can use the stats of an @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.qnyQoXUAB3AE528E]{imp}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.5bR3XnODg14hbmsw]{pseudodragon}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.TPp3oT34ZluLLoNI]{quasit}, or @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.vKK3yKGYFXAKRJXA]{sprite}. Imps, quasits, and sprites lose their invisibility abilities.</p></li><li><p>Your familiar has an armour class equal to 10 + your proficiency bonus, and a hit point total equal to 3 times your level.</p></li><li><p>Your familiar's attack now deals 1d4 + your charisma modifier damage. Choose whether bludgeoning, piercing, or slashing damage is most appropriate for your familiar.</p></li><li><p>Your familiar gains @UUID[Compendium.elkan5e.elkan-5e-creature-features.Item.eikdZrKEQ4VXilH4]{magic resistance} if it doesn't have it already, which gives it advantage on saves against spells and magical effects.</p></li><li><p>As an action, you can see through your familiar’s eyes and hear what it hears until the start of your next turn, gaining the benefits of any special senses that the familiar has. During this time, your body is blind and deaf.</p></li><li><p>As an action, you can temporarily dismiss your familiar. It disappears into a pocket dimension where it awaits your summons. You can then use an action at any time to cause it to reappear in any unoccupied space within 30 feet of you.</p></li><li><p>When you cast a spell with a range of touch, your familiar can deliver the spell as if it had cast the spell. Your familiar must be within 100 feet of you, and it must use its reaction to deliver the spell when you cast it.</p></li><li><p>You can use\_a warlock spell slot and a ritual that takes 1 minute to both revive your familiar with full hit points and teleport it to you. This spell can also change the form your familiar takes, choosing again from the initial list.</p></li></ul>"
