system:
  description:
    value: "<p><strong>No Action Cost</strong>\_- Self or Graveguard - Magical</p><p>Whenever you cast a necromancy spell of 1st level or higher and use @UUID[Compendium.elkan5e.elkan5e-class-features.Item.8KhA4zHjC79O8OXP]{Mastery of Soul}, you can use Necromantic Surge, with different benefits depending on whether you Mastery of Soul on yourself or your graveguard.</p><ul><li><p><strong>If targeting your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.cHeoheBxXYSmJfbv]{graveguard}</strong>: your graveguard can use their reaction to make an attack or move up to their speed.</p></li><li><p><strong>If targeting yourself</strong>: you end one of the following conditions on yourself: &amp;reference[blinded], &amp;reference[deafened], &amp;reference[poisoned], or &amp;reference[weakened]. Alternatively, you can remove one level of &amp;reference[exhaustion]\_from yourself.</p></li></ul>"
