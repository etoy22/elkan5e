system:
  description:
    value: "<p>You studied magic in order to cast spells. Most wizards study from old tomes and magic scrolls, learning to mimic the abilities of more powerful spellcasters by repeating magical words of power, waving their hands in ritualistic fashion, and sprinkling magical components where they want their spells to take effect. Unfortunately, spells don't always works the same way for everyone, so a great deal of trial and error is required for any wizard to find a version of the classic spells that works for them. This also means that some wizards find unorthodox ways of casting spells. Where most wizards write their painstaking processes in spellbooks, some wizards are able to channel magic through runestones, magical tattoos, or folk rituals.</p><h3>Spell Slots</h3><p>At 1st level, you know three cantrips of your choice from the wizard spell list. You learn additional wizard cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Wizard table.</p><h3>Spellbook</h3><p>The wizard table shows how many spell slots you have to cast your spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest. For example, if you know the 1st level spell charm person and have a 1st-level and a 2nd-level spell slot available, you can cast charm person using either slot.</p><h3>Spells Known of 1st Level and Higher</h3><p>\_At level 1, you know six 1st-level spells of your choice from the wizard spell list. You learn two more wizard spells for each level beyond level 1, as indicated on the spells known column of the wizard table. Each spell you learn must be of a level for which you have spell slots. For example, when you reach level 3 in this class, you can learn two new spells of 1st or 2nd level, or one of each.\_</p><p class=\"font_8\" style=\"font-size:15px\">Switching Spells</p><p>When you gain a level in this class, you can choose one of the wizard spells you know and replace it with another spell from the wizard spell list, which also must be of a level for which you have spell slots. Alternatively, you can replace a cantrip.</p><table border=\"0\"><thead><tr><td rowspan=\"2\">Level</td><td rowspan=\"2\">Cantrips Known</td><td colspan=\"9\">—Spell Slots per Spell Level—</td></tr><tr><td>1st</td><td>2nd</td><td>3rd</td><td>4th</td><td>5th</td><td>6th</td><td>7th</td><td>8th</td><td>9th</td></tr></thead><tbody><tr><td>1st</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>2nd</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>3rd</td><td>3</td><td>4</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>4th</td><td>4</td><td>4</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>5th</td><td>4</td><td>4</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>6th</td><td>4</td><td>4</td><td>3</td><td>3</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>7th</td><td>4</td><td>4</td><td>3</td><td>3</td><td>1</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>8th</td><td>4</td><td>4</td><td>3</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>9th</td><td>4</td><td>4</td><td>3</td><td>3</td><td>3</td><td>1</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>10th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>11th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>-</td><td>-</td><td>-</td></tr><tr><td>12th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>-</td><td>-</td><td>-</td></tr><tr><td>13th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>-</td><td>-</td></tr><tr><td>14th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>-</td><td>-</td></tr><tr><td>15th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td><td>-</td></tr><tr><td>16th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td><td>-</td></tr><tr><td>17th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td><td>1</td></tr><tr><td>18th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>3</td><td>1</td><td>1</td><td>1</td><td>1</td></tr><tr><td>19th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>3</td><td>2</td><td>1</td><td>1</td><td>1</td></tr><tr><td>20th</td><td>5</td><td>4</td><td>3</td><td>3</td><td>3</td><td>3</td><td>2</td><td>2</td><td>1</td><td>1</td></tr></tbody></table><h3>Spellcasting Ability</h3><p>Intelligence is your spellcasting ability for your wizard spells, since all your spellcasting ability comes from your ability to memorize tons of tiny details in how you cast spells. A slight change in your procedure can change how effective your spell is, so the smartest wizards tend to have the most consistent results.</p><p>\_</p><p>You use your intelligence score whenever a wizard spell refers to your spellcasting ability. In addition, you use your intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.</p><p><strong>Spell save DC</strong> = 8 + your proficiency bonus + your Intelligence modifier</p><p><strong>Spell attack modifier </strong>= your proficiency bonus + your Intelligence modifier</p><h3>Spellcasting Focus</h3><p>You can use a spellcasting focus for casting your spells.</p><p>If you use a spellbook or something similar and you lose it, you can make a new one by using raw materials usually worth 50 gold and by taking 2 hours during a long rest or downtime.</p><p>\_</p>"
