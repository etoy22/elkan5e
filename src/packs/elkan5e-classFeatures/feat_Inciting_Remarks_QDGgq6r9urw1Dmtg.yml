name: Inciting Remarks
type: feat
system:
  description:
    value: "<p><strong>No Action Cost</strong>\_- 1 Creature (60 ft.) - Magical</p><p>Whenever you roll a @UUID[Compendium.elkan5e.elkan5e-class-features.Item.kg7VBahhFH6gDFIh]{Bardic Inspiration} die for any reason, you can make comments inciting one creature against another. Choose one creature within 60 ft. of you. That creature must succeed on a wisdom saving throw against your spellcasting DC or be &amp;reference[goaded] towards an ally of yours that is within 60 ft. of you and the target until the end of your next turn. If a creature hears your words, they magically understand them even if they could not otherwise.</p>"
