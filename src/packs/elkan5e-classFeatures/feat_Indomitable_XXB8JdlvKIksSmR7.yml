system:
  description:
    value: "<p><strong>No Action Cost</strong>\_- Self - 1/Long Rest*</p><p>When you fail a saving throw you can choose to add 1d10 to your roll, potentially turning your failure into a success. Once this ability has turned a failure into a success, you must wait until you finish a long rest to use it again. If a fighter uses Indomitable and still fails the saving throw, the use of Indomitable is not consumed.</p><p>​​</p><p>*You can use this feature twice between long rests starting at 13th level and three times between long rests starting at 17th level.</p>"
