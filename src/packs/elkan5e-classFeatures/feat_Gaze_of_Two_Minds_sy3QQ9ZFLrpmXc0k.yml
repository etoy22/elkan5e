system:
  description:
    value: "<p>You can use your action to touch a willing humanoid and perceive through its senses for one minute. As long as the creature is on the same plane of existence as you, you can use your action on subsequent turns to maintain this connection, extending the duration for another minute. While perceiving through the other creature's senses, you benefit from any special senses possessed by that creature. While under this effect, your body is &amp;reference[Blinded] and &amp;reference[Deafened], but you can see and hear whatever your bonded creature can.\_</p>"
