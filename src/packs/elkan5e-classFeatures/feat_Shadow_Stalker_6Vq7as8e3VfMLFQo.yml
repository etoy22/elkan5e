system:
  description:
    value: >-
      <p>When you attack while &amp;Reference[invisible] in a way that would end
      invisibility, such as with your
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.7Gnq3qfLzpIuRs0U]{Meld
      in Shadows} ability or with the
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.vWQiuirTFxetH3lm]{Invisibility}
      spell, you remain invisible until the end of the current turn, even if you
      would normally become visible after attacking. If you attack while using
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.Z1WevTWQhrRwwyp8]{Hijack
      Shadow}, you remain in your target's shadow until the end of the current
      turn.</p><p></p><p><strong>Note: This ability is not automated, so your
      invisibility condition may end when it should not.</strong></p>
