system:
  description:
    value: "<p>Choose a Sorcerous Origin. This represents the source of your sorcerer's innate magical abilities. Some sorcerers inherit their power from a magical ancestor, and some sorcerers develop magical abilities as a result of some event, spell, or curse. The specific Sorcerous Origin you choose affects what you can do with your powers.\_Your Sorcerous Origin gives you new abilities at this level and at levels 6, 10, and 14.</p><p>Sorcerous Origins available elsewhere are compatible with this version of the sorcerer class.</p><p><strong>Note: You'll need to add your sorcerous origin manually by dragging it from the Elkan 5e 'subclasses' compendium onto your features list.</strong></p>"
