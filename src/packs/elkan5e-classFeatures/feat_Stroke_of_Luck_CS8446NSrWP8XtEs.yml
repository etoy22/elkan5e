    value: "<p><strong>No Action Cost</strong>\_- Self - 1/Short Rest</p><p>You have an uncanny knack for succeeding when you need to. After you roll an attack roll, you can choose to have your attack roll count as a natural 20 on the d20, turning the attack from a miss or a hit into a critical hit. Alternatively, after you learn whether or not you succeed at an ability check (including skill checks or checks made with tools), you can decide to change your d20 roll on that check into a 20, using the new total to determine the result of the ability check.</p>"
