system:
  description:
    value: >-
      <p>You can use your
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.Z60zhWzROOSEqoGc]{Spellstrike}
      ability to channel spells of 1st level or higher into your attacks. When
      you do so, your spell slot is consumed when you use
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.Z60zhWzROOSEqoGc]{Spellstrike},
      and is lost if you miss all attacks on your turn. If your spell requires
      concentration, as in
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.2S4Lb8HB2ukb7uBT]{Hold
      Creature}</em> or
      <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.seKEwAbEZFBi6GWb]{Vampiric
      Touch}</em>, then you begin concentrating on the spell and act as though
      you had cast the spell normally.</p>
