system:
  description:
    value: "<p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>As Part of a Weapon Attack</strong></span>\_- 1 Creature -\_ 24 Hours - @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{3 Ki Points} - Magical</p><p>You gain the ability to set up lethal vibrations in someone's body. When you hit a creature with an unarmed strike, you can spend 3 @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{ki} points to start imperceptible vibrations, which last for 24 hours or until you use this ability again. The vibrations are harmless unless you use your action to @UUID[Compendium.elkan5e.elkan5e-class-features.Item.5KI5geHZpt6NIkyG]{amplify them}.</p><p>When you use this feature, the second half of the feature will be added to your actions list.</p>"
