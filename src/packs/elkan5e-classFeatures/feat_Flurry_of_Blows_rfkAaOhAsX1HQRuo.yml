system:
  description:
    value: "<p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Bonus Action</strong></span> - 1 Creature (5 ft.) - @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{1 Ki Point} - Magical</p><p>On a turn when you take the attack action, you can make an unarmed strike.​​​​</p><p></p><p></p><p><em>If your character is holding a two-handed weapon or has an object in both hands, they can still use flurry of blows. This might be described as temporarily removing one hand from a two-handed weapon, attacking with the hilt of a weapon, or kicking the target. Note that while a monk can use Flurry of Blows while both hands are holding a weapon, the monk cannot make the normal additional unarmed strike afforded by \_@UUID[Compendium.elkan5e.elkan5e-class-features.4km0TjS91nC4PBNL]{Martial Arts}.</em></p><p><em>Normally, a level 1 monk makes one attack using their action, or two attacks if the monk has an empty hand. Flurry of Blows costs 1 ki point to give you one more attack with your bonus action, bringing the total number of attacks to three, or four if you have @UUID[Compendium.dnd5e.classfeatures.XogoBnFWmCAHXppo]{Extra Attack}.</em></p><p><em>You can move between these extra attacks, as normal.</em></p>"
