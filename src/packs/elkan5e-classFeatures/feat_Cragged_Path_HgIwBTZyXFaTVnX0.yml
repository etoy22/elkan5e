    value: "<p><strong>Bonus Action</strong>\_- 40 ft. Cube (100 ft.) - 24 Hours\_- Magical</p><p>You create a\_path through hazards or along non-traversable surfaces in an area. Your chosen area can be as large as 40 ft. across on a side, either flat on the ground or vertical. Any difficult terrain caused by the ground within the area is no longer difficult terrain. If you select a vertical surface, you create a series of ledges you can stand on which can be climbed without equipment (though still requiring a climbing speed to avoid moving at half speed).\_When this ability ends, the terrain reverts to normal.</p>"
