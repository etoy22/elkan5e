system:
  description:
    value: >-
      <p>You've become very good at navigating your environment and tracking
      other creatures.</p><ul><li><p>Moving through nonmagical difficult terrain
      (like a crowd, thick foliage, or waist deep water) costs you no extra
      movement.</p></li></ul><p>If your table uses overland travel rules or
      survival rules, you gain the following benefits as
      well.</p><ul><li><p>Difficult terrain doesn't slow your group's overland
      travel with you to lead them.</p></li><li><p>Even when you are engaged in
      another activity (such as foraging, navigating, or tracking), you remain
      alert to danger.</p></li></ul>
