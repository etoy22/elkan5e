    value: "<p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\">When You Use Frenzy</strong> - 1 Visible Creature (120 ft.)</span></p><p>When you become &amp;reference[goaded] by a creature as part of @UUID[Compendium.elkan5e.elkan5e-class-features.Item.OlP5CWXKH4mMRMsX]{Frenzy}, you can attempt to goad your target as well. You can use this every time you switch your Frenzy target.</p><p><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Wisdom</strong> <strong style=\"box-sizing:border-box;user-select:text\">Save</strong></span></p><ul style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;padding:0px 0px 0px 1.5em;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><li style=\"box-sizing:border-box;user-select:text;line-height:1.4\"><p style=\"box-sizing:border-box;user-select:text;line-height:1.4;margin-block-end:0px;margin:0.5em 0px\"><span style=\"font-family:Signika, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text\">Failure:</strong>\_Target is &amp;reference[goaded].</span></p></li><li style=\"box-sizing:border-box;user-select:text;line-height:1.4\"><p style=\"box-sizing:border-b