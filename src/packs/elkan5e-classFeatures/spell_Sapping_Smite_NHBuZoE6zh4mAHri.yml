  description:
    value: "<p>When you hit a creature with a weapon attack, you can expend a spell slot to deal &amp;reference[necrotic] damage to the target, in addition to the weapon's damage.</p><ul><li><p><span style=\"font-weight:bold\"><strong>On Hit:\_</strong></span>Target takes [[/damage 2d8 necrotic]] damage.* The target is &amp;reference[drained] a number of hit points equal to the necrotic damage taken. The drained effect lasts until the target takes a long rest.</p></li></ul><p>​</p><p>​*<strong>Using Higher Level Spell Slots</strong>: Damage increases by [[/r 1d8]] for each spell level above 1st.​</p>"
