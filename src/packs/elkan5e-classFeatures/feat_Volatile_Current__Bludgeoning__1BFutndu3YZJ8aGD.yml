    value: "<p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>No Action Cost</strong></span>\_- 1 Creature - 1/Turn - Magical</p><p>Once on each of your turns, when you deal damage with a spell that deals &amp;reference[lightning] or &amp;reference[bludgeoning] damage, you can choose to cause a jet of air or electricity to arc to nearby creature who wasn't affected by the spell. Choose a target within 15 ft. of the target that took damage.</p><p><strong>Dexterity Save</strong></p><ul><li><p><strong>Failure:</strong> Target takes [[/damage 1d10 bludgeoning]] damage.</p></li><li><p><strong>Success:</strong> Half damage.</p></li></ul>"
