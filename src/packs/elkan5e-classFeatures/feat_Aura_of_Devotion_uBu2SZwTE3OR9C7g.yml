system:
  description:
    value: >-
      <p>You and friendly creatures within 10 feet of you can't be affected by
      the &amp;reference[charmed] (or therefore &amp;reference[dominated])
      conditions. If a creature who is already charmed comes within 10 ft. of
      you, this does not end the charmed condition, but does grant the creature
      advantage on saves to end the condition. This ability does not function
      when you are &amp;reference[Petrified] or
      &amp;reference[Unconscious].</p><p>At 18th level, the range of this aura
      increases to 30 feet (also listed below).</p>
