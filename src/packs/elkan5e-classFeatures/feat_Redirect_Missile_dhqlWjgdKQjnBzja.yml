system:
  description:
    value: >-
      <p><strong>Reaction</strong> - 1 Creature (20/60 ft.) -
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{1
      Ki Point} - Magical</p><p>After you use
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.cF0jAJaRymRivmAV]{Deflect
      Missiles}, if you reduce the damage to 0, you can catch the missile if it
      is small enough for you to hold in one hand and you have at least one hand
      free.</p><p>If you catch a missile in this way, you can spend 1
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{ki}
      point to make a ranged attack with a range of 20/60 using the weapon or
      piece of ammunition you just caught, as part of the same reaction. You
      make this attack with proficiency, regardless of your weapon
      proficiencies, and the missile counts as a monk weapon for the
      attack.</p><p></p><p></p><p><em>We set the damage type for this ability to
      be piercing, but that's only usually the case.</em></p>
