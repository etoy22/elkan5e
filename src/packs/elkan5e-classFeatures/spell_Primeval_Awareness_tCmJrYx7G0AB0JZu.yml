system:
  description:
    value: "<p>You\_focus your awareness on the region around you. You choose a single creature you know, a single creature you are tracking, or choose to look for the closest of a type of creature (such as human or red dragon). If the creature is within 250 ft. per level of the spell slot you expended, you immediately become aware of the fastest path to find the creature. You also know which way the creature is moving, if applicable.</p><p>Even if the creature is too far to learn its exact position, or the creature is protected from divination, you gain advantage on all survival and perception checks to locate the creature for 1 hour.</p><p>​</p><p>​</p><p><em>This ability can take many forms. You could track your target by scent like a dog, follow tracks too subtle for others to notice, or enter a trance where spirits guide you along a path.\_</em></p><p><em>Primeval Awareness is a spell, and like with other spells, you are limited to expending one spell slot per turn.</em></p>"
