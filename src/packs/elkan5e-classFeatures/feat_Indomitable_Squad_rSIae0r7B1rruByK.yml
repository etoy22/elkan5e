name: Indomitable Squad
type: feat
img: icons/environment/people/infantry-army.webp
system:
  description:
    value: "<p><strong>Reaction</strong>\_- All Allies (60 ft.)</p><p>You can use your @UUID[Compendium.elkan5e.elkan5e-class-features.XXB8JdlvKIksSmR7]{Indomitable} ability to affect your allies. You can use Indomitable Squad whenever you or an ally within 60 ft. of you fails a saving throw. All allied creatures within 60 ft. of you who failed the same saving throw add 1d10 to their save. This would apply to a disintegrate spell affecting a single ally, or a dragon's breath weapon targeting several of your allies. If at least one affected allied creature passes their saving throw, you lose one use of @UUID[Compendium.elkan5e.elkan5e-class-features.XXB8JdlvKIksSmR7]{Indomitable}.</p>"
