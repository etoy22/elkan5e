system:
  description:
    value: >-
      <p><span style="letter-spacing:normal" class="wixui-rich-text__text">Your
      spells that deal &amp;reference[acid] or &amp;reference[cold] damage
      ignore acid or cold resistance and treat acid or cold immunity as
      resistance. Your spells also ignore the effects of a creature’s 'acid
      absorption' or 'cold absorption' ability. </span></p><p></p><p><span
      style="letter-spacing:normal" class="wixui-rich-text__text"><em>When you
      deal acid or cold damage to a creature that is normally resistant, your
      magic twists their defenses against them. When you deal acid or cold
      damage to a creature that is normally immune, you twist your magic to
      overwhelm their defenses. In the case of some magical creatures like
      elementals, you control and disperse their elemental
      essence.</em></span></p>
