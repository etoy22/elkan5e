name: Fire Elemental Form
type: feat
_id: Nh8sq9EtMjMjux4F
img: icons/magic/fire/elemental-fire-humanoid.webp
system:
  description:
    value: "<p>You transform into an hybrid humanoid and fire elemental form, your body made of (mostly) harmless flames that dance in the air.</p><p><span style=\"font-weight:bold\" class=\"wixui-rich-text__text\"><strong>Bonus Action</strong></span> - Self - 10 Minutes -<span style=\"letter-spacing:normal\" class=\"wixui-rich-text__text\">\_</span>@UUID[Compendium.elkan5e.elkan5e-class-features.Item.Ik6ei7V7ryr5XVoe]{3 Sorcery Points}\_- Magical</p><p>You choose whether your equipment falls to the ground in your space, merges into your new form, or if you continue to visibly wear it.​</p><ul><li><p>You are immune to &amp;reference[fire] damage and resistant to &amp;reference[radiant] damage.</p></li><li><p>You are immune to &amp;reference[poison] damage and the &amp;reference[poisoned] condition.</p></li><li><p>You are immune to the &amp;reference[grappled], &amp;reference[petrified], and &amp;reference[restrained] conditions.</p></li><li><p>You shed bright light in a 30 ft. radius and dim light in a 60 ft. radius.</p></li><li><p>You can squeeze through gaps as small as 1 inch wide.</p></li><li class=\"wixui-rich-text__text\"><p>​You no longer have normal bodily functions. You don't breathe, can't bleed, be magically aged, or otherwise do anything that relies on your normal biological functions.</p></li></ul><p>You can revert to your normal form using a bonus action. You also revert to your normal form if you are reduced to 0 hit points.</p>"
