system:
  description:
    value: "<p><strong>Reaction</strong> - Self - Magical</p><p>You can use your reaction to deflect or catch a missile (such as an arrow or stone) when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your dexterity modifier + your monk level.</p><p>If you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free.</p><p>If you catch a missile in this way, you can spend 1 @UUID[Compendium.elkan5e.elkan5e-class-features.Item.IXk7hfrAoVQU3dLJ]{ki} point to use @UUID[Compendium.elkan5e.elkan5e-class-features.Item.dhqlWjgdKQjnBzja]{Redirect Missile}.</p><p></p><p></p><p><em>Here's a breakdown of the ability in action:</em></p><p><em>A guard fires an arrow at a level 8 monk with 16 dexterity. The guard misses, so the monk cannot deflect the arrow. Then another guard shoots another arrow, dealing 7 damage. The monk uses their reaction to reduce the damage by 1d10+11.</em></p><p><em>This reduction in damage is calculated as (1d10+8 (level) +3 (dexterity modifier)).</em></p><p><em>In this example, monk doesn't even need to roll to block 7 damage. The attack's damage is reduced to 0. The monk then chooses to expend a ki point to redirect the missile, choosing to target a goblin. The monk rolls an attack bonus as if the arrow was a @UUID[Compendium.elkan5e.elkan5e-class-features.4km0TjS91nC4PBNL]{monk weapon}, then deals 1d8+3 damage when it hits.</em></p><p><em>The monk would be unable to deflect a scorching ray\_spell at all, and if a fire giant throws a rock at a monk, the monk cannot catch the massive stone, so the monk could deflect the missile but not redirect it.</em>\_</p>"
