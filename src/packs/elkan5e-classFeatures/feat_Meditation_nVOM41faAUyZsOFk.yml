  dae:
    macro:
      name: Meditation
      img: icons/magic/perception/third-eye-blue-red.webp
      type: script
      scope: global
      command: |-
        (async () => {
            const kiFeature = actor.items.find(item => item.name == "Ki");
            const monkLevels = actor.items.find(item => item.name === "Monk")

            if (!kiFeature || !monkLevels){
                console.error("Missing Monk Levels or the Ki Feature")
                return
            }

            const currentValue = kiFeature.system.uses.value;
            const maxValue = kiFeature.system.uses.max;
            const calculate = Math.floor(monkLevels.system.levels/2)
            const newValue = (Math.min(currentValue+calculate,maxValue))

            await kiFeature.update({"system.uses.value" : newValue});
        })();
