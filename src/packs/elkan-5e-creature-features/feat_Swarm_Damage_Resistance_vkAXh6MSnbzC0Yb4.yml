name: Swarm Damage Resistance
type: feat
system:
  description:
    value: >-
      <p>A swarm takes half damage from anything that does damage to a single
      creature. It takes double damage from anything that does damage in an area
      of effect.</p><p>In Foundry VTT, we give swarms resistance to bludgeoning,
      piercing, and slashing damage as a convenience. Effects that deal physical
      damage in an area of effect will need to be manually adjusted to deal
      double damage instead of half, and single target effects that deal a
      different kind of damage will also need to be adjusted to deal half
      damage.</p>
