name: Topple
type: feat
system:
  description:
    value: >-
      <p>If the kobold is burrowing underneath a creature of large size or
      smaller, and the kobold is within 10 ft. of the surface, they can attempt
      to collapse the ground underneath their target's feet. The target must
      succeed on a dexterity saving throw or fall prone. The ground the kobold
      disturbed becomes difficult terrain if it wasn't already.</p><p><span
      style="font-family:Signika, sans-serif">When the kobold uses Topple, they
      make themselves vulnerable to attacks from the surface. The kobold
      benefits from half-cover, but can be struck as if in the 5 ft. cube
      beneath the kobold's target.</span></p>
