system:
  description:
    value: "<p><em>Holy warriors, local champions, or obsessed avengers. Paladins draw powerful magic by swearing a magical oath. They heal and deal devastating damage with radiant attacks.</em></p><p>The following is a revised version of the 5e paladin class. Our revisions support archery and dual wielding for paladins, as well as reworking ability progression, channel abilities, and a few of the class's features. Existing 5e subclasses will all work mechanically with this form of the paladin class. Click @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.VLxJ80DY7q7hkXU7.JournalEntryPage.QjLATbZ1uI3tAwjs#paladin]{here} for a summary of changes.</p><h2>Level 1 Paladins</h2><p>When you create a level 1 Paladin, you will need to manually add your ability scores. You will gain the rest of the following automatically:</p><h3>Recommended Ability Scores</h3><p><span style=\"letter-spacing:normal\">You can take one of these recommended ability score arrays, or you can roll or assign them yourself. You can switch any two ability scores, but you do not add any further bonuses (they're already included).</span></p><p><strong>&amp;reference[Strength]: 16\_ \_&amp;reference[Dexterity]: 8\_ \_&amp;reference[Constitution]: 14\_ \_&amp;reference[Intelligence]: 8\_ \_&amp;reference[Wisdom]: 12\_ \_&amp;reference[Charisma]: 16</strong>\_</p><p>or</p><p><strong>Strength: 16\_ \_Dexterity: 10 \_\_Constitution: 14\_ \_Intelligence: 10 \_Wisdom: 12\_ \_Charisma: 14</strong>\_\_</p><h3>Hit Points</h3><p><strong>Hit Points at 1st Level:</strong> 10 + Constitution Modifier<br /><strong>Hit Points at Higher Levels:</strong> 1d10 (or 6) + Constitution Modifier<br /><strong>Hit Dice:</strong> 1d10 per paladin level</p><h3>Proficiencies</h3><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{Armor}:</strong> @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.4ZoOlPhNDk46Vvnr]{Light Armor}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.pHlopVD36uBfquJF]{Medium Armor}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.X44Pl3A47cBj6yUt]{Heavy Armor}<br /><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}:</strong> @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.0OO6dvVBUM4XAluS]{Simple Weapon}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.MzJ8wA3QJOZDJ1El]{Martial Weapons}<br /><strong>Saving Throws:</strong> &amp;Reference[Wisdom], &amp;Reference[Charisma]<br /><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}:</strong>\_two of: &amp;Reference[Athletics], &amp;Reference[Insight], &amp;Reference[Intimidation], &amp;Reference[Medicine], &amp;Reference[Persuasion], and &amp;Reference[Religion]</p><h3>Items</h3><p>You start with the following equipment, in addition to the equipment granted by your background:</p><ul><li><p>a @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.ZOyejSDAVAH74Z4u]{longsword}\_and a @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.AENiTUeluTRiFzRz]{large shield} -OR- a @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.MzJ8wA3QJOZDJ1El]{Martial Weapons} and a @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.AENiTUeluTRiFzRz]{large shield} -OR- two @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.MzJ8wA3QJOZDJ1El]{Martial Weapons}</p></li><li><p>five @UUID[Compendium.elkan5e.elkan5e-mundane-items.pM8eu7VlKCHmEi3N]{javelins} -OR- any @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.0OO6dvVBUM4XAluS#simple-melee-weapons]{Simple Melee Weapons}</p></li><li>@UUID[Compendium.elkan5e.elkan5e-mundane-items.sgcCg8pGXKBu3f4S]{chain mail} -OR- @UUID[Compendium.elkan5e.elkan5e-mundane-items.QhHQy7whejLOVFf8]{scale mail}</li><li>a holy symbol</li><li>a priest's pack -OR- an explorer's pack</li></ul><h2>Multiclass Characters</h2><p>Instead of leveling up in your original class, you can take a paladin level when you level up. When you do, you gain only a portion of what first level paladins gain.</p><h3>Multiclassing Ability Score Requirements</h3><p>Taking levels in several classes requires exceptional ability. You must meet the multiclassing ability score requirements for both your original class and the class you are multiclassing into.</p><p>For paladins you must have:</p><ul><li><p><em>Either <strong>Strength: 14</strong> or <strong>Dexterity: 14</strong></em></p></li><li><p><em><strong>Charisma: 14</strong></em></p></li></ul><h3>Hit Points</h3><p><strong>Per Level:</strong> 1d10 (or 6) + Constitution Modifier<br /><strong>Hit Dice:</strong> 1d10 per paladin level</p><h3>Proficiencies</h3><p><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{Armor}:</strong> @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.4ZoOlPhNDk46Vvnr]{Light Armor}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.pHlopVD36uBfquJF]{Medium Armor}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.X44Pl3A47cBj6yUt]{Heavy Armor}<br /><strong>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}:</strong> @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.0OO6dvVBUM4XAluS]{Simple Weapon}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp.JournalEntryPage.MzJ8wA3QJOZDJ1El]{Martial Weapons}</p><h1>Paladin Advancement</h1><table><thead><tr><td>Level</td><td>Proficiency Bonus</td><td>Features</td><td>Spells Prepared</td></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.0EsX9KRdWSAGuiWG]{Divine Sense}, @UUID[Compendium.elkan5e.elkan5e-class-features.tSL6ilfth2TTRNTR]{Fighting Style}, @UUID[Compendium.elkan5e.elkan5e-class-features.rIBMF9CzmWX4ETuy]{Lay on Hands}</td><td>-</td></tr><tr><td>2nd</td><td>+2</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.nXheiW7WZqukaTYu]{Spellcasting}, @UUID[Compendium.elkan5e.elkan5e-class-features.Item.u7aPgi0U1YedIg3K]{Divine Smite}, Smite Option</td><td>3</td></tr><tr><td>3rd</td><td>+2</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.2oWiTiy5PRcUvPuA]{Divine Health}, @UUID[Compendium.elkan5e.elkan5e-class-features.0M7Gi3wvQu0JIzzg]{Sacred Oath},</td><td>4</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement, Feat</td><td>4</td></tr><tr><td>5th</td><td>+3</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.mPbCg9EwNYa7Z7Lo]{Extra Attack}, Smite Option</td><td>5</td></tr><tr><td>6th</td><td>+3</td><td>Sacred Oath feature</td><td>6</td></tr><tr><td>7th</td><td>+3</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.R0b0W3Od9YZsqE3T]{Aura of Protection}</td><td>7</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement, Feat</td><td>7</td></tr><tr><td>9th</td><td>+4</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.ktfU4nKl1rWAfCL2]{Aura of Courage}, Smite Option</td><td>8</td></tr><tr><td>10th</td><td>+4</td><td>Sacred Oath Feature</td><td>9</td></tr><tr><td>11th</td><td>+4</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.QVSzitUUBfPL9Qee]{Divine Strike}</td><td>9</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement, Feat</td><td>10</td></tr><tr><td>13th</td><td>+5</td><td>Smite Option</td><td>11</td></tr><tr><td>14th</td><td>+5</td><td>Sacred Oath feature</td><td>11</td></tr><tr><td>15th</td><td>+5</td><td>@UUID[Compendium.elkan5e.elkan5e-class-features.EqavEaqGQ4SL7StN]{Cleansing Touch}</td><td>12</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement, Feat</td><td>12</td></tr><tr><td>17th</td><td>+6</td><td></td><td>13</td></tr><tr><td>18th</td><td>+6</td><td>Aura improvements</td><td>13</td></tr><tr><td>19th</td><td>+6</td><td>Superior Ability</td><td>14</td></tr><tr><td>20th</td><td>+6</td><td>Sacred Oath feature</td><td>14</td></tr></tbody></table>"
