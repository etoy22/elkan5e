items:
  - name: Flaming Sphere Blast
    type: feat
    system:
      activation:
        type: action
        cost: 1
        condition: ''
      description:
        value: >-
          <p>At the end of each of the sphere's turns or if the sphere is
          reduced to 0 hit points, any creature within 5 feet of the sphere
          makes a dexterity save.</p><p><strong>Dexterity
          Save</strong></p><ul><li><p><strong>Failure:</strong> Target takes
          [[/damage 2d6 fire]] damage.*</p></li><li><p><strong>Success:</strong>
          Half damage.</p></li></ul><p></p><p><span style="font-family:Signika,
          sans-serif"><strong style="box-sizing:border-box;user-select:text">*At
          Higher Levels:</strong> For every spell slot level above 2nd, the
          sphere's hit points increase by 10 and its damage increases by [[/r
          1d6]].</span></p>
