  description:
    value: "<p><em>Note: @UUID[Compendium.elkan5e.elkan5e-class.Item.Z68Q5K5fejrVQZAy]{Clerics} and @UUID[Compendium.elkan5e.elkan5e-class.Item.Zg89AoSarbFbVnPY]{Paladins} can already use a weapon with a holy symbol as a focus, and some other characters gain a feature equivalent to this one: Warlocks with a @UUID[Compendium.elkan5e.elkan5e-class-features.Item.QfgyRthZkHYTXO0I]{Pact of the Warrior}, @UUID[Compendium.elkan5e.elkan5e-subclass.Item.TKxwHbfDmSdPTkee]{Mystic Trickster} Rogues, and @UUID[Compendium.elkan5e.elkan5e-subclass.Item.yHHwqD7r32bVXSUQ]{Spellsword} Fighters.</em></p><p>You can use a weapon as a spellcasting focus. Your focus replaces the need for you to have specific material components to cast spells, unless that material component costs 1 gold or more, in which case you must use the specific component instead.\_</p>"
