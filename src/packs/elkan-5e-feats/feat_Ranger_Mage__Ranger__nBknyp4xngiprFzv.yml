  description:
    value: >-
      <p><em>You study magic in more depth, learning to use it to support
      yourself and strike at your enemies directly.</em></p><ul><li><p>You gain
      two cantrips from the
      @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.wD6ZbIk07VLdjnYM.JournalEntryPage.GvqBA1PSHk2nUQHh]{druid
      spell list}, which count as ranger spells for you.</p></li><li><p>You can
      deal extra damage from
      @UUID[Actor.pmbK0FihM2eHpJ2w.Item.mDKtVWMDoMBhLVPs]{Mark for Death} when
      using cantrips as if they were weapon
      attacks.</p></li></ul><p><strong>Note: You'll need to select your cantrips
      and add them yourself.</strong></p>
