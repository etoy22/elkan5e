  description:
    value: >-
      <p><em><strong>Prerequisite:
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.tSL6ilfth2TTRNTR]{Fighting
      Style}</strong></em></p><p><em>Some classes already gain this feature at
      level 5, and gain no further benefit from this feat. Barring unusual
      multiclassing, the only classes that benefit from this feat are
      @UUID[Compendium.elkan5e.elkan5e-class.Item.SmG14gsqWBtqmcjt]{Bards},
      @UUID[Compendium.elkan5e.elkan5e-class.Item.Z68Q5K5fejrVQZAy]{Clerics},
      @UUID[Compendium.elkan5e.elkan5e-class.Item.653LgVa3sG4ek6b5]{Druids},
      @UUID[Compendium.elkan5e.elkan5e-class.Item.emEIZZAh0s8Ed62c]{Sorcerers},
      @UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{Wizards},
      and some
      @UUID[Compendium.elkan5e.elkan5e-class.Item.whbTNYgkqWV8oGt3]{Warlocks}.</em></p><p>You
      can attack twice, instead of once, whenever you take the
      &amp;reference[attack] action on your turn. If you are dual-wielding, your
      off-hand attack brings you to a total of three attacks.</p>
