system:
  description:
    value: "<p><strong>Bonus Action</strong> - 1 Ally (60 ft.) - 1 Minute - Magical</p><p>Using this ability consumes a use of @UUID[Compendium.elkan5e.elkan5e-class-features.Item.HPrjgPXLsDRBbfsD]{Mark for Death}. You cannot use this ability alongside Mark for Death or any other ranger mark.</p><p><strong>Buff</strong></p><p>You surround your target with magical thorns. Whenever your target is struck by a melee attack, their attacker takes [[/r 1d4 magical piercing]] damage*. This ability ends early if you become\_&amp;reference[incapacitated].</p><p><strong>Note: You'll need to manually deal damage using Mark of Thorns using the ranger who created it.</strong></p><p></p><p>*This extra damage increases as you gain ranger levels. At level 5 it becomes [[/r 1d6]], at level 9 it becomes [[/r 1d8]], at level 13 it becomes [[/r 1d10]], and at level 17 it becomes [[/r 1d12]].​</p>"
