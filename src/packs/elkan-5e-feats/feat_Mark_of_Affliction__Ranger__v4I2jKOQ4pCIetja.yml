system:
  description:
    value: "<p><strong>Bonus Action</strong>\_- Self - 1 Minute - Magical</p><p>Using this ability consumes a use of @UUID[Compendium.elkan5e.elkan5e-class-features.Item.HPrjgPXLsDRBbfsD]{Mark for Death}. You cannot use this ability alongside Mark for Death or any other ranger mark.</p><p>While you use the Mark of Affliction, once on each of your turns, when you hit a creature with a weapon attack or damage a creature with a ranger spell, you can attempt to poison them with your magic. This ability ends early if you become\_incapacitated.</p><p><strong>Constitution Saving Throw</strong></p><p><strong>Failure</strong>: Target is &amp;reference[poisoned] until this ability ends. Target rolls again at end of their turns, ending effect on success.</p><p><strong>Success</strong>:\_No effect.</p>"
