system:
  description:
    value: >-
      <p><strong>Action</strong> - 5 ft. - 1/Short Rest</p><p>You summon a
      magical steed to your side, either a spirit or a magically bound beast.
      This steed has the statistics of a warhorse, but can be medium size if you
      are small and has an intelligence of 6. This Spirit Steed understands you
      when you speak and will follow any orders you give to it. While your steed
      is within 1 mile of you, you can communicate with it
      telepathically.</p><p>While mounted on your steed, you can make any spell
      you cast that targets only you also target your steed.</p><p>When the
      steed drops to 0 hit points, it disappears, leaving behind no physical
      form. You can also dismiss your steed at any time as an action, causing it
      to disappear. In either case, casting this spell again summons the same
      steed, restored to its hit point maximum.</p>
