  description:
    value: "<p><em><strong>Prerequisite: @UUID[Compendium.elkan5e.elkan5e-class.Item.Z68Q5K5fejrVQZAy]{Cleric} Level 4</strong></em></p><p><em>You present your holy symbol and speak a prayer censuring the undead.</em></p><p><strong>Action</strong> - Undead in a 30 ft. Radius - 1 Minute - Magical</p><p>This consumes one use of your @UUID[Compendium.elkan5e.elkan5e-class-features.Item.WKKAHUBp42287xui]{Channel Divinity} feature.</p><p><strong>Wisdom Save</strong></p><ul><li><p><strong>Failure:</strong> Target &amp;reference[undead] are &amp;reference[frightened] for 1 minute. Target rolls again at end of their turns, ending effect on success. While frightened in this way, a creature must spend its turns trying to move as far away from you as it can. It also can't take reactions. For its action, it can use only the &amp;reference[Dash] action or try to escape from an effect that prevents it from moving. If neither of these options helps the creature escape you, the creature can use the &amp;reference[Dodge] action.</p></li><li><p><strong>Failure:</strong>\_If the turned undead's hit point maximum is equal to or less than three times your cleric level, it is destroyed.\_</p></li><li><p><strong>Success:</strong> No effect.</p></li></ul>"
