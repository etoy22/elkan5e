name: Mark of Thorns (Damage)
type: feat
img: icons/magic/nature/beam-hand-leaves-green.webp
system:
  description:
    value: "<p>Using this ability consumes a use of <a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.elkan5e.elkan5e-class-features.Item.HPrjgPXLsDRBbfsD\" data-id=\"HPrjgPXLsDRBbfsD\" data-type=\"Item\" data-pack=\"elkan5e.elkan5e-class-features\" data-tooltip=\"Feature Item\" data-scope><i class=\"fas fa-suitcase\"></i>Mark for Death</a>. You cannot use this ability alongside Mark for Death or any other ranger mark.</p><p><strong>Buff</strong></p><p>You surround your target with magical thorns. Whenever your target is struck by a melee attack, their attacker takes <a class=\"inline-roll roll\" data-mode=\"roll\" data-flavor data-formula=\"1d4 magical piercing\"><i class=\"fas fa-dice-d20\"></i>1d4 magical piercing</a> damage*. This ability ends early if you become\_<span class=\"reference-link\"><a class=\"content-link\" data-uuid=\"Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.PXI4uoXj7x6IsDXt\" data-id=\"PXI4uoXj7x6IsDXt\" data-type=\"JournalEntryPage\" data-pack=\"elkan5e.elkan5e-rules\" data-tooltip=\"Rule Page\"><i class=\"fas fa-book-open\"></i>Incapacitated</a><a class=\"enricher-action\" data-action=\"apply\" data-status=\"incapacitated\" data-tooltip=\"EDITOR.DND5E.Inline.ApplyStatus\" aria-label=\"Apply Status to Selected Tokens\"><i class=\"fas fa-fw fa-reply-all fa-flip-horizontal\"></i></a></span>.</p><p>*This extra damage increases as you gain ranger levels. At level 5 it becomes <a class=\"inline-roll roll\" data-mode=\"roll\" data-flavor data-formula=\"1d6\"><i class=\"fas fa-dice-d20\"></i>1d6</a>, at level 9 it becomes <a class=\"inline-roll roll\" data-mode=\"roll\" data-flavor data-formula=\"1d8\"><i class=\"fas fa-dice-d20\"></i>1d8</a>, at level 13 it becomes <a class=\"inline-roll roll\" data-mode=\"roll\" data-flavor data-formula=\"1d10\"><i class=\"fas fa-dice-d20\"></i>1d10</a>, and at level 17 it becomes <a class=\"inline-roll roll\" data-mode=\"roll\" data-flavor data-formula=\"1d12\"><i class=\"fas fa-dice-d20\"></i>1d12</a>.​</p><p><strong>Not Automated</strong></p>"
