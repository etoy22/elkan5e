name: Ritualist (Wizard)
type: feat
_id: Ez0RLAeRkkphgtzs
img: icons/magic/symbols/runes-triangle-orange.webp
system:
  description:
    value: >-
      <p>You learn ritual spells faster than other wizards. Choose two spells
      that have the ritual tag from any class's spell list; these rituals
      needn’t be from the same spell list, but they must not be a higher spell
      level than you can normally cast. The spells don't count against the
      number of spells you know.</p><p>You can't cast the spells except as
      rituals, unless you've learned them by some other means.</p><p>You can
      exchange the rituals you learned with this feat when you <strong>finish a
      long rest</strong>.</p><p></p><p><strong>Note: You'll need to select your
      rituals and add them yourself.</strong></p><p><em>1st level ritual spells
      include
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.Zo1HFoOJBt8vk6zJ]{Alarm},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.Bd3Qt5IS1z5S4356]{Comprehend
      Languages},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.zWjDq2YlL1XWOcji]{Detect
      Magic},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.1gqMmxF2RFCK9khd]{Detect
      Poison and Disease},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.DtqyQCHrAX96VclO]{Identify},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.IVdLf4tdmOfA3W6w]{Purify},
      @UUID[Compendium.elkan5e.elkan5e-spells.Folder.Tf2FNuyyu2gEaYOF]{Speak
      with Animals},
      @UUID[Compendium.elkan5e.elkan5e-spells.Item.hkKA1Y06dJtUlKQJ]{Unseen
      Servant}, and any first level spell from other 5e sources that include the
      ritual tag.</em></p>
