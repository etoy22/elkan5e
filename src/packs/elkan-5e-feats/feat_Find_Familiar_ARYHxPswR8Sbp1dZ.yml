name: Find Familiar
type: feat
_id: ARYHxPswR8Sbp1dZ
img: icons/creatures/birds/corvid-watchful-glowing-green.webp
system:
  description:
    value: "<p><strong>During a Short Rest</strong>\_- Magical</p><p>You bind a familiar to your service. ​</p><ul><li><p>Your familiar acts on its own initiative, but follows your commands to the best of its abilities.</p></li><li><p>Your familiar uses the stats of one of the following: a @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.7hwUfPuZzVhud6yz]{bat}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.78wfTaDSZ1KaullC]{cat}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.Tyh49Lwsfso0S78h]{crab}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.JOn3pgz8QSyXnZ49]{frog}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.pSPtYVJLkK36jQN1]{hawk}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.Y1uYzA5SJ7Xx9zok]{lizard}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.gyBhS9Cr2Q2s5XgA]{octopus}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.QQdAfl9gqYyXjPQ1]{owl}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.FtUiIvetTbWRgUUy]{poisonous snake}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.zzTxwjMtP9yQpfJD]{quipper}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.Jz1svtuHxmzcGoqp]{rat}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.djRlmSvwWly4A9no]{raven}, @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.nnQhas9hvmcgYdZI]{spider}, or @UUID[Compendium.elkan5e.elkan-5e-summoned-creatures.Actor.xtHHWQgbBRW5wELv]{weasel}.\_</p></li><li><p>Your familiar has an armour class equal to 10 + your proficiency bonus, and 5 hit points.</p></li><li><p>Your familiar loses any attack it normally possesses, and gains a new attack instead. The new attack has an attack bonus equal to your proficiency bonus + your intelligence, wisdom, or charisma modifier. The attack now deals 1 + your chosen ability modifier damage. Choose whether bludgeoning, piercing, or slashing damage is most appropriate for your familiar.</p></li><li><p>When your familiar is within 100 feet of you, you can communicate with it telepathically.</p></li><li><p>When you finish a short or long rest, your familiar is revived, teleported to you, and regains all hit points.</p></li></ul>"
