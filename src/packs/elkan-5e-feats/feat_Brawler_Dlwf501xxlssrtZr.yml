system:
  description:
    value: "<p>You have experience in close-quarters unarmed brawls, and know how to deal heavy blows with just about anything.</p><ul><li><p>You have advantage on @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.zaI1nuc41wANKoFX]{grapple} checks if both your hands are empty, and you\_have advantage on shove checks if at least one hand is empty. A hand counts as empty if you aren't grappling someone with it, aren't holding a @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{weapon} or a shield, and don't need that hand to cast a spell that requires somatic components.</p></li><li><p>You have proficiency with @UUID[Compendium.elkan5e.elkan5e-class-features.Item.pRDNsHpNLLk1Qq58]{unarmed strikes} and improvised weapons.</p></li><li><p>You can deal &amp;reference[bludgeoning] damage with any melee weapon.</p></li></ul>"
