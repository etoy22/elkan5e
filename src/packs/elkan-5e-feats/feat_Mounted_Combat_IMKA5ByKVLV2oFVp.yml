img: icons/environment/people/cavalry.webp
system:
  description:
    value: "<p>When you are mounted on a creature, you fight as one. You gain the following benefits, unless you are &amp;reference[incapacitated].</p><ul><li><p>The creature that was mounted does not roll initiative, and the mounted rider can replace one of their attacks every turn with one of the mount's attacks if they want. The mount provides its speed and mobility to the rider.</p></li><li><p>The mount cannot take damage. If the mount is targeted by an effect that does not target the rider, and the mount takes damage as a result, the rider instead takes the damage. All attacks against the mount target the rider instead. The mount can otherwise be affected by terrain, spells, and abilities normally.</p></li><li><p>If you are &amp;reference[incapacitated], you fall &amp;reference[prone] next to the mount, and the mount takes its own turn after your initiative count if you are still incapacitated by the time of its turn.\_</p></li></ul>"
