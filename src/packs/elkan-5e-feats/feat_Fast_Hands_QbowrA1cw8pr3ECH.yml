system:
  description:
    value: >-
      <p>You can make &amp;reference[sleight of hand] checks that normally take
      an action using a bonus action. You can also use items that normally take
      an action, such as potions, caltrops, or a magical Meteor Stone using a
      bonus action instead. This does not allow you to activate scrolls, wands,
      or anything else that casts a spell or mimics a spell, due to the innate
      restrictions of magic.</p>
