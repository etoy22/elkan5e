system:
  description:
    value: "<p>You can quickly jump, spring to your feet, or recover from a fall.</p><ul><li><p>You can stand up from &amp;reference[prone] by using only 5 ft. of movement.</p></li><li><p>You can use your acrobatics skill instead of your athletics skill for any check related to climbing or jumping. You can use your dexterity to calculate your jump distance, if it's higher than your strength, and you always jump as if you had a running start, even if you are making a standing high jump or standing long jump.</p></li><li><p>You take no damage from falling if <span style=\"letter-spacing:normal\">you fall\_20 ft. or less.</span></p></li><li><p>You do not fall &amp;reference[prone] when you fall unless you are &amp;reference[incapacitated], regardless of height.</p></li></ul><p>​</p>"
