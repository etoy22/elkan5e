  description:
    value: "<p><em>You are skilled at restraining creatures with your bare hands.</em></p><p>You can use a @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt.JournalEntryPage.zaI1nuc41wANKoFX]{grapple} check on a creature you are already grappling\_in place of an attack. If you succeed, the creature is &amp;reference[restrained]. This does not require another empty hand. You cannot restrain a creature more than one size larger than you.</p><p>When you are &amp;reference[grappled], you can choose to automatically grapple the creature that grappled you if you have an empty hand to do so.</p>"
