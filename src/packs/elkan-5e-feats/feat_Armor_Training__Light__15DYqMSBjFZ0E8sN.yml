system:
  description:
    value: "<p>When you take this feat, you learn to fight in heavier armor than most with your skillset.</p><ul><li><p>If you have no armor proficiencies, you gain @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#light-armor]{light armor} proficiency.</p></li><li><p>If you have only @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#light-armor]{light}, you gain @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#medium-armor]{medium armor} proficiency.</p></li><li><p>If you have @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#medium-armor]{medium armor} proficiency, you gain @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#heavy-armor]{heavy armor} proficiency.</p></li></ul><p>If you later gain proficiency in the chosen @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{armor} type through some other means, you may gain proficiency in the next heaviest armor type (if applicable) or replace this feat\_with another level 1 feat.</p>"
