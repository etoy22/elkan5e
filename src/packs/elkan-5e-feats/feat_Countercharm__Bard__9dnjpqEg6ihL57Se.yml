system:
  description:
    value: >-
      <p><em><strong>Prerequisite:
      @UUID[Compendium.elkan5e.elkan5e-class.Item.SmG14gsqWBtqmcjt]{Bard} Level
      8</strong></em></p><p><span style="font-style:italic"><em>You can start a
      performance that lasts until the end of your next turn, using musical
      notes or words of power to disrupt mind-influencing
      effects.</em></span></p><p style="line-height:1.4em" class="font_8"><span
      style="font-weight:bold"><strong>Bonus Action</strong></span> - 6
      Creatures (60 ft.) - 1 Round - Magical</p><p style="line-height:1.4em"
      class="font_8">You spend a use of your bardic inspiration.</p><ul
      class="font_8"><li style="line-height:1.4em"><p>I<span
      style="letter-spacing:0em">f a creature is
      </span>&amp;Reference[charmed]<span style="letter-spacing:0em"> or
      </span>&amp;Reference[frightened]<span style="letter-spacing:0em"> within
      30 ft., and the creature would normally be able to roll another save to
      end the effect at the end of their turns (as with a dragon’s
      @UUID[Compendium.elkan5e.elkan-5e-creature-features.Item.75G0Pxl3HPWYmRYz]{Frightful
      Presence}), then the creature can immediately attempt another save and add
      your
      @UUID[Compendium.elkan5e.elkan5e-class-features.Item.kg7VBahhFH6gDFIh]{bardic
      inspiration} die to their roll. If the creature would not normally get
      another save against the effect on their turn (such as with a vampire’s
      Charm), this ability does nothing for them.</span></p></li><li
      style="line-height:1.4em"><p style="line-height:1.4em"
      class="font_8"><span style="letter-spacing:0em">The chosen creatures have
      advantage on saving throws against the </span>&amp;Reference[charmed]<span
      style="letter-spacing:0em"> or </span>&amp;Reference[frightened]<span
      style="letter-spacing:0em"> condition until the end of your next
      turn.</span></p></li></ul><p style="line-height:1.4em" class="font_8">A
      creature must be able to hear you to gain this benefit.</p>
