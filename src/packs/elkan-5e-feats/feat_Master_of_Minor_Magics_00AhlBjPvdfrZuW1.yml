    value: "<p>Gain two of the following cantrips: <em>@UUID[Compendium.elkan5e.elkan5e-spells.Item.2Qsc5zwKCaGTcmmg]{prestidigitation}, @UUID[Compendium.elkan5e.elkan5e-spells.Item.VAn6kqpftI8yLkit]{minor illusion}, @UUID[Compendium.elkan5e.elkan5e-spells.Item.cUNPAfIYP7tiEHo9]{druidcraft}, or @UUID[Compendium.elkan5e.elkan5e-spells.Item.vRUeWAv7ZesZ1Tzj]{thaumaturgy}</em>. If you already have one of these spells, you can gain a different cantrip, choosing from your class list, or the wizard spell list if you don't have spellcasting as part of your class.\_</p><p>As an action, you can cast two of these cantrips simultaneously or use up to three effects of one of these cantrips simultaneously (including the same thing three times, if the spell allows you).</p>"
