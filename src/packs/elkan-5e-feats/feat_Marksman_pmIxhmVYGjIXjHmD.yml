system:
  description:
    value: >-
      <p><strong>Note: this feat's effects are not automated in
      Foundry.</strong></p><p>You gain the following benefits when using weapons
      you are proficient with:</p><ul><li><p>When you attack a creature in cover
      with a ranged or thrown weapon, they are less able to benefit from
      &amp;reference[cover]. If they are in &amp;reference[half-cover], they
      gain no bonus, and if they are in &amp;reference[three-quarters-cover],
      they instead gain the benefits of half-cover.</p></li><li><p>Additionally,
      you do not suffer disadvantage for attacking at long range. You still
      cannot fire at long range when you have disadvantage.</p></li></ul>
