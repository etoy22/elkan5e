      content: >-
        <p>This module adapts all content from <a
        href="https://www.elkan5e.com/">Elkan5e.com</a> - New Game Content,
        Condition and Character Automation, and Improved and Expanded Rules,
        designed with Foundry VTT in mind.</p><p></p><p>Our module provides
        automation for conditions using our expanded and revised
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt]{Conditions}
        list. You may experience issues with other modules aimed at automating
        the active effects of conditions.</p><p></p><p>If you want to see what
        changes we've made from baseline 5e rules, see our
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.VLxJ80DY7q7hkXU7]{Summary
        of Changes}.</p><p></p><p>If you'd like to report a bug or provide
        feedback, please drop us a line in our <a
        href="https://discord.com/invite/UYq2UwGz95">Discord</a> or report an
        issue on <a href="https://github.com/etoy22/elkan5e/issues">Github</a>.
        We tend to fix bugs the community reports within a week, and we're happy
        to talk to you. Discord is also the place for news, comprehensive
        updates, and community discussion.</p><p></p><p></p>
