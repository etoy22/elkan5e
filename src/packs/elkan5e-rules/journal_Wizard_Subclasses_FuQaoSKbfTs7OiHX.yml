      description:
        value: "<p>Wizards who choose to become necromancers specialize in spells from the school of necromancy.\_Necromancers are some of the only wizards that can use healing magic, but they are best known for raising the dead, undead or otherwise. Skilled necromancers raise a graveguard to serve as their devoted servant. Unfortunately, being followed around by the undead is often the reason they are feared or stigmatized.</p>"
