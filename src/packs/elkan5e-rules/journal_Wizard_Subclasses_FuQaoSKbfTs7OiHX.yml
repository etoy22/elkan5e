        value: "<p>Wizards who choose to become evokers specialize in spells from the school of evocation.\_Evokers are the most powerful wizards in terms of offensive magic, and are often employed in military organizations. Besides their raw offensive power, they are able to protect their allies from the destructive impact of their own spells.</p>"
