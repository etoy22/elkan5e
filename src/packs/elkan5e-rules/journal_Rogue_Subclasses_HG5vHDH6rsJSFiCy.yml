  - sort: 300000
    name: Duelist
    type: subclass
    _id: XcIlWURIlxSnM4lW
    system:
      item: Compendium.elkan5e.elkan5e-subclass.Item.uj9mpW7cz3h3yrXx
      description:
        value: >-
          <p>Duelists are skilled at one-on-one combat, fighting with
          misdirection and waiting for the right tie to strike. They know how to
          strike faster and harder than all but the most skilled warriors. Most
          duelists fight with a rapier and either a small shield or a small
          off-hand weapon.</p>
