  - sort: 400000
    name: Mystic Trickster (Bard)
    type: subclass
    _id: iZOkywjfVyLP3IMV
    system:
      item: Compendium.elkan5e.elkan5e-subclass.Item.8H0DO72vcXDNC271
      description:
        value: >-
          <p>Mystic Tricksters wield magic alongside their roguish talents. They
          know how to strike with spells just as effectively as weapons, and can
          use magic to distract their opponents. Rather than developing their
          own system of magic, they dabble in the spells used by more dedicated
          spellcasters, picking what simple spells will integrate with their
          martial skills.</p>
