  - sort: 200000
    name: Brute
    type: subclass
    _id: jttHf5Ip67koHVEo
    system:
      item: Compendium.elkan5e.elkan5e-subclass.Item.oEndiYznMjaUBZrD
      description:
        value: >-
          <p>Brutes focus on overpowering their targets and pummeling them into
          submission. They wear armor and stride into battle with sophisticated
          weapons training. Rarely does a brute strike from a distance, rather
          rushing into battle and quickly dispatching threats.</p>
