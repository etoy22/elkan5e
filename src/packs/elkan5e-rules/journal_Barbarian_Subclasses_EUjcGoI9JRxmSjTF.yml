      description:
        value: >-
          <p>Berserkers are the most unruly barbarians, deliberately working
          themselves into a chaotic frenzy and throwing themselves at enemies to
          deal as much damage as possible in as little time as they can. They
          are known for becoming so lost in the blood haze of combat that they
          never think of retreat.</p>
