  - sort: 200000
    name: Draconic
    type: subclass
    _id: ltmBIlnWnllfbpog
    system:
      item: Compendium.elkan5e.elkan5e-subclass.Item.BbYFmYfkCBVVmIox
      description:
        value: "<p>Sorcerers with the draconic origin are almost always descended from dragons. Since dragons can change shape and take mortal form, it's not unheard of for mortal bloodlines to have a draconic ancestor. In some, the power of the draconic bloodline manifests as powerful magical abilities that only grow with use.</p><p>In the world of Elkan, being part of a draconic\_Bloodline means you cannot be part of\_another, and you will forever have impulses to act similarly to the personalities of your Bloodlines. While you can control these impulses, it is a lifelong struggle. For more information, see the description of any dragonborn ancestry, such as @UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.CgP9p46fONndLjgp]{black dragonborn}.</p>"
