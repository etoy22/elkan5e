      description:
        value: >-
          <p>A cleric with the life domain follows a religious practice
          dedicated to protecting or nurturing life. They are powerful healers,
          more so than any others, and are often the difference between life and
          death for an adventuring party. Some may dedicate themselves formally
          to healing, whereas others might just be dedicated to spiritual
          practices centered around protecting or nurturing a community.</p>
