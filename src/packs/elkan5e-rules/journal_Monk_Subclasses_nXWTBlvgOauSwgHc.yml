      description:
        value: >-
          <p><span style="letter-spacing:normal"
          class="wixui-rich-text__text">Shadowdancers train to manipulate
          shadows, even transforming themself into shadow to travel through
          darkness and strike at their foes. They weave magic spells using wisps
