  - sort: 700000
    name: Class Features
    type: text
    _id: Ciw9Yng8DiISYfcD
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div><p>Class Features</p><p>The majority of your class page is
        dedicated to Class Features. These are abilities and powers that your
        character develops as they gain levels and become more powerful. Luckily
        for you, you are a level 1 character, and only have a small portion of
        these abilities right now. Your character gains new abilities all the
        way up to level 20, but for now, we're only concerned with the abilities
        below the '1st level' icon and above the '2nd level'
        icon.</p><p>​</p><p>Many of these abilities will reference more complex
        mechanics that we won't explain here. As this website expands, the
        abilities will have links within their descriptions to explain key
        terms. For now, I'll list a couple important things.</p><ul><li><p>When
        you 'have advantage' on a check or roll, that means you can roll twice
        and take the higher of the two.​</p></li><li><p>Some abilities refer to
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.eS0uzU55fprQJqIt]{Conditions},
        which are effects that linger on a character, usually for a short
        time.</p></li><li><p>In combat, your characters take turns. On your
        turn, you can move, use an 'action', and sometimes use a 'bonus action'.
        You can also use your 'reaction' on the turns of other characters to
        react to something happening, and once you use a reaction you have to
        wait until your turn to use another reaction. If an ability specificies
        that is uses one of these three types of 'actions', it is important to
        write that down.</p></li><li><p>Some abilities can only be used a
        certain number of times before your character has to rest. Some require
        only a 'short rest' to replenish and some require a 'long rest'. This is
        also important to write down.</p></li><li><p>It's okay to summarize
        abilities, but if you don't fully understand, write it down exactly and
        ask an experienced player or your Game Master to explain
        it.</p></li><li><p>Some abilities will give you extra bonuses to things
        you've already written down. Fighters get a Fighting Style at level 1
        that might add an extra bonus to their weapon attacks or damage. Rogues
        get Expertise, which allows them to double their proficiency bonus when
        rolling certain skills. I usually note Expertise on the sheet with a
        double checkmark in the skill bubble. Rogues may want to wait until they
        get skills from their Ancestry and Background before choosing which
        skills to have Expertise in. Monks get Martial Arts attacks, which
        aren't listed under equipment. Some classes, like Barbarian and Rogue,
        have abilities that add extra damage to their attacks sometimes, which
        you might want to list beneath your
        attacks.</p></li></ul></div><div><p>Example</p><p>As Nevil, I only gain
        one feature at level 1:
        @UUID[Compendium.elkan5e.elkan5e-class-features.Item.MVuFoUWCqmZ6I4mA]{Natural
        Tracker}</p><p>​</p><p>I list it under Features and Traits at the bottom
        right, and summarize some of its effects. I leave out the wilderness
        survival rules because most groups don't use them, but leave a note
        reminding myself I have those abilities in case it comes up. These notes
        are for me, so I don't need to write every word.</p><div
        id="comp-lbbybysj" class="MazNVa comp-lbbybysj wixui-image"><div
        data-testid="linkElement" class="j7pOnl"><img
        src="https://static.wixstatic.com/media/f326e7_bbcebda1d30d4839b3f22bd06183f68e~mv2.png/v1/fill/w_268,h_315,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/f326e7_bbcebda1d30d4839b3f22bd06183f68e~mv2.png"
        alt=""
        style="width:268px;height:315px;object-fit:cover;object-position:50%
        50%" width="268" height="315" /></div></div><p></p></div>
