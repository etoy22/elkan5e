  - sort: 500000
    name: Proficiencies
    type: text
    _id: D2ILNmJIpWOVRrsq
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div><h2>Proficiency Bonus</h2><p>A fundamental part of 5e characters is
        the 'Proficiency Bonus'. This bonus increases when we reach certain
        levels, which is shown in every class's Progression Chart near the top
        of their respective pages.</p><p>All level 1 characters have a
        Proficiency Bonus of +2. If you are unsure what your Proficiency Bonus
        is, you can check the Progression Chart near the top of your class
        page.</p><p>While your character has bonuses from their natural
        aptitudes, as represented by
        @UUID[.2wkZil4lP2G49r7n#ability-score-modifiers]{Ability Score
        Modifiers}, your character has also trained to be better at certain
        things. Your character can be trained in
        @UUID[.D2ILNmJIpWOVRrsq#skills]{skills},
        @UUID[.D2ILNmJIpWOVRrsq#weapons]{weapons}, and all sorts of other
        things.</p><p>Every time you roll to try to do something you are
        'proficient' in, you add your proficiency bonus. You also add one of
        your @UUID[.2wkZil4lP2G49r7n#ability-score-modifiers]{Ability Score
        Modifiers}, depending on what you're rolling.</p><p><em>For example, if
        Nevil is proficient in
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.WoK8DYCQ3yigT6ik#persuasion]{Persuasion}
        as a skill, and he has a charisma modifier of +1, then his total bonus
        to
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.WoK8DYCQ3yigT6ik#persuasion]{Persuasion}
        is +3. This is because
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.WoK8DYCQ3yigT6ik#persuasion]{Persuasion}
        is a
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.WoK8DYCQ3yigT6ik]{charisma
        skill} and Nevil's proficiency bonus is +2</em></p><h2>​Types</h2><p>Our
        class is one of the primary ways we determine what our characters are
        proficient with. This step is pretty simple.</p><p>Your class will
        list:</p><h3>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{Armor}</h3><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{Armor}
        is worn by some characters to make them harder to hit with
        attacks.</p></li><li><p>Copy the proficiencies your class gives you and
        write them in 'other proficiencies in the bottom left. You never roll or
        add your @UUID[.D2ILNmJIpWOVRrsq#proficiency-bonus]{proficiency bonus}
        to use armor. Proficiency just allows you to move effectively while
        wearing certain types of
        armor.</p></li></ul><h3>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}</h3><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}
        are used by your character to attack enemies in
        combat.</p></li><li><p>Copy the proficiencies your class gives you and
        write them in 'other proficiencies in the bottom left. When we later
        write down our attacks, we will reference
        this.</p></li></ul><h3>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}</h3><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}
        are used to perform specialized, non-combat actions that no one else can
        do (like pick a lock with
        @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.LMnHshpVe3ciVIwF]{Thieves'
        Tools}).</p></li><li><p>Click on the
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}
        link either on this page or your class page to see a description of all
        Tools.</p></li><li><p>Write your
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}
        proficiencies in 'other proficiencies in the bottom
        left.</p></li></ul><h3>Saving Throws</h3><ul><li><p>Saving throws are a
        specific type of roll you do to avoid an effect. For example, you might
        roll a Dexterity Saving Throw to try to avoid flying shrapnel. Your
        class tells you what Saving Throws you are proficient
        with.</p></li><li><p>For every Saving Throw you are proficient with,
        bubble in the corresponding circle in the list near the top
        left.</p></li></ul><h3>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}</h3><ul><li><p>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skill}
        checks are a special kind of roll you make to make your character try
        something outside of combat. For example, your character might roll a
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.WoK8DYCQ3yigT6ik#persuasion]{Persuasion}
        check to try to convince someone to trust them.</p></li><li><p>Click on
        the
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{Skills}
        link either on this page or your class page to see a description of all
        Skills.</p></li><li><p>Choose
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF]{skills}
        from your class list and bubble them in like you did with
        @UUID[.D2ILNmJIpWOVRrsq#saving-throws]{Saving
        Throws}.</p></li></ul><h3>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}</h3><ul><li><p>Your
        character only knows some in-game languages, and can only speak, read,
        and write in those languages. All characters learn
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common},
        so if you get to pick a language as part of your Class, pick a language
        other than
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#common]{Common}.</p></li><li><p>Click
        on the
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}
        link either on this page or your class page to see a description of all
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}.</p></li><li><p>Write
        your
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}
        proficiencies in 'other proficiencies in the bottom
        left.</p></li></ul></div><div><h2>Example</h2><p>I copy down Nevil's
        armor and @UUID[.D2ILNmJIpWOVRrsq#weapons]{weapon proficiencies} from
        the ranger page down at the bottom left of my character sheet.</p><p>As
        a @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{ranger},
        Nevil learns a tool from the ranger tool list. I pick Woodworkers' Tools
        because I might want to craft longbows.</p><p>​</p><p>I bubble in
        Strength and Dexterity Saving Throws as proficiencies.</p><p>​</p><p>For
        skills, I'm given
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#survival]{Survival}
        and a choice of three others. I choose
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#animal-handling]{animal
        handling},
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#perception]{perception},
        and
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.BhKlFUmcFi0zAkvu#stealth]{stealth},
        bubbling them in as well. This section is not yet done- we will revisit
        it when doing Nevil's
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.xu7KkQUPMqoEsg19]{Ancestry
        and Background}.</p><p>​</p><p>I pick
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#goblin]{Goblin}
        as a
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{language
        }because Nevil has a lot of experience fighting
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#goblin]{goblins}.
        I will pick Nevil's native
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{languages}
        from his
        @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.xu7KkQUPMqoEsg19]{background}
        later.</p><p>​</p><p>I write
        '@UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{Ranger}
        1' at the top of the character sheet while I'm at it, to designate him
        as a level 1
        @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{ranger},
        and I add my @UUID[.D2ILNmJIpWOVRrsq#proficiency-bonus]{proficiency
        bonus} of +2 near the top left.</p><p></p><div id="comp-lbbyai09"
        class="MazNVa comp-lbbyai09 wixui-image"><div data-testid="linkElement"
        class="j7pOnl"><img
        src="https://static.wixstatic.com/media/f326e7_a83e9966d7f74dc28930d1af3f563c31~mv2.png/v1/fill/w_363,h_471,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/f326e7_a83e9966d7f74dc28930d1af3f563c31~mv2.png"
        alt=""
        style="width:363px;height:471px;object-fit:cover;object-position:50%
        50%" /></div></div></div>
