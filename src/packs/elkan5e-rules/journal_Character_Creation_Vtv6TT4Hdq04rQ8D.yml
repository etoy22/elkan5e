  - sort: 300000
    name: Ability Scores
    type: text
    _id: 2wkZil4lP2G49r7n
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div><p>After we choose our class, the first step is to calculate our Ability Scores. Ability Scores represent our character's raw talent and aptitude. There are six</p><h2>Ability Scores</h2><h3>Strength</h3><p>Physical strength and athletic ability.</p><h3>Dexterity</h3><p>hand-eye coordination and reflexes.</p><h3>Constitution</h3><p>Physical resilience and endurance.</p><h3>Intelligence</h3><p>Problem solving ability and knowledge.</p><h3>Wisdom</h3><p>Social intuition and willpower.</p><h3>Charisma</h3><p>Personal magnetism and ability to influence others.</p><p></p><h2>​Generating your Ability Scores</h2><p>At level 1, each of your ability scores will be between 8 and 17\_(under most circumstances). If you have 10 in an ability score, you are at the human average for that score. Your character\_will be significantly above average overall. The easiest way to determine your ability scores is to choose the recommended ability scores for each class. In total, there are four ways to get your ability scores.\_</p><p>Note: Using any of Elkan's Ability Score systems, your character's Ancestry has no impact on Ability Scores, unlike in baseline 5e rules.</p><h3>A)\_Recommended Ability Scores:\_</h3><p>You can take the recommended ability scores for your class, linked here: @UUID[Compendium.elkan5e.elkan5e-class.Item.M8lNLAe2okA9qgFg]{Barbarian}, @UUID[Compendium.elkan5e.elkan5e-class.Item.SmG14gsqWBtqmcjt]{Bard}, @UUID[Compendium.elkan5e.elkan5e-class.Item.Z68Q5K5fejrVQZAy]{Cleric}, @UUID[Compendium.elkan5e.elkan5e-class.Item.653LgVa3sG4ek6b5]{Druid}, @UUID[Compendium.elkan5e.elkan5e-class.Item.a8ophKCiEGZarsnk]{Fighter}, @UUID[Compendium.elkan5e.elkan5e-class.Item.VQiQktedzIusKs4y]{Monk}, @UUID[Compendium.elkan5e.elkan5e-class.Item.Zg89AoSarbFbVnPY]{Paladin}, @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{Ranger}, @UUID[Compendium.elkan5e.elkan5e-class.Item.RTS23KqJMFWlzLKd]{Rogue}, @UUID[Compendium.elkan5e.elkan5e-class.Item.emEIZZAh0s8Ed62c]{Sorcerer}, @UUID[Compendium.elkan5e.elkan5e-class.Item.Hnht9LDuOKTtKyiS]{Warlock}, @UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{Wizard}.</p><h3>B) Standard Array:\_</h3><p>You can assign a standard set of numbers to ability scores of your choice.\_Assign one of the following sets of numbers:</p><p>16, 14, 14, 12, 12, 8</p><p>16, 16, 14, 10, 10,\_8</p><h3>C) Rolling:\_</h3><p>If you want to randomly determine your ability score values, you can roll for them.</p><p>Roll 4d6, dropping the lowest value. For example, if you roll, 5,4,4, 3, your total is 13. Repeat this six times, writing down the values you roll.</p><p>Assign each value to ability scores of your choice.</p><p>Add three points either to one ability score or split them up between different ability scores, up to a maximum of 17. If you rolled a 17 or 18, you can keep them, but not increase them this way.</p><h3>D) Point Buy</h3><p>You can spend points on your ability scores, dividing them however you want, between a minimum of 8 and a maximum of 17 for each score. You have 33 points.</p><table border=\"1\"><caption></caption><thead><tr><td><strong>Ability Score Value</strong></td><td><strong>Point Cost</strong></td></tr></thead><tbody><tr><td>8</td><td>0</td></tr><tr><td>9</td><td>1</td></tr><tr><td>10</td><td>2</td></tr><tr><td>11</td><td>3</td></tr><tr><td>12</td><td>4</td></tr><tr><td>13</td><td>5</td></tr><tr><td>14</td><td>7</td></tr><tr><td>15</td><td>9</td></tr><tr><td>16</td><td>11</td></tr><tr><td>17</td><td>13</td></tr></tbody></table><h2>Ability Score Modifiers</h2><p>Once you have your Ability Scores, you can write them in the big boxes on the left side of your character sheet. Each has a small oval at the bottom. This is where you will write your Ability Score Modifiers.</p><p>Most of the time, Ability Scores do not directly affect your abilities. Instead, you will use your Ability Score Modifier, which is a smaller number that you add directly to an ability.</p><p>A modifier is calculated by subtracting 10 from your Ability Score, dividing by 2, and then rounding down. For example, a 14 in Strength gives you a Strength Modifier of 2. This means that when you get to add your 'Strength Modifier' or 'Strength' to a dice roll, you add +2.</p><p>Your Ability Score Modifiers will be very important.</p><p>Modifiers:</p><p>\_ 8-9 \_ (score) = -1 (modifier)\_</p><p>10-11 (score) =\_ 0\_ (modifier)\_</p><p>12-13 (score) = +1 (modifier)\_</p><p>14-15 (score) = +2 (modifier)\_</p><p>16-17 (score) = +3 (modifier)\_</p><p>​</p></div><div><h2>Example</h2><p>I am making Nevil, a 1st level ranger. I take the recommended Ability Scores</p><p>Strength: 10\_ \_Dexterity:16\_ \_Constitution: 14\_ \_Intelligence: 12\_ \_Wisdom: 14\_ \_Charisma: 8\_</p><p>I decide I want Nevil to be a bit more charismatic, so I switch Intelligence and Charisma, making Intelligence 8 and Charisma 12. You can switch as well, if you feel comfortable that you know what the ability scores do.</p><p>Strength: 10\_ \_Dexterity:16\_ \_Constitution: 14\_ \_Intelligence: 8\_ \_Wisdom: 14\_ \_Charisma: 12</p><div id=\"comp-lbby8p55\" class=\"MazNVa comp-lbby8p55 wixui-image\"><div data-testid=\"linkElement\" class=\"j7pOnl\"><img src=\"https://static.wixstatic.com/media/f326e7_9e6255e5896e4f5aa51912547976c3f6~mv2.png/v1/fill/w_235,h_528,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/1_%20Stats.png\" alt=\"1. Stats.png\" style=\"width:235px;height:528px;object-fit:cover;object-position:50% 50%\" /></div></div><p></p></div>"
