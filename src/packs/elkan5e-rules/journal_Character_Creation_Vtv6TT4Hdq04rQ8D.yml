  - sort: 200000
    name: Character Class
    type: text
    _id: MRUTTIAr0oCUwoaV
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>The first step in creating a character is to pick your character's class. Your class represents a fantastical archetype like the cunning and sneaky @UUID[Compendium.elkan5e.elkan5e-class.Item.RTS23KqJMFWlzLKd]{rogue} or the powerful @UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{wizard}. While every @UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{wizard} can cast spells, all @UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{wizards} are different, and you will make many choices to determine what your @UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{wizard} can do.</p><p>​</p><p>The Elkan 5e ruleset does not yet cover spellcasting in depth.</p><p>​</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.M8lNLAe2okA9qgFg]{Barbarian}:\_wild berserkers, the cursed, and people with serious anger issues. Barbarians fight recklessly, throwing themselves into a mighty rage which allows them to shrug off grievous wounds.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.SmG14gsqWBtqmcjt]{Bard}:\_performers, musicians, and explorers. Bards use magic, martial skill, and inspiring performances to support the other members of the party.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.Z68Q5K5fejrVQZAy]{Cleric}:\_scholars, missionaries, and preachers. Clerics use magic learned through deep devotion and study of a faith. They are commonly, but not always, skilled healers.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.653LgVa3sG4ek6b5]{Druid}:\_hermits, shamans, and wild people. Druids learn magic from nature, spirits, and elemental forces. They are often strongly aligned with nature or animals.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.a8ophKCiEGZarsnk]{Fighter}:\_professional warriors, guards, or gladiators. Fighters hone their martial skill above all other classes. They use a variety of weapons and can push their bodies further than others.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.VQiQktedzIusKs4y]{Monk}:\_wise recluses, honed athletes, or the magically awakened. Monks are able to harness magic in the air around them to perform fantastical attacks, move with lightning speed, and strike with powerful martial arts.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.Zg89AoSarbFbVnPY]{Paladin}: holy warriors, local champions, or obsessed avengers. Paladins draw powerful magic by swearing a magical oath. They heal and deal devastating damage with radiant attacks.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{Ranger}: wanderers, regional wardens, or monster hunters. Rangers easily circumvent obstacles and have magical powers they draw from nature or powerful honed instincts.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.RTS23KqJMFWlzLKd]{Rogue}: criminals, spies, or secret agents. Rogues are specialized masters of many skills and strike with precision, dealing devastating blows to single targets.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.emEIZZAh0s8Ed62c]{Sorcerer}: firestarters, magical experiments, and magical children. Sorcerers were born with magical abilities they often don't understand. They can shape spells to be more powerful than other spellcasters.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.Hnht9LDuOKTtKyiS]{Warlock}:\_devoted servants, desperate heroes, and fools tricked into pacts. Warlocks draw magical power from their connection to supernatural entities. They have a versatile set of gifts from their patrons but have fewer spells than other spellcasters.</p><p>@UUID[Compendium.elkan5e.elkan5e-class.Item.qM0tUqAZW3V8L4pF]{Wizard}:\_scholars, court mages, and backwater dabblers. Wizards study magical spells from other wizards, employing a massive variety of spells.</p><p>​</p><p>Once you have chosen your character class, you will need to open up the page for that class (linked above). Once you have both pages open, you can follow the instructions below to start making your character sheet. We will be creating a @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{ranger} as an example. The character class is the most complicated part, so once you get through this, everything else becomes pretty easy.</p><p>The first thing on most class pages is a Progression Chart. This lists what abilities you get at each character level. You are a level 1 character, but if your character levels up, you gain extra abilities. After every step of this guide, we will provide an example and pictures showing where to write everything on your character sheet.</p>"
