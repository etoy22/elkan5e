  - sort: 800000
    name: Ancestry and Background
    type: text
    _id: HJpNzR3OyxIAilZo
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>We are now done with everything from our class at level 1. However, another important part of a 5th edition character is their Ancestry. Unlike baseline 5e rules, we have separated race into Ancestry and Background. \_You will now have to choose an Ancestry for your character.</p><div><p>​</p><p>Navigate to the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.xu7KkQUPMqoEsg19]{Ancestry and Background}\_page. From this page, you'll choose both an @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.xu7KkQUPMqoEsg19]{Ancestry} (listed first) and a Background\_(listed second).</p><p>​</p><p>These choices will give you new skills, other proficiencies, and abilities.\_</p><ul><li><p>Size: this normally goes on the second character sheet, which we aren't using.</p></li><li><p>Senses: this will be defined in a future update, but Darkvision allows you to see in the dark up to a certain range. It is listed under features</p></li><li><p>Walking Speed: this goes in the 'speed' box above Hit Points. If you have a second speed, you can list it in Features or squish it in the same box.</p></li><li><p>Skills: These get bubbled in the same way as before. If you're a Rogue, feel free to apply your Expertise to these skills rather than your class skills.</p></li><li><p>Features: These go in the same place as your class features</p></li><li><p>Cantrips\_or\_Spells: This is quite a complicated system that we don't currently have documentation for. If you don't know how this works, list your cantrips and spells under 'attacks and spellcasting' below your weapons. If you took Arcanist, we recommend 'Mage Hand' and 'Prestidigitation'.</p></li><li><p>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID]{Languages}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN]{Tools}, @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons},\_and\_@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{Armor}: List these proficiencies at the bottom</p></li></ul><p>left with your 'other proficiencies'.</p><ul><li><p>Natural Weapon: This means you have a body part you can use as a</p></li></ul><p>weapon. List it like you did other weapons.</p></div><div><h3>Example</h3><p>As Nevil, I picked Mixed Heritage as my Ancestry.</p><p>I am a Mixed Heritage character of human and elven heritage. This allows me to pick one new skills, and I pick @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#insight]{Insight}. I also get the @UUID[Compendium.elkan5e.elkan-5e-ancestries.Item.uS8jFHnYNWmcERX3]{Fey Ancestry} feature and &amp;reference[darkvision]. My speed is 30 ft.</p><p>​</p><p>I pick @UUID[Compendium.elkan5e.elkan5e-background.Item.ElQD9OIqFCzd06VW]{Fey-Touched} as my Background. I choose the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#medicine]{medicine} and @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.SmhInPvnDpXeH3s3#athletics]{athletics} skills. I pick @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.t1Js6zSa30XvbceF#elvish]{Elvish} and @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.5l8QNlgPDPOHpGID.JournalEntryPage.VZggCkMcvhk0X5Xj#sylvan]{Sylvan} as my bonus languages, add my spells under 'Attacks and Spellcasting, and choose three @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#musical-instrument]{musical instruments}- the @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.VC36HOskyNfD6DXV]{pan flute}, the @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.PgP06DVVwXZNPMOW]{horn}, and the violin- because I am already proficient with all @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{weapons}, and prefer a third instrument to other @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.SySQiDfSWcSRUCFN.JournalEntryPage.wuMEnZz82yY02Dok#artists-tools]{Artisan's Tools}.</p><p>​</p><p>I list my 'race' as 'Half-Elf' at the top of the sheet, and my 'Background' as '@UUID[Compendium.elkan5e.elkan5e-background.Item.ElQD9OIqFCzd06VW]{Fey-Touched}'.</p><p>​</p></div>"
