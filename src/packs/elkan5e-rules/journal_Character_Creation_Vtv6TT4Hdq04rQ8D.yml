  - sort: 900000
    name: Finishing Up
    type: text
    _id: bCRfurFUyrORuM1U
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div><p>We have just a couple finishing touches to add to the character sheet:</p><ul><li><p>Our 'Initiative', which helps us react faster when combat begins, is equal to our Dexterity Modifier. This is located above Hit Points.</p></li><li><p>Our skills need to be added up. Every skill has an associated Ability Score, which is listed with three little letters next to the skill. If we are proficient, we add our proficiency bonus. If we are not proficient, we do not add anything. If we have Expertise in a skill, we add double our proficiency bonus. For instance, your bonus in @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.BhKlFUmcFi0zAkvu#acrobatics]{Acrobatics}(Dex) will equal your dexterity modifier, plus your proficiency bonus if you are proficient in the skill.</p></li><li><p>We do the same thing for saving throws, located above skills.</p></li><li><p>Our 'passive @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#perception]{perception}', which measures how difficult it is for someone to sneak up on us, equals 10 + our @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.rv19GFzEa0nMTuAF.JournalEntryPage.A5vSPTTu7J1k8HA9#perception]{perception} skill total. This is located below the skill panel. If you are an elf, your Keen Sight and Hearing increases this number by 5.</p></li><li><p>Optionally, we can add some personality traits, ideals, bonds, and flaws.</p></li></ul><p>​</p><p>​</p></div><div><p>Example</p><p>Nevil's initiative bonus is +3. I add up his skill and saving throw bonuses.\_</p><p>I also add some personality traits, ideals, bonds, and flaws in the style that we will use in future tutorials. Feel free to go in a different direction; the whole point is to inspire your character to do things.</p><p>We don't use alignment with Elkan 5e, but you can add your alignment if you like.</p></div>"
