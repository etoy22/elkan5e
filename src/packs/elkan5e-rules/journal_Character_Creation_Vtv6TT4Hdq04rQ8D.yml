name: Character Creation
_id: Vtv6TT4Hdq04rQ8D
pages:
  - sort: 100000
    name: Introduction
    type: text
    _id: D2PvSXHydNSUGDpA
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>A character sheet in 5th edition records all of what a single player
        character can do. Their strengths, weaknesses, abilities, and equipment
        is all listed here. Every player needs to create a character sheet to
        play the game. This tutorial will explain how to make a level 1
        character, which is the level most characters start at. If your group
        wants to start at a higher level, you can create a 1st level character
        and then go through the normal process of leveling up.</p><p>As an
        example, we will be showing the creation of a
        @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{Ranger}.</p><p>​</p><p>Right
        now, this tutorial is missing some features.</p><ul><li><p>We do not
        cover how to create a character backstory, but feel free to make your
        own without any reference guides. There is no real limit on what your
        backstory can be except the limits imposed by your game's
        story.</p></li><li><p>We do not yet cover spellcasting.</p></li></ul>
