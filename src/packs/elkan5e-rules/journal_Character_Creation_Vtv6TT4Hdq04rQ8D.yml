  - sort: 600000
    name: Items
    type: text
    _id: elFM4dwtDf40rIQ1
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Under the previous section, your class will list the items you get as a level 1 character. Most classes have several choices, but the first option is usually the best choice, and if you're following previous suggestions for making your character, then you probably want to choose the first option in every case.</p><div><p>You will write down every item under 'equipment' in the bottom middle of your character sheet. The 'packs' you get from your class include miscellaneous supplies, but for the purpose of this tutorial you can just write the name of the pack.\_</p><p>Once you've added all the items, we'll add your Weapon Attacks and\_calculate your Armor Class.</p><h2>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.nfEDSQG0DMBs7eGp]{Weapons}</h2><p>When a character attacks a creature in combat, they must first roll to see if their attack deals damage to the target.​</p><p>The attacking character rolls a d20 die, then adds any relevant bonuses. For most weapons, the character will add their strength modifier to the attack roll. For weapons with the 'ranged' property, the character must add their dexterity modifier to the attack roll instead. If a weapon has the 'finesse' property, the character uses strength or dexterity, whichever is higher. If the character is proficient with the weapon they are using, they add their proficiency bonus to the roll.</p><p>When an attack hits a creature, it deals damage. For most weapons, the damage equals the weapon's damage die plus the ability modifier the attacker used for the attack roll.</p><ul><li><p>On your class page, if you get weapons as part of your starting equipment, click the link on the item to go to the section on the Weapons page that describes that kind of weapon.</p></li><li><p>Where your weapons are listed, they will have a 'damage' and 'damage type' listed.\_</p></li><li><p>In the center of your character sheet, under Attacks and Spellcasting, add a line for each weapon attack.</p></li><li><p>Your 'attack bonus' is equal to:</p><p>proficiency bonus + ability modifier (strength or dexterity)</p></li><li><p>Your damage/type is equal to</p><p>weapon's listed damage die + ability modifier (strength or dexterity), followed by the damage type listed</p></li><li><p>If you want a further explanation of how weapons and attacks work in combat, read the first few paragraphs of the Weapons\_page.</p></li></ul><p></p><h2>@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#armor-class]{Armor Class} (AC)</h2><p>​@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#armor-class]{Armor class} is an abstract concept that represents how difficult it is for a creature to damage you with an attack. It is usually abbreviated as AC. When a creature makes an attack, their attack roll must be equal to or higher than the AC of their target in order to hit. On a hit, the creature deals damage. A miss usually does nothing.​</p><ul><li><p>On your class page, if you get armor as part of your starting equipment, click the link on the item to go to the section on the @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1]{Armor} page that describes that kind of armor.</p></li><li><p>Where your armor is listed, it will have an '@UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.q10XUuFrVlw8qYj1.JournalEntryPage.BdrD593PiJrHfKFG#armor-class]{Armor Class}' listed. I'll offer a few examples at the bottom here if you're having trouble translating this information into an AC value. If you are also using a @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.AENiTUeluTRiFzRz]{large shield}, your AC increases by 2.</p></li><li><p>If you have no armor, your AC equals 10 + your Dexterity Modifier</p></li><li><p>If you are a monk, you have a @UUID[Compendium.elkan5e.elkan5e-class-features.Item.WjdwOozsQQKHaQnL]{Class Feature} that gives you an AC of 10 + your Dexterity Modifier + your Wisdom Modifier</p></li><li><p>Write your AC in the box next to Hit Points</p></li><li><p>If you want a further explanation of how armor works in combat, read the first few paragraphs of the Armor page.</p></li></ul></div><div><h2>Example</h2><p>As Nevil, I'm going to choose the first option for each item choice, since I am not doing anything unusual with the character.</p><p>​</p><p>My @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.QhHQy7whejLOVFf8]{scale mail} gives me an AC of 14+dex (max 16). I have a @UUID[.2wkZil4lP2G49r7n#ability-score-modifiers]{dexterity modifier} of +3, so I add</p><p>14 (@UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.QhHQy7whejLOVFf8]{scale armor} base) + 3(dex) =17.</p><p>However, because @UUID[Compendium.elkan5e.elkan5e-mundane-items.Item.QhHQy7whejLOVFf8]{scale mail} has a maximum AC of 16, my AC is 16.</p><p>​</p><p>I also have two shortswords and a longbow as weapons. At any time, I can wield one shortsword in each hand or wield my longbow.</p><p>​</p><p>I look on the martial melee weapons chart and see that shortswords deal\_</p><p>1d6 + str/dex (piercing damage)</p><p>This means I can choose whether I want to use strength or dexterity to wield these weapons. My dexterity is higher, so I opt for that. I calculate my attack bonus and my damage:</p><p>Attack: 2 (proficiency) + 3 (dexterity) = +5</p><p>Damage: 1d6 (weapon base) + 3 (dexterity) = 1d6+3 (piercing)</p><p>Sometimes the damage type of a weapon matters, so I note that as well.</p><p>​</p><p>My longbow is very similar. It is a ranged weapon, so I must use dexterity.</p><p>Attack: 2 (proficiency) + 3 (dexterity) = +5</p><p>Damage: 1d8 (weapon base) + 3 (dexterity) = 1d8+3 (piercing)</p><div id=\"comp-lbbyb9oi\" class=\"MazNVa comp-lbbyb9oi wixui-image\"><div data-testid=\"linkElement\" class=\"j7pOnl\"><img src=\"https://static.wixstatic.com/media/f326e7_ec26c11f2d9044f1a031ee6f44f7058d~mv2.png/v1/fill/w_192,h_532,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/f326e7_ec26c11f2d9044f1a031ee6f44f7058d~mv2.png\" alt=\"\" style=\"width:192px;height:532px;object-fit:cover;object-position:50% 50%\" /></div></div></div>"
