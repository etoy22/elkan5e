  - sort: 400000
    name: Hit Points
    type: text
    _id: LEGQ72tUoSfyxmh8
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div><p>Hit Points are an abstraction of how much punishment your character can take before being knocked unconscious or killed. When you are hit by an attack or an ability that deals damage, your character loses Hit Points equal to the damage dealt by the attack. When your hit points reach 0, you are dying (or in some cases, you are dead).\_</p><h2>Hit Dice</h2><p>Your Hit Dice vary by class. A @UUID[Compendium.elkan5e.elkan5e-class.Item.t9qEzMyJh0kg5Djk]{ranger} has a d10 (ten-sided die) as their Hit Dice and a @UUID[Compendium.elkan5e.elkan5e-class.Item.RTS23KqJMFWlzLKd]{rogue} has a d8 (eight-sided die). At first level, your character has a number of Hit Points equal to the highest number on their Hit Die plus your Constitution Modifier.</p><h2>Hit Point Maximum</h2><p>You will record your total hit points under 'hit point maximum' at the top of the hit point box and your character's current hit points under that. If you take damage, you will adjust your 'current hit points' but not your 'hit point maximum'. If you are healed, you can recover lost hit points but can't go above your maximum.</p><p>You will also record your Hit Dice in a similar way. You write your total number of Hit Dice with the dice value under 'total' Hit Dice, and your current number of Hit Dice under that. Hit Dice can be spent during short rests to regain hit points.</p></div><div><h2>Example</h2><p>Nevil has a d10 for his Hit Dice, and a Constitution Modifier of +2.</p><p>This means his Hit Point maximum is 12, and he has a total of 1d10 Hit Dice. I write '1' under current Hit Dice so I can keep track of them if I expend any to heal during a rest.</p><div id=\"comp-lbby9l2f\" class=\"MazNVa comp-lbby9l2f wixui-image\"><div data-testid=\"linkElement\" class=\"j7pOnl\"><img src=\"https://static.wixstatic.com/media/f326e7_c3e8d4d1940d4fdd85e2c30a3fd05c10~mv2.png/v1/fill/w_256,h_312,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/2_%20HP.png\" alt=\"2. HP.png\" style=\"width:256px;height:312px;object-fit:cover;object-position:50% 50%\" /></div></div><p></p></div>"
