  - sort: 850000
    name: Ammunition
    type: rule
    _id: 5RUwcK38cpr1fZLe
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You can use a weapon that has the Ammunition property to make a
        ranged attack only if you have Ammunition to fire from the weapon. Each
        time you attack with the weapon, you expend one piece of ammunition.
        Drawing the ammunition from a quiver, case, or other container is part
        of the attack. You need an empty hand to load a one-handed ranged
        weapon. At the end of the battle, you can recover half your expended
        ammunition by taking a minute to search the battlefield.</p>
      markdown: ''
    video:
      controls: true
