  - sort: 778125
    name: Weapon Characteristics
    type: text
    _id: ON1gpSJVsu6EFYSJ
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Below is an explanation of all the characteristics that go into a weapon.</p><p>Melee\_weapons are weapons that can be used to attack effectively at close range. Most melee weapons can only be used to attack creatures that are within 5 ft. of you. Melee weapons with the\_Thrown\_property can also be used as a ranged weapon.</p><p>Ranged\_weapons are weapons meant to attack at a longer range. \_If any hostile creature is within 5 ft., you have disadvantage on any attack roll with a Ranged weapon or when making a ranged attack with a Thrown weapon. Range is explained below.</p><p>Where the Damage of a given weapon type is listed, a weapon damage die will be provided, the relevant ability modifier(s) for damage will be listed. 'str' means strength modifier, 'dex' means dexterity modifier, and 'str/dex' means you choose strength or dexterity, whichever is higher, as per the &amp;Reference[Finesse] property.</p><p>A weapon's\_Damage Type\_describes the way in which a weapon deals damage to the target. Bludgeoning, piercing, and slashing represent whether the weapon uses blunt force, stabbing, or cutting to injure a creature. Some creatures will be vulnerable, resistant, or immune to certain damage types.\_If a weapon has more than one damage type listed, you can use either damage type when you hit with the weapon.</p><p>The Range\_for ranged and thrown weapons lists two numbers. The first is the weapon’s normal range in feet, and the second indicates the weapon’s long range. When attacking a target beyond normal range, you have disadvantage on the attack roll. You can’t attack a target beyond the weapon’s long range. If you have disadvantage on your attack roll from something other than shooting at long range, then you can only target a creature within the normal range, not the long range.</p><p>The weapon's\_cost\_is the weapon's normal cost when sold at a good price. Some regions or merchants may charge more than this value.</p><p>\_</p><p>The various weapon\_properties are listed below:​</p><p>&amp;Reference[Adamantine]</p><p>&amp;Reference[Coldw]</p><p>&amp;Reference[Ammunition]</p><p>&amp;Reference[Finesse]</p><p>&amp;Reference[Heavy]</p><p>&amp;Reference[Lightw]</p><p>&amp;Reference[Loading]</p><p>&amp;Reference[Magicw]</p><p>&amp;Reference[Mounted]</p><p>&amp;Reference[Reach]</p><p>&amp;Reference[Thrown]</p><p>&amp;Reference[Handed]</p><p>&amp;Reference[Silver]</p><p>&amp;Reference[Unwieldy]</p><p>&amp;Reference[Versatile]</p>"
    video:
      controls: true
      volume: 0.5
    src: null
    system: {}
