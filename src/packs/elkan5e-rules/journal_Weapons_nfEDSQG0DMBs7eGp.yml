  - sort: 800000
    name: Adamantine
    type: rule
    _id: cUHKJTc6BHyI1gfR
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Some weapons are forged from adamantine. Some adamantine weapons in
        particular are merely coated in adamantine, but such weapons count as
        silver. Some creatures are resistant to damage from weapons not made
        from adamantine, depending on the creature. Most golems are resistant or
        immune to non-adamantine weapons, for instance, though magical weapons
        may bypass this resistance as well.</p>
      markdown: ''
