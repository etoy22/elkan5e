    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Some weapons are enchanted. These weapons are unique and not listed on this page, but a 'magic' weapon is any weapon that has a bonus to attack and damage rolls, or which is otherwise designated as a 'magic' weapon of uncommon rarity or higher. These weapons deal\_magical\_bludgeoning, piercing, or slashing damage. Some creatures are resistant or immune to damage from weapons that are nonmagical. Incorporeal undead are always resistant to nonmagical weapons, for instant.</p>"
      markdown: ''
