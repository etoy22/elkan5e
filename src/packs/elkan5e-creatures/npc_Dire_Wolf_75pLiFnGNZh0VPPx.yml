          <p>The dire animal's skeleton suddenly grows spikes and other
          protrusions, which shoot out of the animal's flesh. The dire animal
          enters a frenzy. While in a frenzy, the dire animal gains temporary
          hit points equal to its hit point maximum, and can use its multiattack
          as a bonus action.</p><p>The frenzy lasts 1 minute. When the frenzy
          ends, the animal takes damage equal to its hit point maximum as its
