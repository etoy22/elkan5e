    system:
      description:
        value: >-
          <p>While this malakai have at least one other malakai drone nearby,
          they have advantage on perception checks. They can be blinded, but can
          effectively fight through the eyes of another malakai nearby, seeing
          everything they can see.</p><p>Note that when they have advantage on
          perception, their passive perception increases by 5. We have not
          marked them as immune to the blinded condition, but this isn't
          entirely true. A lone drone can be blinded, but if there are only two
          drones and one is blinded, they can both see what the unblinded one
          can see. They still suffer the normal effects of the blinded
          condition, but can use the perceptions of other malakai for perception
          checks.</p>
        chat: ''
        unidentified: ''
      source: Elkan 5e
