  - name: Absorb Corpse
    type: feat
    system:
      description:
        value: >-
          <p>The malakai touches one intact corpse or large size or smaller,
          absorbing the entire body.</p><p>The malakai regains hit points
          depending on the size of the corpse.</p><p>A tiny creature grants 10
          hit points. A small or medium creature grants 20 hit points, and a
          large creature grants 40. </p><p>Crawlers are not as efficient as
          other drones, but are convenient in battle.</p>
