          from a point of your choice within range. Choose up to six creatures
          in a 30-foot-radius sphere centered on that point. Each target regains
          hit points equal to [[/r 3d8]] + your spellcasting ability modifier.
          This spell has no effect on undead or constructs.</p><div
          class="rd__spc-inline-post"></div></div><div class="rd__b 
