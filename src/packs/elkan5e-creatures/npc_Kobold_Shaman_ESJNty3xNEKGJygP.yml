  details:
    biography:
      value: >-
        <blockquote>

        <p>"... I still have the damnable sting blisters from their catapults.
        WASPS! WHAT CREATURE PUTS WASPS IN BAGS AND THROWS THEM AT YOU?! Next
        Kobold I see I'm turning to paste…"<br />- Guard Captain Nathaniel
        Greenbow, interviewed for this bestiary.</p>

        </blockquote>

        <p>Kobolds are conniving, cowardly humanoids of a reptilian appearance
        who infest the dungeons, catacombs, and caverns of our world. Appearing
        as tiny dragonoids with scaled flesh and crocodile-like snouts, Kobolds
        are perhaps more clever than their outward appearance would lead one to
        believe. Within their tiny heads (as the creatures stand no more than
        two and a half feet tall) lies a brain churning with myriad ideas,
        though many include idiotically dangerous schemes. It is not uncommon
        for many Kobolds to perish before their first complete decade of
        life.</p>

        <p><strong>Mob Mentality.</strong> Kobolds, much like rodents, breed at
        an astonishingly quick rate as compared to other humanoid species.
        Egg-layers like their draconic kin, Kobolds mature rapidly upon emerging
        from their shells, and assume their place within the ranks of their
        chittering society. Even upon reaching maturity, however, the Kobold is
        still a weak creature causing the colonies to stick together when
        exploring or hunting. Though Kobolds may defeat larger foes with sheer
        numbers, it is often at the cost of massive casualties on the Kobold's
        side. This, of course, hardly deters the resentful Kobolds, who have
        more eggs incubating away with the next infantry reinforcements just
        moments away from joining the fold.</p>

        <p><strong>Launch the Centipult.</strong> Stupid yet clever, Kobolds
        truly excel at two things: burrow-making and creating traps for unwary
        adventurers. Traps, of course, are the Kobold's speciality and they take
        relish in littering their lairs with copious defenses hewn from the
        natural resources of their home. Perhaps crushing logs were torn from
        the rafter struts of an abandoned temple, or carnivorous insects were
        placed into dropping ceramic pots to smash down upon foolish intruders.
        Never underestimate the ability of a Kobold to find some unsuspected way
        to impede your progress.</p>

        <p><strong>Trade Offs.</strong> Though strong in numbers, Kobolds may be
        defeated in several ways. Firstly, the creatures are born and mature
        within near total darkness, thus the sun weakens them and blinds their
        sensitive eyes. Kobolds are also nigh defenseless without the aid of
        their allies at their backs; often a lone Kobold with attempt to scurry
        away should they be caught out without their pack. Greedy and determined
        when it comes to self-preservation, Kobolds may be easily manipulated
        with smooth talk or a shiny trinket to line their pockets. Draconic in
        nature as well, the scuttling dragonoids can be used as crude
        translators of the dragon's tongue should you require such services on
        your journey.</p>

        <ul>

        <li><em>Token artwork by Forgotten Adventures.</em></li>

        <li><em>Bestiary entry by Penelope (Vyrnali).</em></li>

        </ul>
