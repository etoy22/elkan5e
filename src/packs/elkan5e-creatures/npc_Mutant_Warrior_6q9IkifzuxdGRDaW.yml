  - name: Toxic Regeneration
    type: feat
    system:
      description:
        value: >-
          <p>When the mutant warrior has fewer than all of its hit points, its
          flesh attempts to knit itself together, spewing volatile organic
          compounds as it does so.</p><p>All creatures within 5 ft. of the
          mutant warrior, including the mutant warrior, must succeed on a DC 13
          contitution saving throw or take 2d6 poison damage (which the mutant
          warrior is resistant to). Then, if this doesn't kill the mutant
          warrior, the mutant warrior regains 5 hit points.</p><p>If the mutant
          warrior isn't in danger and is at 15 hit points or greater, assume
          that it can regain all hit points over the course of 10 minutes
          without any danger.</p>
