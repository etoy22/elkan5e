  - name: Absorb Flesh
    type: feat
    system:
      description:
        value: >-
          <p>The malakai touches one other malakai or an intact corpse,
          absorbing either extraneous flesh from a fellow drone or taking what
          it needs from the corpse.</p><p>The malakai regains 10 hit points. If
          the target was another malakai, that malakai loses 10 hit points. If
          the target was a corpse, part of the corpse is destroyed.</p><p>A tiny
          creature can only be absorbed once. A small or medium creature can be
          absorbed twice, a large creature four times, a huge creature eight
          times, and a gargantuan creature 16 times. </p><p>The malakai can more
          efficiently absorb corpses if they take a minute for each absorption.
          In that case, they get 20 hit points each time they use this
          ability.</p><p>Once the corpse has been absorbed once, it is no longer
          intact for the purposes of Revivify or Raise Dead.</p>
        chat: ''
        unidentified: ''
      source: Elkan 5e
