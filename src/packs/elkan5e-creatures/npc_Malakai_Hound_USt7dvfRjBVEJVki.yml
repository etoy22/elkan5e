  - name: Shared Mind
    type: feat
    system:
      description:
        value: >-
          <p>Any effects targeting the mind of a Malakai is partially
          distributed among other Malakai drones, rendering them immune to the
          charmed and frightened conditions and giving them resistance to
          psychic damage. If a Malakai suffers an ongoing effect as a result of
          failing an intelligence, wisdom, or charisma saving throw, another
          malakai within 30 ft. or the local malakai commander can use their
          reaction to suffer the effect instead.</p>
