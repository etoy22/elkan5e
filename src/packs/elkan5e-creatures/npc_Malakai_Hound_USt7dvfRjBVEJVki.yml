  - name: Malakai
    type: feat
    system:
      description:
        value: "<div class=\"repitem\" data-reprowid=\"-LIZcmPoSW6ZHJWcW0Gc\" style=\"box-sizing:border-box;position:relative\"><div class=\"trait\" style=\"box-sizing:content-box;position:relative\"><div class=\"display\" style=\"box-sizing:content-box;margin-bottom:2px\"><p><span class=\"description\" style=\"box-sizing:content-box;text-align:left !important;display:block;font-size:13px;line-height:13px;width:385px;font-weight:normal;margin-top:0px;white-space:pre-line;color:var(--dark-secondarytext)\">The malakai are vestiges of a greater entity. This entity can communicate through them if the malakai touches the person the entity wants to talk to. The malakai can communicate telepathically in any language listed on this drone. </span></p><p><span class=\"description\" style=\"box-sizing:content-box;text-align:left !important;display:block;font-size:13px;line-height:13px;width:385px;font-weight:normal;margin-top:0px;white-space:pre-line;color:var(--dark-secondarytext)\">The malakai are mentally connected by either this entity or a local commander, such as Emrys or Lorkul. The know the location of all other malakai controlled by the same commander, and share all their senses.\_</span></p></div></div></div>"
