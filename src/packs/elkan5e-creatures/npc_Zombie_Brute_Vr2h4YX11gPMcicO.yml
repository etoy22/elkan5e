  details:
    biography:
      value: "<p>When the magic of necromancy is utilized upon the preserved flesh of a humanoid, a zombie will rise to serve its dark master.\_ In much the same way that an animated skeleton is returned from the dead so too are zombies shunted back into this world.\_ While a skilled spellcaster may animate the dead and command the newly awakened, zombies may also rise in areas of the world saturated with necromantic energy.\_ In this situation, the zombies will not obey the command of a master, but roam aimlessly in a small area until they either find something to attack and consume or rot away into a pile of inanimate bones.\_\_</p>\n<p><strong>Re: Your Brains.</strong> Zombies do retain quite a lot of their former selves in regards to their physical appearance.\_ Zombies will still show the wounds or disease scars which slew them upon reanimating.\_ The symptoms of decay will also be present as many freshly spawned zombies will be bloated, have patches of skin sloughing from their bodies, or even trailing entrails from exploded abdomens.\_ While a zombie may resemble the person they were before, there is nothing at work within the head except mindless hunger.\_ Zombies stumble through their existence in a perpetual state of mindlessness only able to heed their master’s orders.\_ This fact of the zombie’s mind makes them invaluable warriors for a necromancer in need.\_ Zombies are direct and will shamble off towards their quarry without so much as a second thought to their own safety.\_ It’s been noted that some zombies have walked through fires or pits of acid in order to reach their enemies.\_ Once they reach their target, zombies will pummel and bite at their enemy until either they or the enemy fall in the tussle.\_ Zombies may also wield weapons, though not cleverly; zombies will not be able to reclaim a weapon should they be disarmed as the lack of weapon will simply drive them to claw with their broken hands.\_ The magic which binds the zombie to the mortal plane is tricky to the uninitiated as well, so please be warned young adventurers!\_ Should you fell a zombie, be aware that the creature may not be fully dead for the second time; you should always be sure to wait and see if the beast attempts to rise once more before wandering deeper into the dungeon.</p>\n<ul>\n<li><em>Token artwork by Forgotten Adventures.</em></li>\n<li><em>Bestiary entry by Penelope (Vyrnali).</em></li>\n</ul>"
