  - name: Wolf Spider Venom
    type: consumable
    img: icons/consumables/potions/potion-bottle-skull-label-poison-teal.webp
    system:
      description:
        value: >-
          <p><strong>Note: Assume that the assassin coats their shortsword with
          this poison as part of their first attack action. Each time you hit
          with this shortsword, use this ability on the same target as well
          (counting it as a single attack).</strong></p><p>A creature hit by the
          poisoned weapon or ammunition must make a DC 11 Constitution saving
          throw or take 2d6 poison damage. Once applied, the poison retains
          potency for 1 minute before drying. <span style="font-family:Signika,
          sans-serif">If the poison damage reduces the target to 0 hit points,
          the target is stable but poisoned for 1 hour, even after regaining hit
          points, and is paralyzed while poisoned in this way.</span></p>
