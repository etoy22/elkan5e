    system:
      description:
        value: >-
          <p>Once per turn, you can deal extra damage to one creature you hit
          with an attack. This damage counts as part of the attack, and if you
          roll critical hit and use sneak attack, your sneak attack damage is
          doubled. To deal this extra damage, your weapon cannot be a
          @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.lYS9gLJUyCp7cKzX]{Heavy}
          melee weapon, and you must meet one of the following
          criteria:</p><ul><li><p>you have advantage on the attack roll against
          your target</p></li><li><p>your target is within 5 ft. of another
          creature hostile to them, and the other creature is not
          @UUID[Compendium.elkan5e.elkan5e-rules.JournalEntry.svcJ1yGovpUs0jLJ]{Incapacitated}</p></li></ul><p>Click
          @UUID[Compendium.elkan5e.elkan5e-rules.2w2vPEpcH9NLYdGH.JournalEntryPage.sGtCAuBlpH27ZjDs]{here}
          for an example (2).</p><p>Your Sneak Attack damage increases as you
          gain levels in this class, as shown in the Sneak Attack column of the
          @UUID[Compendium.elkan5e.elkan5e-class.RTS23KqJMFWlzLKd]{Rouge
          Progression Table}.</p>
